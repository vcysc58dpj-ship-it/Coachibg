function LiveCloudTab({clientId,role,toast,mode}){
  // Kontext:
  //  - role 'client'                    -> Tabs "Für mich"(eigener client-Space) / "Für alle"(broadcast)
  //  - role 'coach' & mode 'broadcast'  -> Coach-Dashboard: broadcast-Space
  //  - role 'coach' (Workspace)         -> Coach: NUR der client-Space dieses Kunden
  const isBroadcast       = role==="coach" && mode==="broadcast";
  const isClientSpaceCoach= role==="coach" && mode!=="broadcast";
  const [meId,setMeId]=useState(null);
  const [folders,setFolders]=useState([]);
  const [files,setFiles]=useState(null);
  const [names,setNames]=useState({});   // id -> {name,role}
  const [busy,setBusy]=useState(false);
  const [tab,setTab]=useState("mine");    // Kunde: mine | all
  const [newFolder,setNewFolder]=useState("");
  const [folderId,setFolderId]=useState(null);
  const [trail,setTrail]=useState([]);
  const [renaming,setRenaming]=useState(null); // {id,name} oder null
  const [renameVal,setRenameVal]=useState("");
  const fileRef=useRef(null);

  useEffect(()=>{ (async()=>{ try{ const { data } = await window.supa.auth.getUser(); setMeId(data&&data.user?data.user.id:null); }catch(e){} })(); },[]);
  const signed=async(bucket,path)=>{ try{ const { data } = await window.supa.storage.from(bucket).createSignedUrl(path,60*60*6); return (data&&data.signedUrl)||""; }catch(e){ return ""; } };
  const isImg=(name)=>/\.(png|jpe?g|gif|webp|heic)$/i.test(name||"");

  const load=async()=>{
    try{
      const { data:fd } = await window.supa.from("folders").select("id,coach_id,client_id,root_kind,parent_id,name,created_at").order("created_at",{ascending:true});
      setFolders(fd||[]);
      const { data,error } = await window.supa.from("files").select("id,scope,name,bucket,path,owner_id,client_id,coach_id,folder_id,created_at").order("created_at",{ascending:false});
      if(error) throw error;
      const rows=(data||[]).map(r=>({...r, isImage:isImg(r.name)}));
      for(const r of rows){ r.url=await signed(r.bucket,r.path); }
      setFiles(rows);
      const ids=[...new Set([...rows.map(r=>r.owner_id),...(fd||[]).map(f=>f.coach_id)].filter(Boolean))];
      if(ids.length){ const { data:ps } = await window.supa.from("profiles").select("id,display_name,role").in("id",ids); const m={}; (ps||[]).forEach(p=>{ m[p.id]={name:p.display_name||"Unbekannt",role:p.role}; }); setNames(m); }
    }catch(e){ toast("Dateien konnten nicht geladen werden"); setFiles([]); }
  };
  useEffect(()=>{ load(); },[clientId,mode]);

  // aktiver Space je nach Kontext/Tab
  const space = isBroadcast ? {scope:"broadcast",clientId:null}
              : isClientSpaceCoach ? {scope:"client",clientId}
              : (tab==="all" ? {scope:"broadcast",clientId:null} : {scope:"client",clientId});

  const inSpaceFolder=(f)=> f.root_kind===space.scope && (space.scope!=="client"||f.client_id===space.clientId);
  const inSpaceFile  =(f)=> f.scope===space.scope && (space.scope!=="client"||f.client_id===space.clientId);
  const subFolders=(folders||[]).filter(f=>inSpaceFolder(f) && (f.parent_id||null)===(folderId||null));
  const here=(files||[]).filter(f=>inSpaceFile(f) && (f.folder_id||null)===(folderId||null));
  const folderCount=(fid)=> (files||[]).filter(x=>x.folder_id===fid).length + (folders||[]).filter(x=>x.parent_id===fid).length;

  const canCreateFolder = role==="coach";
  const canUpload = role==="coach" || (role==="client" && space.scope==="client");

  const enterFolder=(f)=>{ setTrail(t=>[...t,{id:f.id,name:f.name}]); setFolderId(f.id); };
  const goCrumb=(idx)=>{ if(idx<0){ setFolderId(null); setTrail([]); } else { const nt=trail.slice(0,idx+1); setTrail(nt); setFolderId(nt[nt.length-1].id); } };
  const switchTab=(t)=>{ setTab(t); setFolderId(null); setTrail([]); };

  const createFolder=async()=>{
    if(!newFolder.trim()||role!=="coach"||!meId) return;
    try{
      const row={ coach_id:meId, client_id: space.scope==="client"?space.clientId:null, root_kind:space.scope, parent_id:folderId||null, name:newFolder.trim() };
      const { error } = await window.supa.from("folders").insert(row); if(error) throw error;
      setNewFolder(""); toast("Ordner erstellt"); await load();
    }catch(e){ toast("Ordner anlegen fehlgeschlagen: "+(e.message||"")); }
  };

  const onPick=async(file)=>{
    if(!file||!meId) return; setBusy(true);
    try{
      let bucket,path,row;
      if(space.scope==="broadcast"){
        bucket="broadcast-files"; path=meId+"/"+nid()+"_"+file.name;
        const { error:ue } = await window.supa.storage.from(bucket).upload(path,file,{contentType:file.type||undefined,upsert:false}); if(ue) throw ue;
        row={ scope:"broadcast", client_id:null, coach_id:meId, owner_id:meId, kind:isImg(file.name)?"image":"file", name:file.name, bucket, path, folder_id:folderId||null };
      } else {
        bucket="client-files"; path=space.clientId+"/"+nid()+"_"+file.name;
        const { error:ue } = await window.supa.storage.from(bucket).upload(path,file,{contentType:file.type||undefined,upsert:false}); if(ue) throw ue;

      }

  };
  const delFile=async(f)=>{

    catch(e){ toast("Löschen fehlgeschlagen: "+(e.message||"")); }
  };
  const delFolder=async(f)=>{
    const inside=folderCount(f.id);
    if(!await askConfirm({title:"Ordner löschen?",message:inside>0?("„"+f.name+"\" und der gesamte Inhalt werden gelöscht."):("„"+f.name+"\" wird gelöscht."),confirmText:"Löschen",danger:true})) return;
    try{
      const rm=(files||[]).filter(x=>x.folder_id===f.id);
      for(const x of rm){ try{ await window.supa.storage.from(x.bucket).remove([x.path]); }catch(e){} }
      const { error } = await window.supa.from("folders").delete().eq("id",f.id); if(error) throw error;
      toast("Ordner gelöscht"); await load();
    }catch(e){ toast("Löschen fehlgeschlagen: "+(e.message||"")); }
  };
  const startRename=(f)=>{ setRenaming({id:f.id,name:f.name}); setRenameVal(f.name); };
  const doRename=async()=>{
    const nm=(renameVal||"").trim();
    if(!nm||!renaming){ setRenaming(null); return; }
    try{ const { error } = await window.supa.from("folders").update({ name:nm }).eq("id",renaming.id); if(error) throw error; setRenaming(null); toast("Umbenannt"); await load(); }
    catch(e){ toast("Umbenennen fehlgeschlagen: "+(e.message||"")); }
  };

  if(files===null) return <div className="mbody"><div className="muted">Lädt…</div></div>;

  const rootLabel = isBroadcast ? "Für alle" : isClientSpaceCoach ? "Dateien" : (tab==="all"?"Für alle":"Für mich");
  const uploaderLabel=(ownerId)=>{ const n=names[ownerId]; if(!n) return "—"; return n.role==="coach"?"Coach":n.name; };

  return <div className="mbody">
    <input ref={fileRef} type="file" style={{display:"none"}} onChange={(e)=>{ const f=e.target.files[0]; if(f) onPick(f); e.target.value=""; }}/>

    {role==="client" && <div className="ci-seg" style={{marginBottom:16}}>
      <button className={tab==="mine"?"on":""} onClick={()=>switchTab("mine")}>Für mich</button>
      <button className={tab==="all"?"on":""} onClick={()=>switchTab("all")}>Für alle</button>
    </div>}

    {/* Breadcrumb */}
    <div className="crumbs">
      <button className="crumb" onClick={()=>goCrumb(-1)}>{rootLabel}</button>
      {trail.map((t,i)=>(<React.Fragment key={t.id}><span className="crsep">›</span><button className="crumb" onClick={()=>goCrumb(i)}>{t.name}</button></React.Fragment>))}
    </div>

    {/* Aktionen */}
    {(canCreateFolder||canUpload) && <div className="mcard" style={{marginBottom:16}}>
      {canCreateFolder && <div className="mini" style={{gap:6}}>
        <input value={newFolder} onChange={(e)=>setNewFolder(e.target.value)} placeholder="Neuen Ordner anlegen…" style={{flex:1,minWidth:0}}/>
        <button className="addbtn" style={{padding:"8px 12px"}} onClick={createFolder}>Ordner</button>
      </div>}
      {canUpload && <button className="btn" style={{marginTop:canCreateFolder?10:0}} disabled={busy} onClick={()=>fileRef.current&&fileRef.current.click()}>{busy?"Lädt…":"+ Datei hochladen"}</button>}
    </div>}

    {subFolders.length===0 && here.length===0 && <div className="muted">
      {role==="client"&&tab==="all" ? "Dein Coach hat hier noch nichts geteilt."
      : role==="client" ? "Hier ist noch nichts. Lade deine erste Datei hoch."
      : "Dieser Ordner ist leer."}
    </div>}
    {subFolders.map(f=>(
      <FolderRow key={f.id} label={f.name} count={folderCount(f.id)} onOpen={()=>enterFolder(f)} onRename={role==="coach"?()=>startRename(f):null} onDelete={role==="coach"?()=>delFolder(f):null}/>
    ))}
    {here.map(f=>(
      <FileRow key={f.id} f={f} who={uploaderLabel(f.owner_id)} canDelete={f.owner_id===meId || role==="coach"} onDelete={()=>delFile(f)}/>

    {renaming && <>
      <div className="scrim" onClick={()=>setRenaming(null)}/>
      <div className="sheet" role="dialog" aria-modal="true">
        <div className="sheet-grab"/>
        <div className="ds-title" style={{marginBottom:14}}>Ordner umbenennen</div>
        <input className="ta" style={{minHeight:0,height:46}} value={renameVal} onChange={(e)=>setRenameVal(e.target.value)} placeholder="Ordnername"/>
        <button className="btn" style={{marginTop:12}} onClick={doRename}>Speichern</button>
        <button className="ds-cancel" style={{width:"100%",marginTop:8}} onClick={()=>setRenaming(null)}>Abbrechen</button>
      </div>
    </>}
  </div>;

function PermissionToggles({toast}){
  const [notifOn,setNotifOn]=useState(false);
  const [camOn,setCamOn]=useState(false);
  const [micOn,setMicOn]=useState(false);
  const [rdy,setRdy]=useState(false);
  useEffect(()=>{
    (async()=>{
      try{
        // Mitteilungen: aktive Subscription prüfen
        if("Notification" in window && "serviceWorker" in navigator && Notification.permission==="granted"){
          const reg=await navigator.serviceWorker.ready;
          const sub=await reg.pushManager.getSubscription();
          if(sub){
            const {data:{user}}=await window.supa.auth.getUser();
            if(user){
              const {data}=await window.supa.from("push_subscriptions").select("id").eq("user_id",user.id).eq("endpoint",sub.endpoint).maybeSingle();
              setNotifOn(!!data);
            }
          }
        }
        // Kamera / Mikrofon: enumerateDevices (kein grüner Indikator)
        if(navigator.mediaDevices?.enumerateDevices){
          const devs=await navigator.mediaDevices.enumerateDevices();
          setCamOn(devs.some(d=>d.kind==="videoinput"&&d.label!==""));
          setMicOn(devs.some(d=>d.kind==="audioinput"&&d.label!==""));
        }
      }catch(e){}
      setRdy(true);
    })();
  },[]);
  const wrap=(fn)=>rdy?fn:()=>{};
  const toggleNotif=async()=>{
    if(notifOn){ await disablePush(toast); setNotifOn(false); }
    else{
      await enablePush(toast);
      if("Notification" in window && Notification.permission==="granted"){
        const reg=await navigator.serviceWorker.ready;
        const sub=await reg.pushManager.getSubscription();
        setNotifOn(!!sub);
      }
    }
  };
  const toggleCam=async()=>{
    if(camOn){ toast("Kamera-Zugriff in iOS Einstellungen → Datenschutz → Kamera entziehen"); }
    else{
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
        s.getTracks().forEach(t=>t.stop()); setCamOn(true);
        toast("Kamera-Zugriff erlaubt");
      }catch(e){ toast("Kamera-Zugriff verweigert"); }
    }
  };
  const toggleMic=async()=>{
    if(micOn){ toast("Mikrofon-Zugriff in iOS Einstellungen → Datenschutz → Mikrofon entziehen"); }
    else{
      try{
        const s=await navigator.mediaDevices.getUserMedia({video:false,audio:true});
        s.getTracks().forEach(t=>t.stop()); setMicOn(true);
        toast("Mikrofon-Zugriff erlaubt");
      }catch(e){ toast("Mikrofon-Zugriff verweigert"); }
    }
  };
  return <>
    <div className="sectlabel">Berechtigungen</div>
    <div className="mcard" style={{padding:"4px 16px"}}>
      <div className="tglrow">
        <div><div className="en">Mitteilungen</div><div className="enote">{notifOn?"Aktiv – du erhältst Nachrichten-Benachrichtigungen":"Benachrichtigungen bei neuen Nachrichten"}</div></div>
        <Toggle on={notifOn} onClick={wrap(toggleNotif)}/>
      </div>
    </div>
  </>;
}

  },[live,clientId]);
  // ─────────────────────────────────────────────────────────────────────
  const baseTabs=selfMode?SELF_TABS:(viewerRole==="coach"?COACH_TABS:CLIENT_TABS);
  const tt=tools||{};
  const ALWAYS_TABS=["home","weight","settings"];
  const tabs=baseTabs.filter(t=>ALWAYS_TABS.includes(t.k)||tt[t.k]!==false);
  const tabKeys=tabs.map(t=>t.k).join(",");
  useEffect(()=>{ if(tabs.length && !tabs.some(t=>t.k===tab)) setTab(tabs[0].k); },[tabKeys,tab]);
  const title=selfMode?"Self-Coaching":(viewerRole==="coach"?name:"Mein Coaching");
  let content;
  if(tab==="home") content=(live && clientId) ? <LiveDashboard clientId={clientId} toast={toast} go={setTab} name={viewerRole==="coach"?name:cdata.name} unread={(!selfMode && viewerRole==="client")?(unread||0):0}/> : <div className="mbody"><div className="muted">Dashboard</div></div>;
  else if(tab==="chat") content=(live && clientId) ? <LiveChatTab clientId={clientId} role={viewerRole} toast={toast}/> : <ChatTab cdata={cdata} upd={upd} role={viewerRole}/>;
  else if(tab==="checkin") content=(live && clientId) ? <LiveCheckinTab clientId={clientId} role={viewerRole} toast={toast}/> : <CheckinTab cdata={cdata} upd={upd} role={viewerRole} name={name} toast={toast}/>;
  else if(tab==="habits") content=(live && clientId) ? <LiveHabitsTab clientId={clientId} role={viewerRole} toast={toast}/> : <HabitsTab cdata={cdata} upd={upd} role={viewerRole} toast={toast}/>;
  else if(tab==="plan") content=(live && clientId) ? <LivePlanTab clientId={clientId} role={viewerRole} toast={toast}/> : <PlanTab cdata={cdata} upd={upd} role={viewerRole} toast={toast}/>;
  else if(tab==="food") content=(live && clientId) ? <LiveFoodTab clientId={clientId} role={viewerRole} toast={toast}/> : <FoodTab cdata={cdata} upd={upd} role={viewerRole} toast={toast}/>;
  else if(tab==="weight") content=(live && clientId) ? <LiveWeightTab clientId={clientId} role={viewerRole} toast={toast}/> : <WeightTab cdata={cdata} upd={upd} role={viewerRole} toast={toast}/>;
  else if(tab==="cloud") content=(clientId) ? <LiveCloudTab clientId={clientId} role={viewerRole} toast={toast}/> : <CloudTab cdata={cdata} upd={upd} role={viewerRole} name={name} shared={shared} addShared={addShared} delShared={delShared} toast={toast}/>;
  else if(tab==="journey") content=(live && clientId) ? <JourneyTab clientId={clientId} role={viewerRole} toast={toast}/> : null;
  else content=<SettingsTab cdata={cdata} upd={upd} theme={theme} setTheme={setTheme} toast={toast} clientId={clientId} live={live} onRefresh={onRefresh}/>;
  return <div className="app">
    {(callState==="calling"||callState==="connected") && <VideoCallOverlay localStream={localStream} remoteStream={remoteStream} partnerName={callPartner?.name||partner.name} callState={callState} muted={muted} frontCam={frontCam} onEnd={vcEnd} onMute={vcToggleMute} onFlipCam={vcFlipCam}/>}
    {callState==="incoming" && <IncomingCallBanner from={callPartner?.name||"Anruf"} fromAvatar={callPartner?.avatar} onAccept={vcAccept} onReject={vcReject}/>}
    <div className="topbar">
      {(onBack || (viewerRole==="client" && tab==="chat")) && <button className="back" onClick={onBack || (()=>setTab("home"))}>‹</button>}
      <div className="lead">
        {selfMode
          ? <span className="ttl">Self-Coaching</span>
          : (tab==="chat"
            ? <span className="chathead"><span className="chav">{partner.avatar?<img src={partner.avatar} alt=""/>:initials(partner.name)}</span><span className="ttl">{partner.name}</span></span>
            : (viewerRole==="coach" ? <span className="ttl">{title}</span> : <button className="logobtn" onClick={()=>setTab("home")} aria-label="Zum Dashboard"><img className="logo-sm" src={LOGO} alt="NK"/></button>))}
      </div>
      {selfMode && <div className="seg" style={{marginRight:6}}>
        <button className={!selfEdit?"on":""} onClick={()=>{ if(selfEdit) onToggleSelfEdit(); }}>Ansicht</button>
        <button className={selfEdit?"on":""} onClick={()=>{ if(!selfEdit) onToggleSelfEdit(); }}>Bearbeiten</button>
      </div>}
      {!selfMode && viewerRole==="coach" && tab==="chat" && live && clientId && canCall && <button className="iconbtn" onClick={vcStart} aria-label="Videoanruf" style={{color:callState==="idle"?"var(--dim)":"var(--accent)"}}><Icon name="vidcam"/></button>}
      <button className="iconbtn" onClick={()=>setMenu(true)} aria-label="Menü"><Icon name="menu"/></button>
    </div>
    <div className="work">{content}</div>
    {menu && <Drawer tabs={tabs} tab={tab} setTab={setTab} onClose={()=>setMenu(false)} headName={selfMode?"Self-Coaching":(viewerRole==="coach"?(partner.name||name):cdata.name)} headRole={selfMode?"Eigenes Training":(viewerRole==="coach"?"Coach-Ansicht · Kunde":"Mein Coaching")} avatarUrl={selfMode?null:(viewerRole==="coach"?partner.avatar:cdata.avatarUrl)} theme={theme} setTheme={setTheme} onSignOut={onSignOut} toast={toast} modes={modes} mode={mode} onMode={onMode}/>}
  </div>;
}

function CoachHome({onOpen,onCreate,onSwitch,onSignOut,theme,setTheme,onBroadcast,toast,onRefresh,modes,mode,onMode,unread,unreadByClient}){
  const [tab,setTab]=useState("home"); // home | clients | cloud | chat
  useEffect(()=>{ const h=()=>setTab("chat"); window.addEventListener("nk:open-chat",h); return ()=>window.removeEventListener("nk:open-chat",h); },[]);
  const [menu,setMenu]=useState(false);
  const [bc,setBc]=useState(false);
  const [showCreate,setShowCreate]=useState(false);
  const [clients,setClients]=useState(null);
  const [meId,setMeId]=useState(null);
  const [me,setMe]=useState({name:"Coach",avatar:""});
  const [err,setErr]=useState(null);
  const [actClient,setActClient]=useState(null); // Kunde für Aktions-Sheet

  useEffect(()=>{ (async()=>{ try{ const { data } = await window.supa.auth.getUser(); const uid=data&&data.user?data.user.id:null; setMeId(uid); if(uid){ const { data:p } = await window.supa.from("profiles").select("display_name,avatar_url").eq("id",uid).single(); if(p) setMe({name:p.display_name||"Coach",avatar:p.avatar_url||""}); } }catch(e){} })(); },[]);
  const load=async()=>{
    setErr(null);
    try{
      const { data, error } = await window.supa.from("profiles")
        .select("id,display_name,email,avatar_url,created_at,onboarded,checkin_weekday,active,tools")
        .eq("role","client").order("created_at",{ascending:false});
      if(error) throw error;
      setClients(data||[]);
    }catch(e){ setErr(e.message||"Konnte Kunden nicht laden."); setClients([]); }
  };
  useEffect(()=>{ load(); },[]);

  const setActive=async(c,val)=>{
    setActClient(null);
    try{ const { error } = await window.supa.from("profiles").update({ active:val }).eq("id",c.id); if(error) throw error; toast(val?"Kunde aktiviert":"Kunde deaktiviert"); await load(); }
    catch(e){ toast("Fehlgeschlagen: "+(e.message||"")); }
  };
  const delClient=async(c)=>{
    setActClient(null);
    const nm=c.display_name||c.email||"dieser Kunde";
    if(!await askConfirm({title:"Kunde löschen?",message:"„"+nm+"\" wird mit allen Daten (Chat, Pläne, Check-ins, Dateien) endgültig gelöscht. Das kann nicht rückgängig gemacht werden.",confirmText:"Endgültig löschen",danger:true})) return;
    try{
      const { data, error } = await window.supa.functions.invoke("delete-client",{ body:{ clientId:c.id } });
      if(error){ let m=error.message||"Fehlgeschlagen"; try{ const ctx=error.context; if(ctx&&typeof ctx.json==="function"){ const j=await ctx.json(); if(j&&j.error) m=j.error; } }catch(_e){} throw new Error(m); }
      if(data&&data.error) throw new Error(data.error);
      toast("Kunde gelöscht"); await load();
    }catch(e){ toast("Löschen fehlgeschlagen: "+(e.message||"")); }
  };

  const COACH_NAV=[{k:"home",l:"Dashboard",i:"home"},{k:"clients",l:"Kunden",i:"habits"},{k:"cloud",l:"Cloud",i:"cloud"},{k:"chat",l:"Chat",i:"chat"},{k:"anamnese",l:"Anamnese-Vorlage",i:"checkin"},{k:"checkin_tpl",l:"Check-in-Vorlage",i:"checkin"},{k:"account",l:"Konto",i:"settings"}];
  const titleFor={home:"Dashboard",clients:"Kunden",cloud:"Cloud",chat:"Chat",anamnese:"Anamnese-Vorlage",checkin_tpl:"Check-in-Vorlage",account:"Konto"};

  let body;
  if(tab==="home") body=<CoachDashboard clients={clients} onOpen={onOpen} toast={toast} unread={unread} onChat={()=>setTab("chat")}/>;
  else if(tab==="clients"){ const act=(clients||[]).filter(c=>c.active!==false); const inact=(clients||[]).filter(c=>c.active===false);
    const Row=(c)=>{ const nm=c.display_name||c.email||"Kunde";
      return <div key={c.id} className="clientrow">
        <button className="cr-tap" onClick={()=>onOpen(c)}>
          <div className="avatar">{c.avatar_url?<img src={c.avatar_url} alt=""/>:initials(nm)}</div>
          <div style={{flex:1,minWidth:0}}><div className="nm">{nm}{c.onboarded===false?<span className="badge" style={{marginLeft:8}}>Neu</span>:null}</div>
            <div className="sub" style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.onboarded===false?"Profil noch nicht eingerichtet":(c.email||"")}</div></div>
        </button>
        <button className="cr-menu" onClick={()=>setActClient(c)} aria-label="Optionen">⋯</button>
      </div>;
    };
    body=<>
      <div className="sectlabel">Deine Kunden</div>
      {clients===null && <div className="muted">Lädt…</div>}
      {err && <div className="authmsg err" style={{marginBottom:10}}>{err}</div>}
      {clients!==null && clients.length===0 && !err &&
        <div className="mcard" style={{textAlign:"center",padding:"22px 16px"}}>
          <div style={{fontWeight:700,marginBottom:4}}>Noch keine Kunden</div>
          <div className="muted">Lege deinen ersten Coachee an – er erscheint dann automatisch hier.</div></div>}
      {act.map(Row)}
      <div style={{marginTop:18,display:"flex",flexDirection:"column",gap:10}}>
        <button className="btn btn-ghost" onClick={()=>setBc(true)}>Nachricht an alle</button>
        <button className="btn" onClick={()=>setShowCreate(true)}>+ Kunde anlegen</button>
      </div>
      {inact.length>0 && <>
        <div className="sectlabel" style={{marginTop:24}}>Inaktiv</div>
        {inact.map(Row)}
      </>}
    </>;
  }
  else if(tab==="cloud") body=<LiveCloudTab clientId={meId} role="coach" toast={toast} mode="broadcast"/>;
  else if(tab==="chat") body=<CoachChatList clients={(clients||[]).filter(c=>c.active!==false)} onOpen={onOpen} unreadByClient={unreadByClient}/>;
  else if(tab==="account") body=<AccountSettings theme={theme} setTheme={setTheme} toast={toast} onRefresh={onRefresh}/>;
  else if(tab==="anamnese") body=<CoachAnamneseTemplate toast={toast}/>;
  else if(tab==="checkin_tpl") body=<CoachCheckinTemplate toast={toast}/>;

  return <div className="app">
    <div className="topbar">
      <div className="lead"><button className="logobtn" onClick={()=>setTab("home")} aria-label="Zum Dashboard"><img className="logo-sm" src={LOGO} alt="NK"/></button></div>
      <button className="iconbtn" onClick={()=>setMenu(true)} aria-label="Menü"><Icon name="menu"/></button>
    </div>
    <div className="work">{tab==="cloud" ? body : <div className="mbody">{body}</div>}</div>
    {menu && <Drawer tabs={COACH_NAV} tab={tab} setTab={setTab} onClose={()=>setMenu(false)} headName={me.name} headRole="Coach-Bereich" avatarUrl={me.avatar} theme={theme} setTheme={setTheme} onSignOut={onSignOut} toast={toast} modes={modes} mode={mode} onMode={onMode}/>}
    {bc && <BroadcastSheet onClose={()=>setBc(false)} onSend={(t)=>{onBroadcast(t);setBc(false);}} count={(clients||[]).filter(c=>c.active!==false).length}/>}
    {showCreate && <CreateClientSheet onClose={()=>setShowCreate(false)} onCreate={onCreate} onCreated={()=>{ setShowCreate(false); load(); }} toast={toast}/>}
    {actClient && <>
      <div className="scrim" onClick={()=>setActClient(null)}/>
      <div className="sheet" role="dialog" aria-modal="true">
        <div className="sheet-grab"/>
        <div className="ds-title" style={{marginBottom:6}}>{actClient.display_name||actClient.email||"Kunde"}</div>
        <div className="muted" style={{fontSize:13,marginBottom:14}}>{actClient.active===false?"Dieser Kunde ist deaktiviert und kann sich nicht einloggen.":"Verwalte diesen Kunden."}</div>
        {actClient.active===false
          ? <button className="btn" onClick={()=>setActive(actClient,true)}>Wieder aktivieren</button>
          : <button className="btn btn-ghost" onClick={()=>setActive(actClient,false)}>Deaktivieren</button>}
        <button className="btn" style={{marginTop:10,background:"var(--accent)"}} onClick={()=>delClient(actClient)}>Endgültig löschen</button>
        <button className="btn btn-ghost" style={{width:"100%",marginTop:8}} onClick={()=>setActClient(null)}>Abbrechen</button>
      </div>
    </>}
  </div>;
}

function CoachDashboard({clients,onOpen,toast,unread,onChat}){
  const t=today();
  const mondayOf=(d)=>{ const x=new Date(d); x.setHours(0,0,0,0); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); return x; };
  const [weekOffset,setWeekOffset]=useState(0);
  const [selDate,setSelDate]=useState(t);
  const weekStart=addDays(mondayOf(new Date()), weekOffset*7);
  const weekDates=Array.from({length:7}).map((_,i)=>dstr(addDays(weekStart,i)));
  const changeWeek=(delta)=>{ const no=weekOffset+delta; const ws=addDays(mondayOf(new Date()), no*7); const wd=Array.from({length:7}).map((_,i)=>dstr(addDays(ws,i))); setWeekOffset(no); setSelDate(wd[3]); };
  const selWd=(new Date(selDate+"T00:00:00").getDay()+6)%7; // 0=Mo
  const due=(clients||[]).filter(c=>c.checkin_weekday===selWd);
  const greet=(()=>{ const h=new Date().getHours(); if(h<11) return "Guten Morgen"; if(h<17) return "Hallo"; return "Guten Abend"; })();

  // Kalender ohne "Zukunft sperren" (Coach darf vor/zurück frei)
  const monthLabel=new Date(weekDates[0]+"T00:00:00").toLocaleDateString("de-DE",{month:"long",year:"numeric"});

  return <div className="dash">
    <div className="dashgreet">{greet}, Coach.</div>
    <div className="card wkcal">
      <div className="card-h"><span className="ch-l"><Icon name="checkin"/>Kalender</span>
        <div className="calnav"><button className="cnav" onClick={()=>changeWeek(-1)} aria-label="Woche zurück">‹</button><span className="cmonth">{monthLabel}</span><button className="cnav" onClick={()=>changeWeek(1)} aria-label="Woche vor">›</button></div>
      </div>
      <div className="calstrip">{weekDates.map(d=>{ const isSel=d===selDate; const isToday=d===t;
        return <button key={d} className="calcol" onClick={()=>setSelDate(d)}>
          <div className="cwd">{["MO","DI","MI","DO","FR","SA","SO"][(new Date(d+"T00:00:00").getDay()+6)%7]}</div>
          <div className={"cdate"+(isSel?" sel":"")+(isToday&&!isSel?" today":"")}>{d.split("-")[2]}</div>
          <div className="cdot"/>
        </button>;
      })}</div>
    </div>

    {unread>0 && <div className="card cardtap" onClick={()=>onChat&&onChat()}>
      <div className="card-h"><span className="ch-l"><Icon name="chat"/>Nachrichten</span><span className="unread-badge">{unread}</span></div>
      <div className="muted" style={{fontSize:13}}>{unread===1?"1 ungelesene Nachricht":unread+" ungelesene Nachrichten"}</div>
    </div>}

    <div className="sectlabel">Check-in {selDate===t?"heute":"am "+weekdayShort(selDate)+", "+fmtDay(selDate)}</div>
    {clients===null && <div className="muted">Lädt…</div>}
    {clients!==null && due.length===0 && <div className="mcard"><div className="muted">Kein Kunde hat an diesem Tag Check-in.</div></div>}
    {due.map(c=>{ const nm=c.display_name||c.email||"Kunde";
      return <button key={c.id} className="clientrow" onClick={()=>onOpen(c)}>
        <div className="avatar">{c.avatar_url?<img src={c.avatar_url} alt=""/>:initials(nm)}</div>
        <div style={{flex:1,minWidth:0}}><div className="nm">{nm}</div><div className="sub">Check-in fällig</div></div>
        <div className="chev">›</div></button>;
    })}
  </div>;
}

// Interne Login-Domain: ein Benutzername wird daraus zu einer Schein-Mail (name@nk.coach).
// Wird nie verschickt, nur als eindeutige Login-Kennung benutzt. Beim Onboarding tauscht
// die onboard-client Edge Function diese Schein-Mail gegen die echte Mail des Kunden.
const LOGIN_DOMAIN="@nk.coach";
const looksLikeEmail=(s)=>(s||"").indexOf("@")>0;
const userToEmail=(s)=>{ const v=(s||"").trim().toLowerCase(); return looksLikeEmail(v)?v:v+LOGIN_DOMAIN; };
const validUsername=(s)=>/^[a-z0-9][a-z0-9._-]{1,30}$/.test((s||"").trim().toLowerCase());

function CreateClientSheet({onClose,onCreate,onCreated,toast}){
  const [username,setUsername]=useState("");
  const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);
  const [done,setDone]=useState(null); // {username, pw} nach Erfolg
  const gen=()=>{ const chars="abcdefghijkmnpqrstuvwxyzABCDEFGHJKMNPQRSTUVWXYZ23456789"; setPw(Array.from(crypto.getRandomValues(new Uint8Array(10))).map(b=>chars[b%chars.length]).join("")); };
  const submit=async()=>{
    const u=username.trim().toLowerCase();
    if(!validUsername(u)){ setMsg({type:"err",text:"Benutzername: 2–31 Zeichen, nur Buchstaben, Zahlen, . _ - (kein @, keine Leerzeichen)."}); return; }
    if(pw.length<8){ setMsg({type:"err",text:"Das Start-Passwort muss mindestens 8 Zeichen haben."}); return; }
    setBusy(true); setMsg(null);
    const r=await onCreate(u+LOGIN_DOMAIN,pw);
    if(r && r.ok){ setDone({username:u,pw}); toast("Kunde angelegt"); }
    else { setMsg({type:"err",text:(r&&r.error)||"Konnte Kunden nicht anlegen."}); setBusy(false); }
  };
  return <>
    <div className="scrim" onClick={done?onCreated:onClose}/>
    <div className="sheet">
      {!done ? <>
        <h3>Neuen Kunden anlegen</h3>
        <div className="muted" style={{marginBottom:14}}>Du legst Login-Daten an. Der Kunde meldet sich zuerst mit Benutzername + Passwort an und hinterlegt beim Onboarding seine echte E-Mail.</div>
        <Field label="Benutzername (Login)" value={username} onChange={setUsername} placeholder="z.B. max.mueller"/>
        <div className="field"><label>Start-Passwort</label>
          <div className="mini" style={{gap:8}}>
            <input style={{flex:1}} value={pw} onChange={(e)=>setPw(e.target.value)} placeholder="mind. 8 Zeichen"/>
            <button className="btn btn-ghost" style={{width:"auto",padding:"0 14px"}} onClick={gen}>Würfeln</button>
          </div>
        </div>

function Auth(){
  const [mode,setMode]=useState("login"); // login | forgot
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [stay,setStay]=useState(true);
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null); // {type, text}
  const live = !!window.supa;

  const loginPw=async()=>{
    const raw=email.trim().toLowerCase();
    if(!raw){ setMsg({type:"err",text:"Bitte gib deine E-Mail oder deinen Benutzernamen ein."}); return; }
    if(!pw){ setMsg({type:"err",text:"Bitte gib dein Passwort ein."}); return; }
    if(!live){ setMsg({type:"err",text:"Login noch nicht aktiv: Bitte die Supabase-Zugangsdaten in der Datei eintragen."}); return; }
    const mail=userToEmail(raw);
    setBusy(true); setMsg(null);
    try{
      const { error } = await window.supa.auth.signInWithPassword({ email: mail, password: pw });
      if(error) throw error;
    }catch(e){
      setMsg({type:"err",text:"Login fehlgeschlagen: "+(e.message||"E-Mail/Benutzername oder Passwort falsch")});
      setBusy(false);
    }
  };

  const sendReset=async()=>{
    const mail=email.trim().toLowerCase();
    if(!mail || mail.indexOf("@")<1){ setMsg({type:"err",text:"Passwort-Reset geht nur mit einer echten E-Mail. Wenn du dich mit Benutzernamen anmeldest, frag deinen Coach nach einem neuen Passwort."}); return; }
    if(!live){ setMsg({type:"err",text:"Login noch nicht aktiv."}); return; }
    setBusy(true); setMsg(null);
    try{
      const { error } = await window.supa.auth.resetPasswordForEmail(mail, { redirectTo: location.origin + location.pathname });
      if(error) throw error;
      setMsg({type:"ok",text:"Wir haben dir einen Link an "+mail+" geschickt. Öffne ihn auf diesem Gerät, um ein neues Passwort zu setzen."});
    }catch(e){
      setMsg({type:"err",text:"Konnte den Link nicht senden: "+(e.message||"Unbekannter Fehler")});
    }finally{ setBusy(false); }
  };

  return <div className="center">
    <div style={{marginBottom:24}}><img className="logo-auth" src={LOGO} alt="NK"/><div className="tagline">Dein Coaching. Ans Leben angepasst.</div></div>
    <div className="card">
      {mode==="login" ? <>
        <h2 style={{fontSize:22,marginBottom:14}}>Einloggen</h2>
        <Field label="E-Mail oder Benutzername" value={email} onChange={setEmail} placeholder="du@mail.de oder benutzername"/>
        <Field label="Passwort" type="password" value={pw} onChange={setPw} placeholder="••••••••"/>
        <label style={{display:"flex",alignItems:"center",gap:9,margin:"4px 2px 14px",fontSize:14,color:"var(--dim)",cursor:"pointer"}}>
          <Toggle on={stay} onClick={()=>setStay(!stay)}/> Angemeldet bleiben
        </label>
        <button className="btn" disabled={busy} onClick={loginPw}>{busy?"Einloggen…":"Einloggen"}</button>
        <button className="link" style={{display:"block",margin:"14px auto 0",color:"var(--dim)"}} onClick={()=>{ setMode("forgot"); setMsg(null); }}>Passwort vergessen?</button>
      </> : <>
        <h2 style={{fontSize:22,marginBottom:6}}>Passwort zurücksetzen</h2>
        <div className="muted" style={{marginBottom:14,fontSize:13.5}}>Gib deine E-Mail ein – wir schicken dir einen Link, um ein neues Passwort zu setzen.</div>
        <Field label="E-Mail" type="email" value={email} onChange={setEmail} placeholder="du@mail.de"/>
        <button className="btn" disabled={busy} onClick={sendReset}>{busy?"Wird gesendet…":"Link senden"}</button>
        <button className="link" style={{display:"block",margin:"14px auto 0",color:"var(--dim)"}} onClick={()=>{ setMode("login"); setMsg(null); }}>‹ Zurück zum Login</button>
      </>}
      {msg && <div className={"authmsg "+msg.type}>{msg.text}</div>}
      {!live && <div className="authnote">Hinweis für die Einrichtung: Trage oben in der Datei deine Supabase&#8209;URL und den anon&#8209;Key ein, dann ist der Login scharf.</div>}
    </div>
  </div>;
}

function RecoveryScreen({onDone,toast}){
  const [pw,setPw]=useState(""); const [pw2,setPw2]=useState("");
  const [busy,setBusy]=useState(false); const [msg,setMsg]=useState(null);
  const [done,setDone]=useState(false);
  const standalone = (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) || window.navigator.standalone === true;

      toast("Neues Passwort gespeichert");

  return <div className="center">

function Onboarding({session,profile,onDone,onSignOut,toast}){
  const [name,setName]=useState((profile&&profile.display_name)||"");
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [pw2,setPw2]=useState("");
  const [avatarData,setAvatarData]=useState("");
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);
  const uid = session && session.user && session.user.id;

  const submit=async()=>{
    const nm=name.trim().replace(/\s+/g," "); const mail=email.trim().toLowerCase();
    if(!nm || !/\s/.test(nm) || nm.split(" ").some(p=>p.length<2)){ setMsg({type:"err",text:"Bitte gib deinen vollständigen Vor- und Nachnamen ein (kein Benutzername)."}); return; }
    if(!mail || mail.indexOf("@")<1){ setMsg({type:"err",text:"Bitte gib eine gültige E-Mail ein."}); return; }
    if(pw.length<8){ setMsg({type:"err",text:"Das neue Passwort muss mindestens 8 Zeichen haben."}); return; }
    if(pw!==pw2){ setMsg({type:"err",text:"Die Passwörter stimmen nicht überein."}); return; }
    setBusy(true); setMsg(null);
    try{
      // 1) Optional Profilbild zuerst hochladen (client-seitig, unkritisch)
      let avatarUrl=(profile&&profile.avatar_url)||"";
      if(avatarData){
        try{
          const blob=await (await fetch(avatarData)).blob();
          const ext=(blob.type.split("/")[1]||"jpg").replace("jpeg","jpg");
          const path=uid+"/avatar."+ext;
          const { error:upErr } = await window.supa.storage.from("avatars").upload(path, blob, { upsert:true, contentType:blob.type });
          if(!upErr){ const { data:pub } = window.supa.storage.from("avatars").getPublicUrl(path); avatarUrl=pub.publicUrl+"?t="+Date.now(); }
        }catch(e){ /* Bild ist optional */ }
      }

      // 2) E-Mail + Passwort + Profil serverseitig setzen (Admin-API, sofort & ohne Bestätigung)
      const { data:fnData, error:fnErr } = await window.supa.functions.invoke("onboard-client", {
        body: { name:nm, email:mail, password:pw },
      });
      if(fnErr){
        let m=fnErr.message||"Konnte nicht speichern.";
        try{ const ctx=fnErr.context; if(ctx && typeof ctx.json==="function"){ const j=await ctx.json(); if(j&&j.error) m=j.error; } }catch(_e){}
        throw new Error(m);
      }
      if(fnData && fnData.error) throw new Error(fnData.error);

      // 3) Avatar separat ins Profil schreiben (Function setzt Name/E-Mail/onboarded)
      if(avatarUrl){ try{ await window.supa.from("profiles").update({ avatar_url:avatarUrl }).eq("id",uid); }catch(_e){} }

      // 4) Frisch mit den neuen Zugangsdaten anmelden, damit die Sitzung gültig bleibt
      try{ await window.supa.auth.signInWithPassword({ email:mail, password:pw }); }catch(_e){}

      toast("Willkommen, "+nm.split(/\s+/)[0]+"!");
      onDone();
    }catch(e){
      setMsg({type:"err",text:"Konnte nicht speichern: "+(e.message||"Unbekannter Fehler")});
      setBusy(false);
    }
  };

  return <div className="center">
    <div style={{marginBottom:20}}><img className="logo-auth" src={LOGO} alt="NK"/></div>
    <div className="card">
      <h2 style={{fontSize:21,marginBottom:4}}>Profil einrichten</h2>
      <div className="muted" style={{marginBottom:16,fontSize:13.5}}>Schön, dass du dabei bist! Richte einmalig dein Profil ein, dann geht's los.</div>
      <div className="setavatar" style={{marginBottom:8}}>
        <div className="big">{avatarData ? <img src={avatarData} alt=""/> : initials(name||"?")}</div>
        <label className="link" style={{cursor:"pointer"}}>
          <span>{avatarData ? "Anderes Bild" : "Profilbild wählen (optional)"}</span>
          <input type="file" accept="image/*" style={{display:"none"}} onChange={(e)=>{ const f=e.target.files[0]; if(f) readToData(f,setAvatarData); e.target.value=""; }}/>
        </label>
      </div>
      <Field label="Name" value={name} onChange={setName} placeholder="Vor- und Nachname" autoCap="words"/>
      <Field label="Deine echte E-Mail" type="email" value={email} onChange={setEmail} placeholder="du@mail.de"/>
      <Field label="Neues Passwort" type="password" value={pw} onChange={setPw} placeholder="mind. 8 Zeichen"/>
      <Field label="Passwort wiederholen" type="password" value={pw2} onChange={setPw2} placeholder="nochmal eingeben"/>
      <button className="btn" disabled={busy} onClick={submit}>{busy?"Speichert…":"Profil speichern & loslegen"}</button>
      {msg && <div className={"authmsg "+msg.type}>{msg.text}</div>}
      <div style={{textAlign:"center",marginTop:14}}><button className="link" style={{color:"var(--faint)"}} onClick={onSignOut}>Abmelden</button></div>
    </div>
  </div>;
}

async function checkJourneyStreak(stage){
  try{
    const {data:logs}=await window.supa.from("habit_logs").select("date").eq("habit_id",stage.streak_habit_id).eq("done",true).order("date",{ascending:false}).limit(stage.streak_days+3);
    if(!logs||logs.length<stage.streak_days) return false;
    const ds=new Set(logs.map(l=>l.date));
    for(let i=0;i<stage.streak_days;i++){const d=new Date();d.setDate(d.getDate()-i);if(!ds.has(d.toISOString().slice(0,10))) return false;}
    return true;
  }catch(e){return false;}
}

// StageForm is a TOP-LEVEL component (not nested) to prevent keyboard-loses-focus bug
const JNY_ICON_CHOICES=["mountains","bulb","sliders","target","rocket","star","flame","muscle","droplet","food","chest","wheat"];
const JNY_DEFAULT_ICONS=["mountains","bulb","sliders","target","rocket"];
function jnyStageIcon(st,index){ if(st.icon) return st.icon; return JNY_DEFAULT_ICONS[index]||"flag"; }
function jnyHabitIcon(name){
  const n=(name||"").toLowerCase();
  if(/wasser|trink|hydr|getränk/.test(n)) return "droplet";
  if(/wieg|waage|gewicht|scale/.test(n)) return "weight";
  if(/protein|mahlzeit|essen|ernähr|kalorie|food|eat/.test(n)) return "food";
  if(/schlaf|sleep|bett/.test(n)) return "moon";
  if(/training|sport|gym|workout|kraft|übung|muscle/.test(n)) return "muscle";
  if(/kohlenhydrat|carb|brot|reis/.test(n)) return "wheat";
  return "flame";
}
// resolve linked habits array (new model) with fallback to single streak_habit (old)
function jnyStageHabits(st){
  if(Array.isArray(st.stage_habits)&&st.stage_habits.length) return st.stage_habits;
  if(st.streak_habit_id) return [{id:st.streak_habit_id,days:st.streak_days||7}];
  return [];
}

const LockIcon=()=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>;

function ClientJourneyStage({st,index,state,habitsMap,habitStreaks,onToggleSub,isLast}){
  const isDone=state==="done", isActive=state==="active", isLocked=state==="locked";
  const subs=Array.isArray(st.substeps)?st.substeps:[];
  const shs=jnyStageHabits(st).filter(h=>h.id&&habitsMap&&habitsMap[h.id]);
  const perPct=shs.map(h=>Math.min(1,(habitStreaks?.[h.id]||0)/(h.days||7)));
  const overall=shs.length?Math.round(perPct.reduce((a,b)=>a+b,0)/shs.length*100):0;
  const canOpen=!isLocked&&(subs.length||shs.length||(isDone&&st.completed_at));
  const [open,setOpen]=useState(isActive);
  const ico=jnyStageIcon(st,index);
  return <div className="jny-row">
    <div className="jny-lc">
      <div className={"jny-circ "+state}>{isDone?"✓":isActive?<div className="jny-inner-dot"/>:<LockIcon/>}</div>
      {!isLast&&<div className={"jny-vline"+(isLocked?" dashed":"")}/>}
    </div>
    <div className="jny-rc">
      <div className={"jny-card "+state}>
        <div className={"jny-chead"+(canOpen?"":" nopt")} onClick={()=>canOpen&&setOpen(o=>!o)}>
          <div className="jny-chl">
            <div className="jny-statusrow"><span className="jny-num">{index+1}</span><span className="jny-status">{isDone?"Abgeschlossen":isActive?"Aktuell":"Noch gesperrt"}</span></div>

            {st.description&&<div className="jny-desc">{st.description}</div>}
          </div>
          {isLocked&&canOpen?<div className="jny-chevr"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 6 15 12 9 18"/></svg></div>
            :<div className={"jny-icocirc"+(isLocked?" lock":"")}><Icon name={ico}/></div>}
        </div>
        <div className={"jny-body-wrap"+(open&&canOpen?" open":"")}>
          <div className="jny-body-inner"><div className="jny-body">
            {isActive&&shs.length>0&&<div className="jny-psec">
              <div className="jny-plbl">Fortschritt</div>
              <div className="jny-prow"><div className="jny-pbar"><div className="jny-pfill" style={{width:overall+"%"}}/></div><span className="jny-ppct">{overall} %</span></div>

              <div className="jny-plbl">{isActive?"Aktive Habits":"Habits"}</div>

                <div className="jny-hic"><Icon name={jnyHabitIcon(habitsMap[h.id]?.name)}/></div>
                <div className="jny-hname">{habitsMap[h.id]?.name}</div>
                <div className="jny-hstreak"><div className="jny-hsnum">{streak}</div><div className="jny-hslbl">TAGE STREAK</div></div>
                <div className={"jny-hflame"+(hot?"":" cold")}><Icon name="flame"/></div>
              </div>; })}
            </div>}
            {subs.length>0&&<div className="jny-ssec">
              <div className="jny-plbl">Schritte</div>
              {subs.map(sub=><div key={sub.id} className="jny-sitem">

      <div style={{display:"flex",gap:8}}>

function JourneyTab({clientId,role,toast}){
  const [myId,setMyId]=useState(null);
  const [journey,setJourney]=useState(undefined);
  const [stages,setStages]=useState([]);
  const [habits,setHabits]=useState([]);
  const [habitsMap,setHabitsMap]=useState({});
  const [habitStreaks,setHabitStreaks]=useState({});
  const [tableErr,setTableErr]=useState(false);
  const load=async()=>{
    try{
      const {data:j,error:je}=await window.supa.from("journeys").select("*").eq("client_id",clientId).maybeSingle();
      if(je){if(je.code==="42P01"||String(je.message).includes("exist")){setTableErr(true);setJourney(null);return;}throw je;}
      setJourney(j||null);
      if(j){
        const {data:ss}=await window.supa.from("journey_stages").select("*").eq("journey_id",j.id).order("position",{ascending:true});
        let list=ss||[];
        // gather all referenced habit ids
        const allIds=[...new Set(list.flatMap(st=>jnyStageHabits(st).map(h=>h.id)).filter(Boolean))];
        let streaks={};
        if(allIds.length){
          const since=new Date(); since.setDate(since.getDate()-200);
          const {data:logs}=await window.supa.from("habit_logs").select("habit_id,date,done").in("habit_id",allIds).eq("done",true).gte("date",since.toISOString().slice(0,10));
          const byH={}; for(const l of (logs||[])){ if(!byH[l.habit_id]) byH[l.habit_id]=new Set(); byH[l.habit_id].add(l.date); }
          for(const hid of allIds){ const ds=byH[hid]||new Set(); let k=0; for(let i=0;i<200;i++){const d=new Date();d.setDate(d.getDate()-i);if(ds.has(d.toISOString().slice(0,10)))k++;else break;} streaks[hid]=k; }
          const {data:hs}=await window.supa.from("habits").select("id,name").in("id",allIds);
          const hmap={}; for(const h of (hs||[])) hmap[h.id]=h; setHabitsMap(hmap);
        }
        setHabitStreaks(streaks);
        // auto-complete: all linked habits reached target
        for(const st of list){
          if(!st.completed&&st.completion_type==="auto"){
            const sh=jnyStageHabits(st).filter(h=>h.id);
            if(sh.length&&sh.every(h=>(streaks[h.id]||0)>=(h.days||7))){
              await window.supa.from("journey_stages").update({completed:true,completed_at:new Date().toISOString()}).eq("id",st.id); st.completed=true; st.completed_at=new Date().toISOString();
            }
          }
        }
        setStages(list);
        if(role==="coach"){
          const {data:hs}=await window.supa.from("habits").select("id,name").eq("client_id",clientId).eq("archived",false).order("position");
          setHabits(hs||[]);
        }
      }
    }catch(e){toast("Journey: "+e.message);setJourney(null);}
  };
  useEffect(()=>{(async()=>{try{const {data}=await window.supa.auth.getUser();setMyId(data?.user?.id||null);}catch(e){}})();},[]);
  useEffect(()=>{if(clientId)load();},[clientId]);
  const toggleSub=async(st,subId)=>{
    const subs=(Array.isArray(st.substeps)?st.substeps:[]).map(x=>x.id===subId?{...x,done:!x.done}:x);
    setStages(list=>list.map(x=>x.id===st.id?{...x,substeps:subs}:x));
    try{ await window.supa.from("journey_stages").update({substeps:subs}).eq("id",st.id); }catch(e){ toast("Fehler beim Speichern"); load(); }
  };
  const createJourney=async()=>{
    try{
      const {data:j,error}=await window.supa.from("journeys").insert({client_id:clientId,coach_id:myId,title:"Deine Reise",start_state:"Unstrukturiert, ohne klaren Plan.",goal_state:"Gesunder, starker Körper — Fitness als fester Lebensbestandteil."}).select().single();
      if(error)throw error;
      await window.supa.from("journey_stages").insert(DEFAULT_JOURNEY_STAGES.map((st,i)=>({...st,journey_id:j.id,substeps:[],stage_habits:[],icon:JNY_DEFAULT_ICONS[i]||null})));
      await load();
    }catch(e){toast("Fehler: "+e.message);}
  };
  if(journey===undefined) return <div className="mbody"><div className="muted">Lädt…</div></div>;
  if(tableErr) return <div className="mbody"><div className="mcard"><div style={{fontWeight:700,marginBottom:6}}>Migration nötig</div><div className="muted" style={{fontSize:13}}>Führe die Journey-SQL-Migration in Supabase aus.</div></div></div>;
  if(role==="coach") return <CoachJourneyEditor journey={journey} stages={stages} habits={habits} journeyId={journey?.id} toast={toast} onRefresh={load} onCreate={createJourney} myId={myId}/>;
  return <ClientJourneyView journey={journey} stages={stages} habitsMap={habitsMap} habitStreaks={habitStreaks} onToggleSub={toggleSub}/>;
}

function JourneyMiniCard({clientId,go}){
  const [data,setData]=useState(undefined);
  useEffect(()=>{(async()=>{try{const {data:j}=await window.supa.from("journeys").select("id,title").eq("client_id",clientId).maybeSingle();if(!j){setData(null);return;}const {data:ss}=await window.supa.from("journey_stages").select("id,title,completed,position").eq("journey_id",j.id).order("position",{ascending:true});setData({j,stages:ss||[]});}catch(e){setData(null);}})();},[clientId]);
  if(!data)return null;
  const {stages}=data; const total=stages.length; if(!total)return null;
  const done=stages.filter(s=>s.completed).length; const current=stages.find(s=>!s.completed);
  return <div className="card cardtap" onClick={()=>go("journey")}>
    <div className="card-h"><span className="ch-l"><Icon name="flag"/>Deine Reise</span><span className="ch-count"><b>{done}</b> / {total}</span></div>
    {current&&<div className="jny-mini-stage">Stadium {stages.indexOf(current)+1}: {current.title}</div>}
    <div className="jny-mini-bar"><div className="jny-mini-fill" style={{width:done/total*100+"%"}}/></div>
  </div>;
}

function App(){
  const live = !!window.supa;
  const [screen,setScreen]=useState(live ? (window.__IS_RECOVERY__ ? "recovery" : "loading") : "auth"); // loading | auth | redeem | app | recovery
  const [session,setSession]=useState(null);
  const [profile,setProfile]=useState(null); // {id,email,role,coach_id,display_name}
  const [role,setRole]=useState("coach");     // aktive Ansicht (coach kann zu client wechseln)
  const [selfEdit,setSelfEdit]=useState(false); // Self-Coaching: false=Ansicht, true=Bearbeiten
  const [data,setData]=useState(SEED);
  const [openCid,setOpenCid]=useState(null);
  const [toastMsg,setToastMsg]=useState("");
  const [theme,setTheme]=useState(()=>{ try{ return localStorage.getItem("nk_theme")||"light"; }catch(e){ return "light"; } });
  const [shared,setShared]=useState([{id:"sf1",name:"Trainingsprinzipien.txt",mime:"text/plain",kind:"file",by:"coach",date:dstr(addDays(new Date(),-10)),url:"data:text/plain;charset=utf-8,"+encodeURIComponent("Progressive Overload. Konsistenz schlaegt Perfektion. Schlaf und Protein priorisieren. Fragen? Schreib mir jederzeit.")}]);
  useEffect(()=>{ document.documentElement.setAttribute("data-theme", theme); try{ localStorage.setItem("nk_theme",theme); }catch(e){} const mc=document.querySelector("meta[name=theme-color]"); if(mc) mc.setAttribute("content", "#FFFFFF"); },[theme]);
  useEffect(()=>{ if("serviceWorker" in navigator){ navigator.serviceWorker.register("/sw.js").catch(()=>{}); } },[]);
  const [pendingChat,setPendingChat]=useState(null); // {conv} bis App bereit ist
  useEffect(()=>{
    if(!("serviceWorker" in navigator)) return;
    const h=(ev)=>{ if(ev.data?.action==="open-chat") setPendingChat({conv:ev.data.conv||null}); };
    navigator.serviceWorker.addEventListener("message",h);
    return ()=>navigator.serviceWorker.removeEventListener("message",h);
  },[]);
  // Cache-Intent vom SW lesen (Kalt-Start + wenn App wieder sichtbar wird)
  const checkIntent=async()=>{
    try{
      const c=await caches.open("nk-intent");
      const r=await c.match("/__nk_intent");
      if(!r) return;
      const j=await r.json(); await c.delete("/__nk_intent");
      if(j&&j.action==="open-chat"&&Date.now()-(j.ts||0)<120000){ setPendingChat({conv:j.conv||null}); }
    }catch(e){}
  };
  useEffect(()=>{
    checkIntent();
    const t1=setTimeout(checkIntent,700), t2=setTimeout(checkIntent,1800);
    const onVis=()=>{ if(document.visibilityState==="visible") checkIntent(); };
    document.addEventListener("visibilitychange",onVis);
    return ()=>{ clearTimeout(t1); clearTimeout(t2); document.removeEventListener("visibilitychange",onVis); };
  },[]);
  // ── Ungelesene Nachrichten + In-App-Banner ───────────────────────────
  const [unread,setUnread]=useState(0);
  const [unreadByClient,setUnreadByClient]=useState({});
  const [banner,setBanner]=useState(null);
  const isCoachLike=!!(profile&&(profile.account_type==="coach"||profile.role==="coach"||profile.role==="admin"));
  const fetchUnread=async()=>{
    if(!live||!profile) return;
    try{
      if(isCoachLike){
        const {data}=await window.supa.from("messages").select("client_id").is("read_at",null).eq("sender_role","client");
        const map={}; (data||[]).forEach(r=>{ map[r.client_id]=(map[r.client_id]||0)+1; });
        setUnreadByClient(map); setUnread((data||[]).length);
      }else{
        const {count}=await window.supa.from("messages").select("id",{count:"exact",head:true}).is("read_at",null).eq("sender_role","coach").eq("client_id",profile.id);
        setUnread(count||0); setUnreadByClient({});
      }
    }catch(e){}
  };
  const openChatFromIntent=async(conv)=>{
    if(isCoachLike && conv){
      try{ const {data}=await window.supa.from("profiles").select("id,display_name,email,avatar_url,tools,active,coach_id").eq("id",conv).maybeSingle(); if(data){ setRole("coach"); setOpenCid(data); setTimeout(()=>window.dispatchEvent(new CustomEvent("nk:open-chat")),300); return; } }catch(_){}
    }
    setTimeout(()=>window.dispatchEvent(new CustomEvent("nk:open-chat")),200);
  };
  const openChatFromBanner=(b)=>{ setBanner(null); openChatFromIntent(b.clientId); };
  // Pending-Chat ausführen, sobald die App bereit ist (loest Kaltstart-Timing)
  useEffect(()=>{
    if(!pendingChat||screen!=="app"||!profile) return;
    const conv=pendingChat.conv; setPendingChat(null);
    openChatFromIntent(conv);
  },[pendingChat,screen,profile && profile.id]);
  useEffect(()=>{
    if(!live||!profile) return;
    fetchUnread();
    const relevant=isCoachLike?"client":"coach";
    const ch=window.supa.channel("msg-global-"+Math.random().toString(36).slice(2,7))
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},async(payload)=>{
        const m=payload.new; if(!m||m.sender_role!==relevant) return;
        if(!isCoachLike && m.client_id!==profile.id) return;
        fetchUnread();
        if(window.__activeChat===m.client_id) return;
        let nm=isCoachLike?"Kunde":"Coach", av=null;
        try{ if(m.sender_id){ const {data}=await window.supa.from("profiles").select("display_name,avatar_url").eq("id",m.sender_id).maybeSingle(); if(data){ if(data.display_name) nm=data.display_name; av=data.avatar_url||null; } } }catch(_){}
        const preview=m.kind==="text"?(m.body||""):(m.kind==="image"?"Foto":m.kind==="video"?"Video":m.kind==="audio"?"Sprachnachricht":"Neue Nachricht");
        setBanner({clientId:m.client_id,name:nm,avatar:av,text:preview});
        setTimeout(()=>setBanner(b=>(b&&b.clientId===m.client_id)?null:b),5000);
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"messages"},()=>{ fetchUnread(); })
      .subscribe();
    const onChg=()=>fetchUnread();
    window.addEventListener("nk:unread-changed",onChg);
    return ()=>{ try{ch.unsubscribe();}catch(_){} window.removeEventListener("nk:unread-changed",onChg); };
  },[live, profile && profile.id, isCoachLike]);
  // Heartbeat: meldet "aktiv", damit kein OS-Push kommt waehrend man in der App ist
  useEffect(()=>{
    if(!live||!session||!session.user) return;
    const uid=session.user.id;
    const beat=()=>{ try{ window.supa.from("profiles").update({last_active:new Date().toISOString()}).eq("id",uid).then(()=>{},()=>{}); }catch(e){} };
    beat();
    const iv=setInterval(()=>{ if(document.visibilityState==="visible") beat(); },10000);
    const onVis=()=>{ if(document.visibilityState==="visible") beat(); };
    document.addEventListener("visibilitychange",onVis);
    return ()=>{ clearInterval(iv); document.removeEventListener("visibilitychange",onVis); };
  },[live, session && session.user && session.user.id]);
  // Gesamtes Layout exakt auf die sichtbare Höhe schrumpfen -> nichts hinter der Tastatur -> kein Verschieben möglich. Header bleibt oben, Eingabefeld an der Tastatur.
  useEffect(()=>{
    const vv=window.visualViewport; const root=document.documentElement;
    let maxVH=0;
    const update=()=>{
      const vh=vv?vv.height:window.innerHeight;
      maxVH=Math.max(maxVH, vh); // volle sichtbare Höhe (Tastatur zu) = größter Wert
      const kbOpen=(maxVH - vh > 120);
      root.style.setProperty("--vh", maxVH+"px"); // volle Höhe -> Body deckt immer den Schirm -> keine schwarze Lücke
      root.style.setProperty("--kb", (kbOpen?(maxVH-vh):0)+"px"); // Tastaturhöhe
      root.classList.toggle("kb-open", kbOpen);
      if(kbOpen){ window.__kbH = maxVH - vh; } // Tastaturhöhe merken
    };
    update();
    if(vv){ vv.addEventListener("resize",update); vv.addEventListener("scroll",update); }
    window.addEventListener("resize",update);
    const onOrient=()=>{ maxVH=0; setTimeout(update,300); };
    window.addEventListener("orientationchange",onOrient);
    return ()=>{ if(vv){ vv.removeEventListener("resize",update); vv.removeEventListener("scroll",update); } window.removeEventListener("resize",update); window.removeEventListener("orientationchange",onOrient); };
  },[]);
  // Fokussiertes Feld SOFORT über die (gleich erscheinende) Tastatur heben -> iOS muss nicht verschieben -> kein Mitziehen/Ruckeln und kein schwarzer Leerraum. Nur innerer Bereich wird gescrollt. Chat hat eigene Logik.
  useEffect(()=>{
    const onFocus=(e)=>{
      const t=e.target;
      if(!t || (t.tagName!=="INPUT" && t.tagName!=="TEXTAREA")) return;
      if(t.closest && t.closest(".composer")) return;
      const sc=t.closest(".mbody, .anwiz-body, .center");
      if(!sc) return;
      const lift=(kbTopY)=>{
        try{
          const tr=t.getBoundingClientRect();
          const limit=kbTopY-24; // 24px Luft über der Tastatur
          if(tr.bottom>limit){ sc.scrollTop += (tr.bottom-limit); }
        }catch(_){ }
      };
      // sofort: anhand zuletzt bekannter Tastaturhöhe (oder Schätzung) das Feld hochziehen, BEVOR iOS reagiert
      const kb = window.__kbH || Math.round(window.innerHeight*0.46);
      lift(window.innerHeight - kb);
      // nach der Tastatur-Animation exakt nachziehen
      setTimeout(()=>{ const h=window.visualViewport?window.visualViewport.height:window.innerHeight; lift(h); }, 300);
    };
    document.addEventListener("focusin",onFocus);
    return ()=>document.removeEventListener("focusin",onFocus);
  },[]);
  const toast=(m)=>{ setToastMsg(m); setTimeout(()=>setToastMsg(""),1600); };

  // Profil laden (legt der DB-Trigger automatisch an; hier nur lesen)
  const loadProfile=async(uid,retries=3)=>{
    // Netzwerk-Aussetzer ("Load failed") sind vorübergehend -> mehrfach versuchen.
    for(let attempt=0; attempt<=retries; attempt++){
      try{
        const { data:p, error } = await window.supa.from("profiles").select("*").eq("id",uid).maybeSingle();
        if(error){
          if(attempt<retries){ await new Promise(r=>setTimeout(r,700*(attempt+1))); continue; }
          console.error("profile load error", error); return {__loadError:true};
        }
        return p; // p kann null sein, wenn (theoretisch) keine Zeile existiert
      }catch(e){
        if(attempt<retries){ await new Promise(r=>setTimeout(r,700*(attempt+1))); continue; }
        console.error("profile load exception", e); return {__loadError:true};
      }
    }
    return {__loadError:true};
  };

  // Session-Bootstrap + Auth-Listener
  useEffect(()=>{
    if(!live) return;
    // SICHERHEIT: Im Passwort-Recovery-Modus NIEMALS automatisch einloggen.
    // Supabase stellt beim Token-Parsing eine Session her – diese darf NICHT in die App routen,
    // sonst wäre man ohne neues Passwort eingeloggt. Session nur für updateUser bereithalten.
    if(window.__IS_RECOVERY__){
      window.supa.auth.getSession().then(({data})=>{ if(data && data.session) setSession(data.session); });
      const { data:rsub } = window.supa.auth.onAuthStateChange((event,sess)=>{ setSession(sess||null); });
      return ()=>{ rsub && rsub.subscription && rsub.subscription.unsubscribe(); };
    }
    let active=true;
    let routed=false;
    const route=async(prof)=>{
      if(!active) return;
      // SICHERHEIT: Ohne gültiges Profil NIEMALS eine Ansicht rendern (schon gar nicht Coach!).
      if(!prof || prof.__loadError){ setScreen("neterror"); return; }
      if(prof && prof.role==="client" && prof.active===false){
        // Deaktiviertes Kundenkonto: abmelden + Hinweis
        try{ window.supa.auth.signOut(); }catch(e){}
        setProfile(null); setSession(null); setScreen("auth");
        setTimeout(()=>toast("Dieses Konto wurde deaktiviert. Bitte wende dich an deinen Coach."),300);
        return;
      }
      setProfile(prof);
      const acct = (prof.account_type==="self_coach") ? "self_coach" : (prof.role==="client" ? "client" : "coach");
      setRole(acct);
      const needsSetup = prof && (prof.onboarded===false || (prof.email||"").endsWith(LOGIN_DOMAIN));
      if(acct==="self_coach"){
        setScreen(needsSetup ? "onboarding" : "app");   // Self-Coach: Profil-Setup ja, aber KEIN Anamnese-Gate
      }
      else if(prof && prof.role==="client" && needsSetup){ setScreen("onboarding"); }
      else if(prof && prof.role==="client"){
        // Anamnese-Gate: erst in die App, wenn die Anamnese abgeschickt wurde
        let sub=null; try{ const { data } = await window.supa.from("anamnese").select("id").eq("client_id",prof.id).maybeSingle(); sub=data; }catch(e){ sub={__skip:true}; }
        if(!active) return;
        setScreen(sub ? "app" : "anamnese");
      }
      else { setScreen("app"); }
      try{ history.replaceState({}, "", location.origin+location.pathname); }catch(e){}
    };
    const handle=async(sess)=>{
      if(!active) return;
      setSession(sess);
      if(!sess){ setProfile(null); setScreen("auth"); return; }
      // Profil laden (mit Retries). Hartes Timeout nur als Notbremse gegen ewiges Hängen.
      let prof=null;
      try{
        prof=await Promise.race([
          loadProfile(sess.user.id),
          new Promise((res)=>setTimeout(()=>res("__timeout__"),20000)),
        ]);
      }catch(e){ prof={__loadError:true}; }
      if(!active) return;
      if(prof==="__timeout__" || !prof || prof.__loadError){
        // NICHT in die App routen (kein Coach-Fallback!). Fehlerscreen mit Neu-laden.
        console.warn("profile load failed – showing error screen");
        setScreen("neterror");
        return;
      }
      route(prof);
    };
    // Initiale Session EINMAL prüfen…
    window.supa.auth.getSession().then(({data})=>{ if(!routed){ routed=true; handle(data.session); } });
    // …und auf spätere Auth-Wechsel reagieren (Login/Logout). Reine Token-Refreshes ignorieren.
    const { data:sub } = window.supa.auth.onAuthStateChange((event,sess)=>{
      if(event==="PASSWORD_RECOVERY"){ routed=true; setSession(sess); setScreen("recovery"); return; }
      if(event==="TOKEN_REFRESHED" || event==="INITIAL_SESSION") return;
      routed=true; handle(sess);
    });
    return ()=>{ active=false; sub && sub.subscription && sub.subscription.unsubscribe(); };
  },[live]);

  const refreshProfile=async()=>{ if(session){ const p=await loadProfile(session.user.id); setProfile(p); return p; } };

  const updClient=(cid,fn)=>setData(p=>({...p,[cid]:fn(p[cid])}));
  const addShared=(item)=>{ setShared(s=>[item,...s]); toast("Für alle bereitgestellt"); };
  const delShared=(id)=>setShared(s=>s.filter(x=>x.id!==id));
  const broadcast=async(body)=>{
    const text=(body||"").trim(); if(!text) return;
    if(!live){ setData(p=>{ const np={...p}; CLIENT_IDS.forEach(id=>{ np[id]={...np[id],messages:[...np[id].messages,{id:nid(),from:"coach",body:text,ts:Date.now()}]}; }); return np; }); toast("An "+CLIENT_IDS.length+" Kunden gesendet"); return; }
    try{
      const me=session&&session.user?session.user.id:null; if(!me) throw new Error("Nicht eingeloggt");
      const { data:cs, error } = await window.supa.from("profiles").select("id,active").eq("role","client").eq("coach_id",me); if(error) throw error;
      const targets=(cs||[]).filter(c=>c.active!==false);
      if(targets.length===0){ toast("Keine aktiven Kunden"); return; }
      const rows=targets.map(c=>({ client_id:c.id, sender_id:me, sender_role:"coach", kind:"text", body:text }));
      const { error:ie } = await window.supa.from("messages").insert(rows); if(ie) throw ie;
      toast("An "+targets.length+" Kunden gesendet");
    }catch(e){ toast("Senden fehlgeschlagen: "+(e.message||"")); }
  };

  const signOut=async()=>{ if(live){ try{ await window.supa.auth.signOut(); }catch(e){} } setOpenCid(null); setProfile(null); setSession(null); setScreen("auth"); };
  const switchRole=(r)=>{ setRole(r); if(r!=="coach") setOpenCid(null); };

  // Kunden-Account über die Edge Function anlegen (nur Coach/Admin)
  // Wir nutzen supa.functions.invoke: hängt das Login-Token korrekt an und umgeht CORS-Fallstricke.
  const createClientAccount=async(email,password)=>{
    if(!live) return { error:"Login nicht aktiv." };
    try{
      const { data:{ session:s } } = await window.supa.auth.getSession();
      if(!s || !s.access_token) return { error:"Sitzung abgelaufen – bitte neu einloggen." };
      const { data, error } = await window.supa.functions.invoke("create-client", {
        body: { email, password },
      });
      if(error){
        // Fehlertext der Function herausziehen, wenn vorhanden
        let msg = error.message || "Konto konnte nicht erstellt werden.";
        try{
          const ctx = error.context;
          if(ctx && typeof ctx.json === "function"){ const j = await ctx.json(); if(j && j.error) msg = j.error; }
        }catch(_e){}
        return { error: msg };
      }
      if(data && data.error) return { error: data.error };
      return { ok:true };
    }catch(e){ return { error: e.message || "Unerwarteter Fehler." }; }
  };
  const copy=async(t)=>{ const ok=await copyText(t); toast(ok?"Kopiert":"Konnte nicht kopieren"); };

  let view;
  const isAdmin=!!(profile&&(profile.is_admin===true||profile.role==="admin"));
  const modes=[];
  if(isAdmin) modes.push("admin");
  if(profile&&(profile.account_type==="coach"||profile.role==="coach"||profile.role==="admin")) modes.push("coach");
  if(profile&&(profile.self_coach||profile.account_type==="self_coach")) modes.push("self_coach");
  if(profile&&profile.account_type==="client"&&profile.role==="client"&&!profile.self_coach) modes.push("client");
  if(screen==="loading") return <Splash/>;
  else if(screen==="auth") view=<Auth/>;
  else if(screen==="neterror") view=<NetError onRetry={()=>{ try{ location.reload(); }catch(e){ setScreen("loading"); } }}/>;
  else if(screen==="recovery") view=<RecoveryScreen toast={toast} onDone={async()=>{ const p=await refreshProfile(); setRole(p&&p.role==="client"?"client":"coach"); if(p&&p.role==="client"&&p.onboarded===false){ setScreen("onboarding"); } else { setScreen("app"); } }}/>;
  else if(screen==="onboarding") view=<Onboarding session={session} profile={profile} onDone={async()=>{ const p=await refreshProfile(); if(p&&p.account_type==="self_coach"){ setRole("self_coach"); setScreen("app"); } else { setRole("client"); setScreen("anamnese"); } }} onSignOut={signOut} toast={toast}/>;
  else if(screen==="anamnese") view=<AnamneseWizard clientId={profile&&profile.id} toast={toast} onSignOut={signOut} onDone={async()=>{ setRole("client"); setScreen("notify"); }}/>;
  else if(screen==="notify") view=<NotifyPrompt onDone={()=>setScreen("app")} toast={toast}/>;
  else if(role==="admin") view=<AdminPanel modes={modes} onSwitch={switchRole} onSignOut={signOut} theme={theme} setTheme={setTheme} toast={toast}/>;
  else if(role==="self_coach"){ const myId=profile&&profile.id; const myName=(profile&&(profile.display_name||profile.email))||"Ich"; const _baseSelf={plan:true,food:true,habits:true,checkin:true,weight:true,journey:true,chat:false,cloud:false,call:false}; const selfTools=(profile&&profile.account_type==="self_coach")?{..._baseSelf,...((profile&&profile.tools)||{})}:_baseSelf; const cd={...data["tim"], name:myName, avatarUrl:(profile&&profile.avatar_url)||data["tim"].avatarUrl}; view=<ClientWorkspace cid={"tim"} cdata={cd} upd={(fn)=>updClient("tim",fn)} viewerRole={selfEdit?"coach":"client"} selfMode={true} selfEdit={selfEdit} onToggleSelfEdit={()=>setSelfEdit(e=>!e)} name={myName} onSignOut={signOut} toast={toast} theme={theme} setTheme={setTheme} shared={shared} addShared={addShared} delShared={delShared} live={live} clientId={myId} onRefresh={refreshProfile} modes={modes} mode={"self_coach"} onMode={switchRole} tools={selfTools}/>; }
  else if(role==="client"){ const cid="tim"; const realName=(profile&&(profile.display_name||profile.email))||data[cid].name; const cd={...data[cid], name:realName, avatarUrl:(profile&&profile.avatar_url)||data[cid].avatarUrl}; view=<ClientWorkspace cid={cid} cdata={cd} upd={(fn)=>updClient(cid,fn)} viewerRole="client" name={realName} onSwitch={switchRole} onSignOut={signOut} toast={toast} theme={theme} setTheme={setTheme} shared={shared} addShared={addShared} delShared={delShared} live={live} clientId={profile&&profile.id} onRefresh={refreshProfile} modes={modes} mode={role} onMode={switchRole} tools={profile&&profile.tools} unread={unread}/>; }
  else if(openCid){ const nm=(openCid.display_name||openCid.email||data[openCid]&&data[openCid].name)||"Kunde"; const cd=data["tim"]; view=<ClientWorkspace cid={"tim"} cdata={cd} upd={(fn)=>updClient("tim",fn)} viewerRole="coach" name={nm} onBack={()=>setOpenCid(null)} onSwitch={switchRole} onSignOut={signOut} toast={toast} theme={theme} setTheme={setTheme} shared={shared} addShared={addShared} delShared={delShared} live={live} clientId={openCid&&openCid.id} partnerAvatar={openCid&&openCid.avatar_url} onRefresh={refreshProfile} modes={modes} mode={role} onMode={switchRole} tools={openCid&&openCid.tools} canCall={!(profile&&profile.tools&&profile.tools.call===false)}/>; }
  else if(live) view=<CoachHome onOpen={setOpenCid} onCreate={createClientAccount} onSwitch={switchRole} onSignOut={signOut} theme={theme} setTheme={setTheme} onBroadcast={broadcast} toast={toast} onRefresh={refreshProfile} modes={modes} mode={"coach"} onMode={switchRole} unread={unread} unreadByClient={unreadByClient}/>;
  else view=<CoachClientList clients={CLIENT_IDS.map(id=>({id,name:data[id].name}))} data={data} onOpen={setOpenCid} onInvite={()=>{}} invite={null} onCopy={copy} viewerRole={role} onSwitch={switchRole} onSignOut={signOut} theme={theme} setTheme={setTheme} onBroadcast={broadcast}/>;

  return <>{view}{banner && <div className="msg-banner" onClick={()=>openChatFromBanner(banner)}>
    <div className="mb-av">{banner.avatar?<img src={banner.avatar} alt=""/>:initials(banner.name)}</div>
    <div className="mb-body"><div className="mb-name">{banner.name}</div><div className="mb-text">{banner.text}</div></div>
    <button className="mb-x" onClick={(e)=>{e.stopPropagation();setBanner(null);}} aria-label="Schließen">×</button>
  </div>}{toastMsg && <div className="toast">{toastMsg}</div>}<ConfirmHost/></>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
