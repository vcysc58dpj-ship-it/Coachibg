<style>
  :root{
    --bg:#131111; --bg-2:#1D1A19; --bg-3:#272220;
    --line:rgba(236,231,226,0.10); --line-2:rgba(236,231,226,0.17);
    --text:#ECE7E2; --dim:#A49C96; --faint:#766C66;
    --accent:#E11D2E; --accent-2:#ff4350; --on-accent:#ffffff; --ok:#74C28C; --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:"Hanken Grotesk",-apple-system,system-ui,sans-serif;color:var(--text);
    background:radial-gradient(125% 60% at 50% -12%, rgba(225,29,46,0.13), transparent 60%), var(--bg);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:none;}
  #root{height:100vh;height:100dvh;}
  .app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;overflow:hidden;}
  h1,h2,h3{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;letter-spacing:-0.02em;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:var(--on-accent);
    font-weight:700;font-size:16px;padding:14px 18px;border-radius:14px;width:100%;transition:transform .06s ease,opacity .2s;}
  .btn:active{transform:scale(.985);} .btn:disabled{opacity:.5;}
  .btn-ghost{background:var(--bg-3);color:var(--text);font-weight:600;}
  .link{color:var(--accent-2);font-weight:600;padding:0;font-size:15px;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;color:var(--dim);margin:0 0 6px 2px;font-weight:600;}
  .field input{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:16px;
    padding:13px 14px;border-radius:12px;outline:none;transition:border-color .15s,background .15s;}
  .field input::placeholder{color:var(--faint);}
  .field input:focus{border-color:var(--accent);background:#322824;}

  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);padding:20px;}

  .center{min-height:100dvh;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;max-width:560px;margin:0 auto;width:100%;box-sizing:border-box;}
  .tagline{color:var(--dim);font-size:15px;margin-top:10px;text-align:center;}
  .logo-auth{display:block;height:60px;margin:0 auto;object-fit:contain;}

  .topbar{display:flex;align-items:center;gap:10px;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;border-bottom:1px solid var(--line);}
  .lead{flex:1;min-width:0;display:flex;align-items:center;}
  .logo-sm{height:24px;object-fit:contain;}
  .ttl{font-family:"Bricolage Grotesque";font-weight:800;font-size:19px;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iconbtn{width:36px;height:36px;border-radius:10px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--dim);flex:none;}
  .back{font-size:24px;color:var(--text);padding:2px 6px;margin-left:-4px;}
  .seg{display:inline-flex;background:var(--bg-3);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex:none;}
  .seg button{font-size:12.5px;font-weight:700;padding:6px 11px;border-radius:8px;color:var(--dim);}
  .seg button.on{background:var(--accent);color:var(--on-accent);}

  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px;}
  .work{flex:1;display:flex;flex-direction:column;min-height:0;}

  .clientrow{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--bg-2);border:1px solid var(--line);
    border-radius:14px;padding:14px 15px;margin-bottom:10px;transition:border-color .15s,transform .06s;}
  .clientrow:active{transform:scale(.99);border-color:var(--line-2);}
  .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(140deg,#3a2422,#272220);
    display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque";font-weight:800;font-size:17px;color:var(--accent);flex:none;}
  .clientrow .nm{flex:1;font-weight:600;font-size:16px;}
  .clientrow .sub{font-size:12.5px;color:var(--faint);margin-top:2px;}
  .clientrow .chev{color:var(--faint);font-size:20px;}
  .empty{text-align:center;color:var(--dim);padding:34px 10px;font-size:15px;line-height:1.55;}

  .invite{margin-top:14px;background:var(--bg-2);border:1px dashed var(--line-2);border-radius:14px;padding:15px;}
  .invite .code{font-family:"IBM Plex Mono";font-size:13px;color:var(--text);background:var(--bg-3);border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;word-break:break-all;line-height:1.4;}
  .row-gap{display:flex;gap:10px;margin-top:11px;} .row-gap .btn{flex:1;}

  /* chat */
  .msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 8px;display:flex;flex-direction:column;gap:8px;}
  .bubble{max-width:80%;padding:10px 13px;border-radius:16px;font-size:15.5px;line-height:1.42;white-space:pre-wrap;word-wrap:break-word;}
  .bubble .t{display:block;font-family:"IBM Plex Mono";font-size:10px;margin-top:5px;opacity:.6;}
  .mine{align-self:flex-end;background:var(--accent);color:var(--on-accent);border-bottom-right-radius:5px;}
  .theirs{align-self:flex-start;background:var(--bg-3);color:var(--text);border:1px solid var(--line);border-bottom-left-radius:5px;}
  .composer{display:flex;gap:9px;align-items:flex-end;padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(19,17,17,0.85);backdrop-filter:blur(8px);}
  .composer textarea{flex:1;resize:none;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:16px;
    line-height:1.4;padding:11px 13px;border-radius:16px;max-height:120px;outline:none;}
  .composer textarea:focus{border-color:var(--accent);}
  .send{width:46px;height:46px;border-radius:50%;background:var(--accent);color:var(--on-accent);font-size:20px;flex:none;
    display:flex;align-items:center;justify-content:center;} .send:disabled{opacity:.45;}

  /* tab bar */
  .tabbar{display:flex;border-top:1px solid var(--line);background:rgba(19,17,17,0.94);backdrop-filter:blur(10px);padding-bottom:env(safe-area-inset-bottom);}
  .tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 1px 7px;color:var(--faint);font-size:9.5px;font-weight:600;white-space:nowrap;}
  .tabbar button.on{color:var(--accent);}
  .tabbar svg{width:22px;height:22px;}

  /* modules */
  .mbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(26px + env(safe-area-inset-bottom));}
  .mcard{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}
  .mcard h3{font-size:16px;margin-bottom:4px;}
  .muted{color:var(--dim);font-size:13.5px;line-height:1.5;}
  .sectlabel{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin:6px 2px 10px;}
  .ta{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:15px;padding:11px 12px;border-radius:11px;outline:none;resize:none;min-height:70px;}
  .ta:focus{border-color:var(--accent);}
  .qin{background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:14px;padding:10px 12px;border-radius:10px;outline:none;}
  .qin:focus{border-color:var(--accent);}
  .sel{background:var(--bg-3);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:0 8px;font-size:13px;outline:none;}

  .scale{display:flex;gap:5px;flex-wrap:wrap;}
  .scale button{width:30px;height:30px;border-radius:9px;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:13px;font-weight:700;}
  .scale button.on{background:var(--accent);color:#fff;border-color:var(--accent);}

  .weekstrip{display:flex;gap:6px;}
  .daycol{flex:1;text-align:center;}
  .daycol .lbl{font-size:10px;color:var(--faint);margin-bottom:5px;font-family:"IBM Plex Mono";}
  .dot7{width:26px;height:26px;border-radius:50%;margin:0 auto;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
  .dot7.done{background:var(--accent);border-color:var(--accent);}
  .dot7.today{box-shadow:0 0 0 2px var(--accent-2);}
  .dot7.tap{cursor:pointer;}
  .dot7.tap:active{transform:scale(0.9);}
  .dot7.fut{opacity:0.35;}
  .daycol .dnum{font-size:9px;color:var(--faint);margin-top:4px;font-family:"IBM Plex Mono";}

  /* ---- Training: Logger (Fokus-Ansicht) ---- */

  .logtop .logcollapse{width:42px;height:42px;border-radius:12px;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:18px;flex:none;cursor:pointer;}
  .loginfo{display:flex;gap:14px;background:linear-gradient(135deg,rgba(225,29,46,0.16),var(--bg-2) 75%);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;}
  .loginfo .li-ico{width:96px;flex:none;border-radius:12px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;}

  .loginfo .li-fields{flex:1;min-width:0;}
  .loginfo .li-flabel{font-size:13px;color:var(--dim);margin-bottom:6px;}
  .loginfo .li-setcount{display:flex;align-items:center;gap:9px;background:var(--bg-3);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--accent);font-weight:700;font-size:15px;}
  .loginfo .li-setcount svg{width:18px;height:18px;}
  .logtabs{display:flex;gap:8px;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:4px;margin-bottom:16px;}
  .logtabs button{flex:1;padding:11px 0;border:none;background:none;color:var(--dim);font-size:14.5px;font-weight:700;border-radius:9px;cursor:pointer;}
  .logtabs button.on{background:var(--accent);color:#fff;}
  .exblock{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}
  .exblock .exb-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .exblock .exb-name{font-weight:800;font-size:18px;}
  .exblock .exb-goal{font-size:12.5px;color:var(--dim);background:var(--bg-3);border-radius:8px;padding:4px 9px;flex:none;}
  .exblock .exb-last{color:var(--faint);font-size:12.5px;margin:8px 0 14px;line-height:1.5;}

  /* Bild in Icon-Slots */

  .loginfo .li-ico{overflow:hidden;}
  .loginfo .li-ico img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
  /* Bild-Auswahl im Editor */
  .imgpick{display:flex;align-items:center;gap:11px;width:100%;background:var(--bg-3);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px;cursor:pointer;text-align:left;}
  .imgpick-thumb{width:42px;height:42px;border-radius:9px;object-fit:cover;flex:none;}
  .imgpick-ph{width:42px;height:42px;border-radius:9px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;flex:none;}
  .imgpick-ph svg{width:20px;height:20px;color:var(--faint);}
  .imgpick-lab{flex:1;font-size:14.5px;font-weight:600;color:var(--text);}
  .imgpick-chev{color:var(--faint);font-size:20px;}
  /* Bild-Auswahl-Sheet */
  .imgsheet{padding-top:10px;}
  .imggrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .imgcell{position:relative;background:var(--bg-3);border:1px solid var(--line);border-radius:13px;padding:0;overflow:hidden;cursor:pointer;aspect-ratio:0.82;display:flex;flex-direction:column;}
  .imgcell.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset;}
  .imgcell img{width:100%;flex:1;object-fit:cover;}
  .imgcell-ph{flex:1;display:flex;align-items:center;justify-content:center;}

  .imgcell-lab{font-size:12px;font-weight:600;padding:7px 4px;text-align:center;color:var(--text);}
  .imgcell.none{align-items:center;justify-content:center;}
  .imgcell.none .imgcell-x{font-size:30px;color:var(--faint);flex:1;display:flex;align-items:center;justify-content:center;}

  /* coach plan editor */
  .titlein{width:100%;background:transparent;border:none;color:var(--text);font-family:"Bricolage Grotesque";font-weight:800;font-size:16px;padding:9px 2px;outline:none;}
  .dayin{flex:1;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-weight:700;font-size:15px;padding:9px 11px;border-radius:10px;outline:none;min-width:0;}
  .dayin:focus{border-color:var(--accent);}
  .exedit{padding:12px 0;border-bottom:1px solid var(--line);}
  .exedit:last-of-type{border-bottom:none;}
  .exname{flex:1;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-weight:600;font-size:15px;padding:9px 11px;border-radius:9px;outline:none;min-width:0;}
  .exname:focus{border-color:var(--accent);}
  .notein{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:13px;padding:8px 11px;border-radius:9px;outline:none;margin-top:7px;}
  .notein:focus{border-color:var(--accent);color:var(--text);}
  .stepper{display:flex;align-items:center;gap:0;background:var(--bg-3);border:1px solid var(--line);border-radius:10px;overflow:hidden;flex:none;}
  .stepper button{width:38px;height:38px;font-size:19px;color:var(--accent-2);font-weight:700;}
  .stepper span{font-size:13px;color:var(--text);padding:0 10px;white-space:nowrap;min-width:64px;text-align:center;}
  .en{font-weight:600;font-size:14.5px;}
  .enote{font-size:12px;color:var(--faint);margin-top:2px;}
  .esr{font-family:"IBM Plex Mono";font-size:13px;color:var(--accent-2);white-space:nowrap;}

  .mini{display:flex;gap:8px;align-items:center;}
  .mini input{flex:1;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:15px;padding:10px 12px;border-radius:10px;outline:none;min-width:0;}
  .mini input:focus{border-color:var(--accent);}
  .unit{color:var(--faint);font-size:13px;flex:none;}

  .entry{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;}
  .entry .ed{font-family:"IBM Plex Mono";font-size:12px;color:var(--faint);}
  .entry .ev{font-weight:700;}

  .chartwrap{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:16px 14px 8px;margin-bottom:12px;}
  .chartlegend{display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:12px;color:var(--dim);}
  .chartlegend span{display:flex;align-items:center;gap:6px;}
  .chartlegend .lg{width:14px;height:3px;border-radius:2px;display:inline-block;}
  .chartlegend .lg-w{background:#E11D2E;}
  .chartlegend .lg-c{background:#F2C200;}
  .rangebar{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
  .rangebar .rb-f{display:flex;align-items:center;gap:10px;}
  .rangebar .rb-f label{width:30px;flex:none;font-size:13px;color:var(--faint);}
  .rangebar .rb-f input{flex:1;min-width:0;box-sizing:border-box;background:var(--bg-3);border:1px solid var(--line);color:var(--text);border-radius:11px;font-size:15px;padding:11px 12px;outline:none;}
  .rangebar .rb-clear{align-self:flex-start;background:none;border:none;color:var(--faint);font-size:13px;padding:2px 0;cursor:pointer;}

  .exp{background:var(--bg-2);border:1px solid var(--line);border-radius:13px;margin-bottom:9px;overflow:hidden;}
  .exp .head{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;cursor:pointer;gap:10px;}
  .exp .body2{padding:0 15px 14px;}

  .addbtn{font-size:14px;font-weight:700;color:var(--accent-2);padding:10px 0 2px;}
  .delx{color:var(--faint);font-size:18px;padding:2px 6px;flex:none;}
  .tag{display:inline-block;font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.06em;color:var(--faint);border:1px solid var(--line);border-radius:99px;padding:3px 8px;}

  .toast{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--text);color:var(--bg);font-weight:700;font-size:14px;padding:10px 16px;border-radius:999px;z-index:50;box-shadow:0 10px 30px rgba(0,0,0,.45);}
  /* ===== v4 additions ===== */
  [data-theme="light"]{
    --bg:#F4F1ED; --bg-2:#FFFFFF; --bg-3:#ECE7E1;
    --line:rgba(20,16,14,0.10); --line-2:rgba(20,16,14,0.18);
    --text:#1A1614; --dim:#675E58; --faint:#9A9089;
    --accent:#E11D2E; --accent-2:#C0152A; --on-accent:#ffffff; --ok:#2E9E58;
  }
  [data-theme="light"] body{background:radial-gradient(125% 60% at 50% -12%, rgba(225,29,46,0.10), transparent 60%), var(--bg);}
  [data-theme="light"] .composer{background:rgba(255,255,255,0.85);}
  [data-theme="light"] .tgl .knob{background:#b8aea7;}

  .iconbtn svg{width:20px;height:20px;}
  .avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:60;animation:fade .18s ease;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(84%,330px);background:var(--bg-2);border-left:1px solid var(--line);z-index:61;display:flex;flex-direction:column;transform:translateX(100%);animation:slidein .24s cubic-bezier(.2,.8,.2,1) forwards;box-shadow:-20px 0 50px rgba(0,0,0,.35);}
  @keyframes slidein{to{transform:translateX(0);}}
  .drawer .dhead{display:flex;align-items:center;gap:12px;padding:calc(16px + env(safe-area-inset-top)) 18px 14px;border-bottom:1px solid var(--line);}
  .drawer .dav{width:42px;height:42px;border-radius:50%;background:linear-gradient(140deg,#3a2422,#272220);display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque";font-weight:800;font-size:17px;color:var(--accent);flex:none;overflow:hidden;}
  .drawer .dav img{width:100%;height:100%;object-fit:cover;}
  .drawer .dname{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .drawer .drole{font-size:12px;color:var(--faint);margin-top:1px;}
  .dnav{flex:1;overflow-y:auto;padding:10px;}
  .dnav button{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:13px 14px;border-radius:12px;color:var(--dim);font-size:15.5px;font-weight:600;}
  .dnav button.on{background:var(--bg-3);color:var(--text);}
  .dnav button.on svg{color:var(--accent);}
  .dnav svg{width:21px;height:21px;flex:none;}
  .dfoot{border-top:1px solid var(--line);padding:10px 12px calc(12px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:2px;}
  .dfoot .drow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 8px;color:var(--dim);font-size:14.5px;font-weight:600;border-radius:10px;}
  .dfoot .drow svg{width:20px;height:20px;flex:none;}
  .dfoot .tglrow{padding:10px 8px;}
  .dfoot .tglrow .lab{display:flex;align-items:center;gap:12px;color:var(--dim);font-size:14.5px;font-weight:600;}
  .dfoot .tglrow .lab svg{width:20px;height:20px;}

  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg-2);border-top:1px solid var(--line-2);border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;transform:translateY(100%);animation:sheetup .26s cubic-bezier(.2,.8,.2,1) forwards;box-shadow:0 -20px 50px rgba(0,0,0,.4);}
  @keyframes sheetup{to{transform:translateY(0);}}
  /* Bestätigungs-Dialog */
  .cdlg{position:fixed;left:20px;right:20px;top:50%;z-index:80;max-width:380px;margin:0 auto;transform:translateY(-50%) scale(.94);opacity:0;background:var(--bg-2);border:1px solid var(--line-2);border-radius:20px;padding:22px 20px 16px;box-shadow:0 24px 70px rgba(0,0,0,.55);animation:cdlgIn .2s cubic-bezier(.2,.8,.2,1) forwards;}
  @keyframes cdlgIn{to{transform:translateY(-50%) scale(1);opacity:1;}}
  .cdlg-t{font-size:18px;font-weight:800;margin-bottom:7px;}
  .cdlg-m{font-size:14.5px;color:var(--dim);line-height:1.5;margin-bottom:20px;}
  .cdlg-a{display:flex;gap:10px;}
  .cdlg-a button{flex:1;padding:13px 0;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--line);}
  .cdlg-cancel{background:var(--bg-3);color:var(--text);}
  .cdlg-ok{background:var(--accent);border-color:var(--accent);color:#fff;}
  .cdlg-ok.danger{background:var(--accent);border-color:var(--accent);}
  /* Datums-Picker */
  .datefield{display:flex;align-items:center;gap:10px;width:100%;box-sizing:border-box;background:var(--bg-3);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:13px 14px;font-size:16px;cursor:pointer;text-align:left;}
  .datefield svg{width:18px;height:18px;color:var(--accent);flex:none;}
  .datefield .df-val{flex:1;}
  .datefield .df-val.ph{color:var(--faint);}
  .datesheet{padding-top:10px;}
  .sheet-grab{width:38px;height:4px;border-radius:2px;background:var(--line-2);margin:2px auto 14px;}
  .ds-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .ds-title{font-size:17px;font-weight:800;}
  .ds-nav{width:40px;height:40px;border-radius:11px;background:var(--bg-3);border:1px solid var(--line);color:var(--accent);font-size:22px;font-weight:700;line-height:1;cursor:pointer;}
  .ds-nav:disabled{opacity:.35;color:var(--faint);cursor:default;}
  .ds-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .ds-wd div{text-align:center;font-size:11px;color:var(--faint);font-weight:600;}
  .ds-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .ds-cell{aspect-ratio:1;border:none;background:none;color:var(--text);font-size:15.5px;font-weight:600;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .ds-cell:disabled{color:var(--faint);opacity:.3;cursor:default;}
  .ds-cell.today{color:var(--accent);}
  .ds-cell.sel{background:var(--accent);color:#fff;}
  .ds-foot{display:flex;gap:10px;margin-top:16px;}
  .ds-foot button{flex:1;padding:13px 0;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--line);}
  .ds-today{background:var(--accent);border-color:var(--accent);color:#fff;}
  .ds-cancel{background:var(--bg-3);color:var(--text);}
  .sheet h3{font-size:19px;margin-bottom:4px;}

  .planrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:10px;transition:border-color .15s,transform .06s;}
  .planrow:active{transform:scale(.99);border-color:var(--line-2);}
  .planrow .pi{flex:1;min-width:0;}
  .planrow .pt{font-weight:700;font-size:15.5px;}
  .planrow .ps{font-size:12.5px;color:var(--faint);margin-top:2px;}
  .badge{font-family:"IBM Plex Mono";font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;background:var(--accent);color:#fff;border-radius:99px;padding:3px 8px;flex:none;}

  .filegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
  .photo{position:relative;display:block;border-radius:13px;overflow:hidden;border:1px solid var(--line);background:var(--bg-3);aspect-ratio:1/1;}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.72));color:#fff;font-size:10px;padding:16px 8px 6px;font-family:"IBM Plex Mono";white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .photo .del{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .filechip{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;}
  .filechip .fi{width:34px;height:34px;border-radius:9px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--accent-2);flex:none;}
  .filechip .fi svg{width:18px;height:18px;}
  .filechip .fn{flex:1;min-width:0;font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:inherit;text-decoration:none;}
  .filechip .fd{font-size:11px;color:var(--faint);font-family:"IBM Plex Mono";flex:none;}
  .uploadbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:1.5px dashed var(--line-2);border-radius:13px;color:var(--accent-2);font-weight:700;font-size:14.5px;background:var(--bg-2);cursor:pointer;margin-bottom:12px;}
  .uploadbtn svg{width:19px;height:19px;}
  .uploadbtn input{display:none;}

  .setline{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--dim);}
  .setline .sv{font-family:"IBM Plex Mono";color:var(--text);}

  .setavatar{display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px 0;}
  .setavatar .big{width:96px;height:96px;border-radius:50%;overflow:hidden;background:linear-gradient(140deg,#3a2422,#272220);display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque";font-weight:800;font-size:36px;color:var(--accent);}
  .setavatar .big img{width:100%;height:100%;object-fit:cover;}

  .scaleSel{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:16px;padding:12px 14px;border-radius:11px;outline:none;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23A49C96' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:38px;}
  .scaleSel:focus{border-color:var(--accent);}

  .composer .attach{width:40px;height:46px;display:flex;align-items:center;justify-content:center;color:var(--dim);flex:none;cursor:pointer;}
  .composer .attach svg{width:23px;height:23px;}
  .composer .attach input{display:none;}
  .mic{width:46px;height:46px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line);color:var(--text);display:flex;align-items:center;justify-content:center;flex:none;}
  .mic svg{width:22px;height:22px;}
  .mic.rec{background:var(--accent);border-color:var(--accent);color:#fff;}
  .recdot{width:13px;height:13px;border-radius:50%;background:#fff;animation:pulse 1s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .recbar{flex:1;display:flex;align-items:center;gap:9px;background:var(--bg-3);border:1px solid var(--accent);color:var(--text);font-size:15px;font-weight:600;padding:12px 14px;border-radius:16px;}
  .recbar .recdot{background:var(--accent);}
  .reccancel{width:46px;height:46px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;}
  .settbl{width:100%;border-collapse:collapse;margin-top:4px;}
  .settbl th{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:2px 8px 5px 0;}
  .settbl td{font-size:14px;color:var(--text);padding:3px 8px 3px 0;border-top:1px solid var(--line);}
  .settbl td:first-child{color:var(--dim);width:54px;}
  .settbl .u{color:var(--faint);font-size:12px;margin-left:2px;}
  .bubble.media{padding:4px;max-width:74%;}
  .bubble .bimg,.bubble .bvid{display:block;border-radius:13px;width:230px;max-width:100%;height:230px;object-fit:cover;background:var(--bg-3);}
  .bubble .bvid{background:#000;}
  .bubble .baud{display:flex;flex-direction:column;gap:3px;padding:6px 6px 2px;min-height:46px;}
  .bubble .baud audio{width:212px;height:38px;}
  .bubble .adur{font-family:"IBM Plex Mono";font-size:10px;opacity:.65;padding-left:4px;}
  .bubble.media .t{padding:2px 6px 3px;}

  .authmsg{font-size:13.5px;border-radius:11px;padding:11px 13px;margin-top:12px;line-height:1.45;}
  .authmsg.ok{background:rgba(46,158,88,0.13);color:var(--ok);border:1px solid rgba(46,158,88,0.3);}
  .authmsg.err{background:rgba(225,29,46,0.12);color:var(--accent);border:1px solid rgba(225,29,46,0.32);}
  .authmsg.info{background:var(--bg-3);color:var(--dim);border:1px solid var(--line);}
  .authnote{font-size:12px;color:var(--faint);text-align:center;margin-top:14px;line-height:1.5;}
  .btn[disabled]{opacity:.55;pointer-events:none;}

  .demobar{display:flex;align-items:center;gap:8px;background:rgba(225,29,46,0.1);border-bottom:1px solid var(--line);color:var(--accent);font-size:11.5px;font-weight:600;padding:6px 14px;text-align:center;justify-content:center;}

  .splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--bg);z-index:80;}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--line-2);border-top-color:var(--accent);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .splash .lg{width:120px;opacity:.9;}

  .authtabs{display:flex;gap:6px;background:var(--bg-3);border-radius:12px;padding:4px;margin-bottom:16px;}
  .authtabs button{flex:1;padding:9px;border-radius:9px;font-size:14px;font-weight:600;color:var(--dim);}
  .authtabs button.on{background:var(--bg-2);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.18);}
</style>
</head>

const pad = (n)=>String(n).padStart(2,"0");
const dstr = (d)=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

// iOS-tauglich kopieren: erst Clipboard-API, dann Fallback über verstecktes Textarea
async function copyText(t){
  try{ if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(t); return true; } }catch(e){}
  try{
    const ta=document.createElement("textarea");
    ta.value=t; ta.setAttribute("readonly",""); ta.style.position="absolute"; ta.style.left="-9999px"; ta.style.fontSize="16px";
    document.body.appendChild(ta);
    const sel=document.getSelection(); const saved=sel&&sel.rangeCount>0?sel.getRangeAt(0):null;
    ta.select(); ta.setSelectionRange(0, ta.value.length);
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    if(saved && sel){ sel.removeAllRanges(); sel.addRange(saved); }
    return ok;
  }catch(e){ return false; }
}

/* ---------- weight chart ---------- */
function WeightChart({data,cals}){
  if(!data || data.length<2) return <div className="muted" style={{padding:"6px 2px 10px"}}>Noch zu wenig Daten für einen Verlauf – ab dem zweiten Eintrag erscheint die Kurve.</div>;
  const W=320,H=140,pl=10,pr=10,pt=12,pb=22;
  const ys=data.map(d=>d.kg); const minY=Math.min(...ys), maxY=Math.max(...ys); const span=(maxY-minY)||1;
  const X=(i)=>pl+(i/(data.length-1))*(W-pl-pr);
  const Y=(v)=>pt+(1-(v-minY)/span)*(H-pt-pb);
  const pts=data.map((d,i)=>`${X(i).toFixed(1)},${Y(d.kg).toFixed(1)}`).join(" ");
  const area=`${X(0).toFixed(1)},${H-pb} ${pts} ${X(data.length-1).toFixed(1)},${H-pb}`;
  // Kalorien (optional): nach Datum den Gewichtspunkten zuordnen
  let calPts=null, calMin=0, calMax=0;
  if(cals){
    const cmap={}; cals.forEach(c=>{ cmap[c.date]=c.kcal; });
    const vals=data.map(d=>cmap[d.date]).filter(v=>v!=null && v>0);
    if(vals.length>=2){
      calMin=Math.min(...vals); calMax=Math.max(...vals); const cspan=(calMax-calMin)||1;
      const CY=(v)=>pt+(1-(v-calMin)/cspan)*(H-pt-pb);
      // Linie nur über Punkte mit Wert (Lücken überspringen)
      const segs=[]; let cur=[];
      data.forEach((d,i)=>{ const v=cmap[d.date]; if(v!=null&&v>0){ cur.push(`${X(i).toFixed(1)},${CY(v).toFixed(1)}`); } else { if(cur.length) segs.push(cur); cur=[]; } });
      if(cur.length) segs.push(cur);
      calPts=segs;
    }
  }
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%">
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor="#E11D2E" stopOpacity="0.30"/><stop offset="1" stopColor="#E11D2E" stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={area} fill="url(#wg)"/>
      {calPts && calPts.map((seg,si)=>(<polyline key={si} points={seg.join(" ")} fill="none" stroke="#F2C200" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" strokeDasharray="0"/>))}
      <polyline points={pts} fill="none" stroke="#E11D2E" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=>(<circle key={i} cx={X(i)} cy={Y(d.kg)} r={i===data.length-1?3.6:2.4} fill="#E11D2E"/>))}
      <text x={X(0)} y={H-5} fontSize="9" fill="#766C66" fontFamily="IBM Plex Mono">{fmtDay(data[0].date)}</text>
      <text x={X(data.length-1)} y={H-5} fontSize="9" fill="#766C66" fontFamily="IBM Plex Mono" textAnchor="end">{fmtDay(data[data.length-1].date)}</text>
      <text x={X(data.length-1)} y={Y(data[data.length-1].kg)-8} fontSize="11" fill="#ECE7E2" fontFamily="IBM Plex Mono" textAnchor="end">{data[data.length-1].kg} kg</text>
      {calPts && <text x={X(0)} y={pt-2} fontSize="9" fill="#F2C200" fontFamily="IBM Plex Mono">kcal</text>}
    </svg>
  );
}

/* ---------- CHAT ---------- */
function fmtDur(s){ s=Math.round(s||0); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function MsgBubble({m,mine}){
  const isMedia=m.kind && m.kind!=="text";
  let inner;
  if(m.kind==="image") inner=<a href={m.url} target="_blank" rel="noopener"><img className="bimg" src={m.url} alt=""/></a>;
  else if(m.kind==="video") inner=<video className="bvid" src={m.url} controls playsInline/>;
  else if(m.kind==="audio") inner=<div className="baud"><audio src={m.url} controls/>{m.dur?<span className="adur">{fmtDur(m.dur)}</span>:null}</div>;
  else inner=m.body;
  return <div className={"bubble "+(mine?"mine":"theirs")+(isMedia?" media":"")}>{inner}<span className="t">{fmtTime(m.ts)}</span></div>;
}
function ChatTab({cdata,upd,role}){
  const [text,setText]=useState(""); const endRef=useRef(null), taRef=useRef(null);
  const [recording,setRecording]=useState(false); const [recSecs,setRecSecs]=useState(0);
  const mrRef=useRef(null), chunksRef=useRef([]), timerRef=useRef(null), streamRef=useRef(null), secsRef=useRef(0);
  const msgs=cdata.messages;
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[msgs.length]);
  useEffect(()=>()=>{ if(timerRef.current) clearInterval(timerRef.current); if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); },[]);
  const pushMsg=(extra)=>upd(c=>({...c,messages:[...c.messages,{id:nid(),from:role,ts:Date.now(),...extra}]}));
  const send=()=>{ const b=text.trim(); if(!b) return; pushMsg({kind:"text",body:b}); setText(""); if(taRef.current){taRef.current.style.height="auto";taRef.current.focus();} };
  const onPickMedia=(e)=>{ const f=e.target.files[0]; if(f){ const kind=(f.type.indexOf("video")===0)?"video":"image"; readToData(f,(u)=>pushMsg({kind,url:u})); } e.target.value=""; };
  const startRec=async()=>{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ alert("Sprachaufnahme wird auf diesem Gerät/Browser nicht unterstützt."); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true}); streamRef.current=stream;
      const mr=new MediaRecorder(stream); mrRef.current=mr; chunksRef.current=[];
      mr.ondataavailable=(e)=>{ if(e.data && e.data.size) chunksRef.current.push(e.data); };
      mr.onstop=()=>{
        const blob=new Blob(chunksRef.current,{type:(mrRef.current && mrRef.current.mimeType)||"audio/mp4"});
        const secs=secsRef.current;
        const r=new FileReader(); r.onload=()=>pushMsg({kind:"audio",url:r.result,dur:secs}); r.readAsDataURL(blob);
        if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
        if(timerRef.current){ clearInterval(timerRef.current); timerRef.current=null; }
      };
      mr.start(); secsRef.current=0; setRecSecs(0); setRecording(true);
      timerRef.current=setInterval(()=>{ secsRef.current+=1; setRecSecs(secsRef.current); },1000);
    }catch(err){ alert("Kein Mikrofon-Zugriff. Bitte in den Einstellungen erlauben."); }
  };
  const stopRec=()=>{ if(mrRef.current && mrRef.current.state!=="inactive") mrRef.current.stop(); setRecording(false); };
  const isCoach=role==="coach";
  return <>
    <div className="msgs">
      {msgs.length===0 && <div className="empty">Schreib die erste Nachricht.</div>}
      {msgs.map(m=>(<MsgBubble key={m.id} m={m} mine={m.from===role}/>))}
      <div ref={endRef}/>
    </div>
    <div className="composer">
      {isCoach && <label className="attach" title="Foto oder Video"><Icon name="photo"/><input type="file" accept="image/*,video/*" onChange={onPickMedia}/></label>}
      {recording
        ? <div className="recbar"><span className="recdot"/>Aufnahme… {fmtDur(recSecs)}</div>
        : <textarea ref={taRef} rows="1" value={text} placeholder="Nachricht…" onChange={(e)=>{setText(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}/>}
      {(isCoach && !text.trim())
        ? <button className={"mic"+(recording?" rec":"")} onClick={recording?stopRec:startRec} aria-label="Sprachnachricht">{recording?<span className="recdot"/>:<Icon name="mic"/>}</button>
        : <button className="send" onClick={send} disabled={!text.trim()}>↑</button>}
    </div>
  </>;
}

function WeekCalendar({weekDates,selDate,setSelDate,weekOffset,changeWeek,dots,t}){
  const monthLabel=new Date(weekDates[0]+"T00:00:00").toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  return <div className="card wkcal">
    <div className="card-h"><span className="ch-l"><Icon name="checkin"/>Kalender</span>
      <div className="calnav"><button className="cnav" onClick={()=>changeWeek(-1)} aria-label="Woche zurück">‹</button><span className="cmonth">{monthLabel}</span><button className="cnav" disabled={weekOffset>=0} onClick={()=>changeWeek(1)} aria-label="Woche vor">›</button></div>
    </div>
    <div className="calstrip">{weekDates.map(d=>{ const isSel=d===selDate; const isToday=d===t; const dot=dots&&dots[d]; const future=d>t;
      return <button key={d} className={"calcol"+(future?" fut":"")} disabled={future} onClick={()=>setSelDate(d)}>
        <div className="cwd">{["MO","DI","MI","DO","FR","SA","SO"][(new Date(d+"T00:00:00").getDay()+6)%7]}</div>

        <div className={"cdot"+(dot?" on":"")}/>
      </button>;
    })}</div>
  </div>;
}
function LiveDashboard({clientId,toast,go,name}){
  const t=today();
  const mondayOf=(d)=>{ const x=new Date(d); x.setHours(0,0,0,0); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); return x; };

  const [plan,setPlan]=useState(undefined);
  const [lastDayId,setLastDayId]=useState(null);
  const [lastDate,setLastDate]=useState(null);
  const [restToday,setRestToday]=useState(false);
  const [habits,setHabits]=useState([]);
  const [habitDone,setHabitDone]=useState({}); // {id:true} für selDate
  const [settings,setSettings]=useState(null);
  const [todayMacro,setTodayMacro]=useState(null);
  const [trainDates,setTrainDates]=useState({}); // {date:true} angezeigte Woche
  const [weekKcal,setWeekKcal]=useState({}); // {date: kcal} angezeigte Woche
  const [weekOffset,setWeekOffset]=useState(0);
  const [selDate,setSelDate]=useState(t);

  const greetWord=(()=>{ const h=new Date().getHours(); if(h<11) return "Guten Morgen"; if(h<17) return "Hallo"; return "Guten Abend"; })();
  const firstName=(name||"").trim().split(" ")[0]||"";

  const weekStart=addDays(mondayOf(new Date()), weekOffset*7);
  const weekDates=Array.from({length:7}).map((_,i)=>dstr(addDays(weekStart,i)));

  const loadStatic=async()=>{
    try{
      const { data:pl } = await window.supa.from("plans").select("id,title,is_active").eq("client_id",clientId).eq("is_active",true).maybeSingle();
      if(pl){
        const { data:days } = await window.supa.from("plan_days").select("id,name,position").eq("plan_id",pl.id).order("position",{ascending:true});
        const dayIds=(days||[]).map(d=>d.id);
        let exs=[]; if(dayIds.length){ const { data:e } = await window.supa.from("exercises").select("id,day_id").in("day_id",dayIds); exs=e||[]; }
        setPlan({ id:pl.id, title:pl.title, days:(days||[]).map(d=>({id:d.id,name:d.name,exCount:exs.filter(x=>x.day_id===d.id).length})) });
        const { data:lw } = await window.supa.from("workouts").select("day_id,date").eq("client_id",clientId).eq("plan_id",pl.id).order("date",{ascending:false}).limit(1).maybeSingle();
        if(lw){ setLastDayId(lw.day_id); setLastDate(lw.date); }
      } else setPlan(null);
      const { data:hs } = await window.supa.from("habits").select("id,name,position,created_at").eq("client_id",clientId).eq("archived",false).order("position",{ascending:true}).order("created_at",{ascending:true});
      setHabits((hs||[]).map(h=>({id:h.id,name:h.name})));
      const { data:stt } = await window.supa.from("nutrition_settings").select("*").eq("client_id",clientId).maybeSingle();
      setSettings(stt||null);
      const { data:tm } = await window.supa.from("nutrition_logs").select("kcal,protein,carbs,fat").eq("client_id",clientId).eq("date",t).maybeSingle();
      setTodayMacro(tm||null);
    }catch(e){ toast("Dashboard konnte nicht geladen werden"); setPlan(null); }
  };
  useEffect(()=>{ if(clientId) loadStatic(); },[clientId]);

  const loadDay=async()=>{
    if(!habits.length){ setHabitDone({}); return; }
    try{
      const { data:hlog } = await window.supa.from("habit_logs").select("habit_id,done").in("habit_id",habits.map(h=>h.id)).eq("date",selDate);
      const hd={}; (hlog||[]).forEach(r=>{ if(r.done) hd[r.habit_id]=true; }); setHabitDone(hd);
    }catch(e){ /* still */ }
  };
  useEffect(()=>{ if(clientId) loadDay(); },[clientId, habits, selDate]);

  const loadDots=async()=>{
    try{
      const { data:wsd } = await window.supa.from("workouts").select("date").eq("client_id",clientId).gte("date",weekDates[0]).lte("date",weekDates[6]);
      const td={}; (wsd||[]).forEach(r=>{ td[r.date]=true; }); setTrainDates(td);
    }catch(e){ /* still */ }
    try{
      const { data:nl } = await window.supa.from("nutrition_logs").select("date,kcal").eq("client_id",clientId).gte("date",weekDates[0]).lte("date",weekDates[6]);
      const wk={}; (nl||[]).forEach(r=>{ wk[r.date]=r.kcal||0; }); setWeekKcal(wk);
    }catch(e){ /* still */ }
  };
  useEffect(()=>{ if(clientId) loadDots(); },[clientId, weekOffset]);

  const toggleHabit=async(hid)=>{
    if(selDate>t) return;
    const cur=!!habitDone[hid]; const next=!cur;
    setHabitDone(s=>{ const n={...s}; if(next) n[hid]=true; else delete n[hid]; return n; });
    try{
      if(next){ const { error } = await window.supa.from("habit_logs").upsert({ client_id:clientId, habit_id:hid, date:selDate, done:true },{onConflict:"habit_id,date"}); if(error) throw error; }
      else { const { error } = await window.supa.from("habit_logs").delete().eq("habit_id",hid).eq("date",selDate); if(error) throw error; }
    }catch(e){ toast("Konnte nicht speichern"); loadDay(); }
  };

  const changeWeek=(delta)=>{
    const no=weekOffset+delta; if(no>0) return;
    const ws=addDays(mondayOf(new Date()), no*7);
    const wd=Array.from({length:7}).map((_,i)=>dstr(addDays(ws,i)));
    setWeekOffset(no); setSelDate(wd[6]<=t?wd[6]:t);
  };

  if(plan===undefined) return <div className="mbody"><div className="muted">Lädt…</div></div>;

  let nextIdx=0;
  if(plan && plan.days.length && lastDayId){ const li=plan.days.findIndex(d=>d.id===lastDayId); nextIdx=li>=0?((li+1)%plan.days.length):0; }
  const nextDay = plan && plan.days.length ? plan.days[nextIdx] : null;
  const trainedToday = lastDate===t;

  const monthLabel=new Date(weekDates[0]+"T00:00:00").toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  const habDone=habits.filter(h=>habitDone[h.id]).length;
  const m=settings;
  const macrosOn=settings&&settings.macros_enabled;
  const kcalTarget=m?m.kcal:0;
  // Kalorien pro Tag der angezeigten Woche
  const dayKcals=weekDates.map(d=>weekKcal[d]||0);
  const selKcal=weekKcal[selDate]||0;
  const weekSum=dayKcals.reduce((a,b)=>a+b,0);
  const loggedDays=dayKcals.filter(v=>v>0).length;
  const chartMax=Math.max(kcalTarget*1.18, Math.max(0,...dayKcals)*1.08, 1);
  const habTitle = selDate===t ? "Heutige Habits" : "Habits · "+weekdayShort(selDate)+" "+fmtDay(selDate);

  return <div className="mbody dash">
    <div className="dashgreet">{greetWord}{firstName?", "+firstName:""}.</div>

    {/* Kalender */}
    <WeekCalendar weekDates={weekDates} selDate={selDate} setSelDate={setSelDate} weekOffset={weekOffset} changeWeek={changeWeek} dots={trainDates} t={t}/>

function LiveChatTab({clientId,role,toast}){
  const [text,setText]=useState(""); const endRef=useRef(null), taRef=useRef(null);
  const [msgs,setMsgs]=useState(null); // null=lädt
  const [busy,setBusy]=useState(false);
  const [recording,setRecording]=useState(false); const [recSecs,setRecSecs]=useState(0);
  const mrRef=useRef(null), chunksRef=useRef([]), timerRef=useRef(null), streamRef=useRef(null);
  const recStartRef=useRef(0), cancelRef=useRef(false);
  const meRef=useRef(null);
  const msgsRef=useRef([]);            // Spiegel des aktuellen Standes für Polling/Realtime
  const lastTsRef=useRef(null);        // jüngster created_at als Wasserzeichen
  const pollRef=useRef(null);

  const mapRow=(r)=>({ id:r.id, from:r.sender_role, ts:new Date(r.created_at).getTime(), created_at:r.created_at, kind:r.kind||"text", body:r.body||"", path:r.file_path||"", url:"", dur:r.duration_seconds||0 });
  const signPath=async(path)=>{ try{ const { data } = await window.supa.storage.from("chat-media").createSignedUrl(path, 60*60*24); return (data&&data.signedUrl)||""; }catch(e){ return ""; } };

  // Nachrichten zusammenführen (dedupe nach id), Reihenfolge nach Zeit, Wasserzeichen pflegen
  const mergeIn=(incoming)=>{
    setMsgs(cur=>{
      const base=cur||[];
      const byId={}; base.forEach(m=>byId[m.id]=m);
      incoming.forEach(m=>{ byId[m.id]={...(byId[m.id]||{}),...m}; });
      const list=Object.values(byId).sort((a,b)=>a.ts-b.ts);
      msgsRef.current=list;
      if(list.length){ lastTsRef.current=list[list.length-1].created_at; }
      return list;
    });
  };

  // fehlende signierte URLs nachladen (für Medien), ohne UI zu blockieren
  const fillUrls=async(list)=>{
    const need=list.filter(m=>m.path && !m.url);
    if(!need.length) return;
    const updates=await Promise.all(need.map(async m=>({id:m.id,url:await signPath(m.path)})));
    setMsgs(cur=>{ const map={}; (cur||[]).forEach(m=>map[m.id]=m); updates.forEach(u=>{ if(map[u.id]) map[u.id]={...map[u.id],url:u.url}; }); const list2=Object.values(map).sort((a,b)=>a.ts-b.ts); msgsRef.current=list2; return list2; });
  };

  const load=async()=>{
    try{
      const { data:{ user } } = await window.supa.auth.getUser(); meRef.current=user&&user.id;
      const { data, error } = await window.supa.from("messages")
        .select("id,sender_role,body,kind,file_path,duration_seconds,created_at").eq("client_id",clientId)
        .order("created_at",{ascending:true});
      if(error) throw error;
      const mapped=(data||[]).map(mapRow);
      mergeIn(mapped);
      fillUrls(mapped);
    }catch(e){ toast("Nachrichten konnten nicht geladen werden"); setMsgs([]); }
  };

  // nur neue Nachrichten seit Wasserzeichen holen (Polling-Fallback + nach Reconnect)
  const fetchNew=async()=>{
    try{
      let q=window.supa.from("messages").select("id,sender_role,body,kind,file_path,duration_seconds,created_at").eq("client_id",clientId).order("created_at",{ascending:true});
      if(lastTsRef.current) q=q.gt("created_at",lastTsRef.current);
      const { data,error }=await q;
      if(error) return;
      if(data && data.length){ const mapped=data.map(mapRow); mergeIn(mapped); fillUrls(mapped); }
    }catch(e){}
  };

  useEffect(()=>{ if(clientId){ setMsgs(null); msgsRef.current=[]; lastTsRef.current=null; load(); } },[clientId]);

  // Realtime mit Reconnect + Polling-Fallback
  useEffect(()=>{
    if(!clientId) return;
    let ch=null, alive=true;
    const onInsert=async(payload)=>{
      const m=mapRow(payload.new);
      mergeIn([m]);
      if(m.path){ const u=await signPath(m.path); setMsgs(cur=>{ const map={}; (cur||[]).forEach(x=>map[x.id]=x); if(map[m.id]) map[m.id]={...map[m.id],url:u}; const list=Object.values(map).sort((a,b)=>a.ts-b.ts); msgsRef.current=list; return list; }); }
    };
    const subscribe=()=>{
      ch=window.supa.channel("messages-"+clientId+"-"+Math.random().toString(36).slice(2,7))
        .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:"client_id=eq."+clientId},onInsert)
        .subscribe((status)=>{
          if(status==="SUBSCRIBED"){ fetchNew(); } // verpasste seit letztem Stand nachholen
          if((status==="CHANNEL_ERROR"||status==="TIMED_OUT"||status==="CLOSED") && alive){
            // sauber neu verbinden
            try{ window.supa.removeChannel(ch); }catch(e){}
            setTimeout(()=>{ if(alive) subscribe(); }, 1500);
          }
        });
    };
    subscribe();
    // Polling-Fallback alle 4s (fängt alles ab, was Realtime verpasst)
    pollRef.current=setInterval(fetchNew, 4000);
    // bei Rückkehr in den Tab sofort nachholen
    const onVis=()=>{ if(document.visibilityState==="visible") fetchNew(); };
    document.addEventListener("visibilitychange",onVis);
    return ()=>{ alive=false; document.removeEventListener("visibilitychange",onVis); if(pollRef.current) clearInterval(pollRef.current); try{ window.supa.removeChannel(ch); }catch(e){} };
  },[clientId]);

  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[msgs && msgs.length]);
  useEffect(()=>()=>{ if(timerRef.current) cancelAnimationFrame(timerRef.current); if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); },[]);

  const insertMsg=async(extra)=>{
    const row={ client_id:clientId, sender_id:meRef.current, sender_role:role, kind:extra.kind||"text", body:extra.body||null, file_path:extra.path||null, duration_seconds:extra.dur||null };
    const { data, error } = await window.supa.from("messages").insert(row).select("id,sender_role,body,kind,file_path,duration_seconds,created_at").single();
    if(error){ toast("Senden fehlgeschlagen: "+(error.message||"")); return; }
    let m=mapRow(data);
    if(m.path){ m.url = extra.url || await signPath(m.path); }
    mergeIn([m]);
  };

  const send=()=>{ const b=text.trim(); if(!b) return; insertMsg({kind:"text",body:b}); setText(""); if(taRef.current){taRef.current.style.height="auto";taRef.current.focus();} };

  const uploadMedia=async(file,kind,extra)=>{
    setBusy(true);
    try{
      const ext=(file.name && file.name.indexOf(".")>=0)? file.name.split(".").pop() : (file.type.split("/")[1]||"bin");
      const path=clientId+"/"+Date.now()+"_"+Math.random().toString(36).slice(2,8)+"."+ext;
      const { error:upErr } = await window.supa.storage.from("chat-media").upload(path,file,{contentType:file.type||"application/octet-stream",upsert:false});
      if(upErr) throw upErr;
      const url=await signPath(path);
      await insertMsg({kind,path,url,...(extra||{})});
    }catch(e){ toast("Upload fehlgeschlagen: "+(e.message||"")); }
    finally{ setBusy(false); }
  };

  const onPickMedia=(e)=>{ const f=e.target.files[0]; if(f){ const kind=(f.type.indexOf("video")===0)?"video":"image"; uploadMedia(f,kind); } e.target.value=""; };

  // flüssiger Timer per Zeitstempel (kein Springen)
  const tick=()=>{ const s=Math.floor((Date.now()-recStartRef.current)/1000); setRecSecs(s); timerRef.current=requestAnimationFrame(tick); };
  const startRec=async()=>{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ alert("Sprachaufnahme wird auf diesem Gerät/Browser nicht unterstützt."); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true}); streamRef.current=stream;
      const mr=new MediaRecorder(stream); mrRef.current=mr; chunksRef.current=[]; cancelRef.current=false;
      mr.ondataavailable=(e)=>{ if(e.data && e.data.size) chunksRef.current.push(e.data); };
      mr.onstop=()=>{
        const wasCancelled=cancelRef.current;
        const type=(mrRef.current && mrRef.current.mimeType)||"audio/mp4";
        const secs=Math.round((Date.now()-recStartRef.current)/1000);
        if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
        if(timerRef.current){ cancelAnimationFrame(timerRef.current); timerRef.current=null; }
        if(wasCancelled || chunksRef.current.length===0){ chunksRef.current=[]; return; }
        const blob=new Blob(chunksRef.current,{type});
        const ext=type.indexOf("webm")>=0?"webm":(type.indexOf("ogg")>=0?"ogg":"mp4");
        const file=new File([blob],"voice."+ext,{type});
        uploadMedia(file,"audio",{dur:secs});
      };
      mr.start(); recStartRef.current=Date.now(); setRecSecs(0); setRecording(true);
      timerRef.current=requestAnimationFrame(tick);
    }catch(err){ alert("Kein Mikrofon-Zugriff. Bitte in den Einstellungen erlauben."); }
  };
  const stopRec=()=>{ cancelRef.current=false; if(mrRef.current && mrRef.current.state!=="inactive") mrRef.current.stop(); setRecording(false); };
  const cancelRec=()=>{ cancelRef.current=true; if(mrRef.current && mrRef.current.state!=="inactive") mrRef.current.stop(); setRecording(false); };

  return <>
    <div className="msgs">
      {msgs===null && <div className="empty">Lädt…</div>}
      {msgs!==null && msgs.length===0 && <div className="empty">Schreib die erste Nachricht.</div>}
      {(msgs||[]).map(m=>(<MsgBubble key={m.id} m={m} mine={m.from===role}/>))}
      <div ref={endRef}/>
    </div>
    <div className="composer">
      {recording
        ? <>
            <button className="reccancel" onClick={cancelRec} aria-label="Aufnahme abbrechen">×</button>
            <div className="recbar"><span className="recdot"/>Aufnahme… {fmtDur(recSecs)}</div>
            <button className="send" onClick={stopRec} aria-label="Sprachnachricht senden">↑</button>
          </>
        : <>
            <label className="attach" title="Foto oder Video"><Icon name="photo"/><input type="file" accept="image/*,video/*" onChange={onPickMedia}/></label>
            <textarea ref={taRef} rows="1" value={text} placeholder={busy?"Lädt…":"Nachricht…"} onChange={(e)=>{setText(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}/>
            {(!text.trim())
              ? <button className="mic" onClick={startRec} aria-label="Sprachnachricht"><Icon name="mic"/></button>
              : <button className="send" onClick={send} disabled={!text.trim()||busy}>↑</button>}
          </>}
    </div>
  </>;
}

function LiveCheckinTab({clientId,role,toast}){
  const t=today();
  const WD=["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];
  const WDshort=["Mo","Di","Mi","Do","Fr","Sa","So"];
  const TYPES=[{v:"scale",l:"Skala 1–10"},{v:"yesno",l:"Ja / Nein"},{v:"text",l:"Freitext"},{v:"number",l:"Zahl"},{v:"photo",l:"Foto"}];

  const [questions,setQuestions]=useState(null); // [{id,label,type,position}]
  const [weekday,setWeekday]=useState(null);      // 0..6 oder null
  const [history,setHistory]=useState(null);      // [{id,date,answers:[{question_id,question_label,answer_text,answer_file,signedUrl}]}]

  // --- Laden ---

    try{
      const { data,error } = await window.supa.from("checkin_questions").select("id,label,type,position,created_at").eq("client_id",clientId).order("position",{ascending:true}).order("created_at",{ascending:true});
      if(error) throw error;
      setQuestions((data||[]).map(q=>({id:q.id,label:q.label,type:q.type,position:q.position})));
    }catch(e){ toast("Fragen konnten nicht geladen werden"); setQuestions([]); }
  };
  const loadWeekday=async()=>{
    try{ const { data } = await window.supa.from("profiles").select("checkin_weekday").eq("id",clientId).maybeSingle(); setWeekday(data&&data.checkin_weekday!=null?data.checkin_weekday:null); }
    catch(e){ setWeekday(null); }
  };
  const signFile=async(path)=>{ try{ const { data } = await window.supa.storage.from("client-files").createSignedUrl(path,60*60*24); return (data&&data.signedUrl)||""; }catch(e){ return ""; } };
  const loadHistory=async()=>{
    try{
      const { data:cs,error } = await window.supa.from("checkins").select("id,date,created_at").eq("client_id",clientId).order("date",{ascending:false}).limit(40);
      if(error) throw error;
      const ids=(cs||[]).map(c=>c.id);

      const rows=(cs||[]).map(c=>({ id:c.id, date:c.date, answers:ans.filter(a=>a.checkin_id===c.id) }));

  useEffect(()=>{ if(clientId){ loadQuestions(); loadWeekday(); } },[clientId]);
  useEffect(()=>{ if(clientId && view==="history") loadHistory(); },[clientId, view]);

  if(questions===null) return <div className="mbody"><div className="muted">Lädt…</div></div>;

  // =================== COACH ===================

function CoachCheckinSettings({clientId,questions,weekday,WD,TYPES,typeLabel,onChanged,onWeekday,toast}){
  const WDshort=["Mo","Di","Mi","Do","Fr","Sa","So"];
  const [newLabel,setNewLabel]=useState("");
  const [newType,setNewType]=useState("scale");
  const [busy,setBusy]=useState(false);

  const setDay=async(wd)=>{
    const next = weekday===wd ? null : wd;
    onWeekday(next);
    try{ const { error } = await window.supa.from("profiles").update({ checkin_weekday: next }).eq("id",clientId); if(error) throw error; }
    catch(e){ toast("Wochentag konnte nicht gespeichert werden"); }
  };
  const addQ=async()=>{
    if(!newLabel.trim()||busy) return; setBusy(true);
    try{ const pos=questions.length; const { error } = await window.supa.from("checkin_questions").insert({ client_id:clientId, label:newLabel.trim(), type:newType, position:pos }); if(error) throw error; setNewLabel(""); setNewType("scale"); await onChanged(); }
    catch(e){ toast("Frage hinzufügen fehlgeschlagen: "+(e.message||"")); }
    finally{ setBusy(false); }
  };
  const delQ=async(id)=>{
    if(!await askConfirm({title:"Frage entfernen?",message:"Bereits gegebene Antworten im Verlauf bleiben erhalten.",confirmText:"Entfernen",danger:true})) return;
    try{ const { error } = await window.supa.from("checkin_questions").delete().eq("id",id); if(error) throw error; await onChanged(); }
    catch(e){ toast("Entfernen fehlgeschlagen"); }
  };
  const move=async(idx,dir)=>{
    const j=idx+dir; if(j<0||j>=questions.length) return;
    const a=questions[idx], b=questions[j];
    try{
      await window.supa.from("checkin_questions").update({position:b.position}).eq("id",a.id);
      await window.supa.from("checkin_questions").update({position:a.position}).eq("id",b.id);
      await onChanged();

// ---- Kunde: Check-in ausfüllen ----
function ClientCheckinForm({clientId,questions,t,toast,onDone}){
  const [vals,setVals]=useState(()=>{ const o={}; questions.forEach(q=>{ o[q.id]={text:"",file:null,fileName:""}; }); return o; });
  const [busy,setBusy]=useState(false);
  const setText=(id,v)=>setVals(s=>({...s,[id]:{...s[id],text:v}}));
  const setFile=(id,file)=>setVals(s=>({...s,[id]:{...s[id],file,fileName:file?file.name:""}}));

  const save=async()=>{
    if(busy) return; setBusy(true);
    try{
      const { data:ci, error:ce } = await window.supa.from("checkins").insert({ client_id:clientId, date:t }).select("id").single();
      if(ce) throw ce;
      const rows=[];
      for(const q of questions){
        const v=vals[q.id]||{};
        let answer_file=null;
        if(q.type==="photo" && v.file){
          const ext=(v.file.name.split(".").pop()||"jpg").toLowerCase();
          const path=clientId+"/checkin/"+ci.id+"_"+q.id+"_"+nid()+"."+ext;
          const { error:ue } = await window.supa.storage.from("client-files").upload(path, v.file, { contentType:v.file.type||"image/jpeg", upsert:false });
          if(ue) throw ue; answer_file=path;
        }
        rows.push({ checkin_id:ci.id, client_id:clientId, question_id:q.id, question_label:q.label, answer_text:(q.type==="photo"?null:(v.text||null)), answer_file });
      }
      if(rows.length){ const { error:ae } = await window.supa.from("checkin_answers").insert(rows); if(ae) throw ae; }
      toast("Check-in gespeichert ✓");
      onDone();
    }catch(e){ toast("Speichern fehlgeschlagen: "+(e.message||"")); }
    finally{ setBusy(false); }
  };

  return <>
    {questions.map(q=>(
      <div key={q.id} className="mcard">
        <div className="ci-flabel">{q.label}</div>
        {q.type==="scale" && <div className="scalewrap">{Array.from({length:10}).map((_,i)=>{ const n=i+1; const on=String(n)===String(vals[q.id].text);
          return <button key={n} className={"scaleb"+(on?" on":"")} onClick={()=>setText(q.id,String(n))}>{n}</button>;
        })}</div>}
        {q.type==="yesno" && <div className="ynwrap">
          <button className={"ynb"+(vals[q.id].text==="Ja"?" on":"")} onClick={()=>setText(q.id,"Ja")}>Ja</button>
          <button className={"ynb"+(vals[q.id].text==="Nein"?" on no":"")} onClick={()=>setText(q.id,"Nein")}>Nein</button>
        </div>}
        {q.type==="text" && <textarea className="ta" value={vals[q.id].text} onChange={(e)=>setText(q.id,e.target.value)} placeholder="Deine Antwort…"/>}
        {q.type==="number" && <input className="qin" inputMode="decimal" style={{width:"100%",boxSizing:"border-box"}} value={vals[q.id].text} onChange={(e)=>setText(q.id,e.target.value)} placeholder="Zahl eingeben"/>}
        {q.type==="photo" && <label className="photopick">
          {vals[q.id].fileName ? <span>📷 {vals[q.id].fileName}</span> : <span>📷 Foto auswählen</span>}
          <input type="file" accept="image/*" style={{display:"none"}} onChange={(e)=>{ const f=e.target.files[0]; if(f) setFile(q.id,f); e.target.value=""; }}/>
        </label>}
      </div>
    ))}
    <button className="btn" disabled={busy} onClick={save}>{busy?"Speichert…":"Check-in absenden"}</button>
  </>;
}

function WeekStrip({habitId,log}){
  const days=lastNDays(7); const t=today();
  return <div className="weekstrip">{days.map(d=>{
    const done=log[d]&&log[d][habitId];
    return <div key={d} className="daycol"><div className="lbl">{weekdayShort(d)}</div>
      <div className={"dot7"+(done?" done":"")+(d===t?" today":"")}>{done?"✓":""}</div></div>;
  })}</div>;
}
function LiveHabitsTab({clientId,role,toast}){
  const t=today();
  const [habits,setHabits]=useState(null); // [{id,name}]
  const [log,setLog]=useState({});         // log[date][habitId]=true
  const [newH,setNewH]=useState("");
  const [weekOffset,setWeekOffset]=useState(0); // 0=aktuelle Woche, -1=letzte ...
  const [selDate,setSelDate]=useState(today());

  const mondayOf=(d)=>{ const x=new Date(d); x.setHours(0,0,0,0); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); return x; };
  const weekStart=addDays(mondayOf(new Date()), weekOffset*7);
  const weekDates=Array.from({length:7}).map((_,i)=>dstr(addDays(weekStart,i)));
  const validDays=weekDates.filter(d=>d<=t).length || 7; // bis heute (bei vergangenen Wochen 7)
  const changeWeek=(delta)=>{ const no=weekOffset+delta; if(no>0) return; const ws=addDays(mondayOf(new Date()), no*7); const wd=Array.from({length:7}).map((_,i)=>dstr(addDays(ws,i))); setWeekOffset(no); setSelDate(wd[6]<=t?wd[6]:t); };

  const loadHabits=async()=>{
    try{
      const { data:hs,error } = await window.supa.from("habits").select("id,name,position,created_at").eq("client_id",clientId).eq("archived",false).order("position",{ascending:true}).order("created_at",{ascending:true});
      if(error) throw error;
      setHabits((hs||[]).map(h=>({id:h.id,name:h.name})));
    }catch(e){ toast("Gewohnheiten konnten nicht geladen werden"); setHabits([]); }
  };
  const loadLogs=async()=>{
    if(!habits||!habits.length){ setLog({}); return; }
    try{
      const ids=habits.map(h=>h.id);
      const { data:ll } = await window.supa.from("habit_logs").select("habit_id,date,done").in("habit_id",ids).gte("date",weekDates[0]).lte("date",weekDates[6]);
      const lg={}; (ll||[]).forEach(r=>{ if(r.done){ (lg[r.date]=lg[r.date]||{})[r.habit_id]=true; } });
      setLog(lg);
    }catch(e){ /* still */ }
  };
  useEffect(()=>{ if(clientId) loadHabits(); },[clientId]);
  useEffect(()=>{ if(clientId && habits) loadLogs(); },[clientId, habits, weekOffset]);

  const toggle=async(hid,d)=>{
    if(d>t) return; // Zukunft nicht abhakbar
    const cur=!!(log[d]&&log[d][hid]); const next=!cur;
    setLog(l=>{ const day={...(l[d]||{})}; if(next) day[hid]=true; else delete day[hid]; return {...l,[d]:day}; });
    try{
      if(next){ const { error } = await window.supa.from("habit_logs").upsert({ client_id:clientId, habit_id:hid, date:d, done:true },{onConflict:"habit_id,date"}); if(error) throw error; }
      else { const { error } = await window.supa.from("habit_logs").delete().eq("habit_id",hid).eq("date",d); if(error) throw error; }
    }catch(e){ toast("Konnte nicht speichern"); loadLogs(); }
  };
  const addHabit=async()=>{
    if(!newH.trim()) return;
    try{ const pos=(habits||[]).length; const { error } = await window.supa.from("habits").insert({ client_id:clientId, name:newH.trim(), position:pos }); if(error) throw error; setNewH(""); await loadHabits(); }
    catch(e){ toast("Hinzufügen fehlgeschlagen: "+(e.message||"")); }
  };
  const delHabit=async(hid)=>{
    if(!await askConfirm({title:"Gewohnheit entfernen?",message:"Der bisherige Verlauf bleibt erhalten.",confirmText:"Entfernen",danger:true})) return;
    try{ const { error } = await window.supa.from("habits").update({archived:true}).eq("id",hid); if(error) throw error; await loadHabits(); }
    catch(e){ toast("Entfernen fehlgeschlagen"); }
  };

  if(habits===null) return <div className="mbody"><div className="muted">Lädt…</div></div>;

  // Punkte unter Tagen: an Tagen mit mind. einem erledigten Habit
  const dots={}; weekDates.forEach(d=>{ if(log[d] && Object.keys(log[d]).length) dots[d]=true; });
  // Wochen-Prozent + Tageswert
  const weekDone=weekDates.reduce((n,d)=> n + (log[d]?Object.keys(log[d]).length:0), 0);
  const weekPossible=(habits.length||0) * validDays;
  const weekPct=weekPossible? Math.round((weekDone/weekPossible)*100) : 0;
  const selDone=log[selDate]?Object.keys(log[selDate]).length:0;
  const msg = weekPct>=80?"Stark! Genau so bleibt man dran." : weekPct>=50?"Dranbleiben! Konsistenz schafft Ergebnisse." : "Jeder Tag zählt — bleib dran.";
  const PercentCard=()=> habits.length>0 ? <div className="pctcard">
    <div className="pct-icon"><Icon name="habits"/></div>
    <div className="pct-body">
      <div className="pct-lab">{weekOffset===0?"Diese Woche":"Diese Woche"}</div>
      <div className="pct-row"><span className="pct-big">{weekPct}%</span><span className="pct-sub">{selDone}/{habits.length} Habits {selDate===t?"heute":""}</span></div>
      <div className="pct-msg">{msg}</div>
    </div>
  </div> : null;

  const Strip=({hid,clickable})=> <div className="weekstrip">{weekDates.map(d=>{
    const done=log[d]&&log[d][hid]; const future=d>t; const isToday=d===t;
    return <div key={d} className="daycol">
      <div className="lbl">{weekdayShort(d)}</div>
      <div className={"dot7"+(done?" done":"")+(isToday?" today":"")+(clickable&&!future?" tap":"")+(future?" fut":"")}
           onClick={clickable&&!future?()=>toggle(hid,d):undefined}>{done?"✓":""}</div>
      <div className="dnum">{d.split("-")[2]}</div>
    </div>;
  })}</div>;

  if(role==="coach"){
    return <div className="mbody">
      <WeekCalendar weekDates={weekDates} selDate={selDate} setSelDate={setSelDate} weekOffset={weekOffset} changeWeek={changeWeek} dots={dots} t={t}/>
      {habits.length===0 && <div className="muted">Noch keine Gewohnheiten angelegt.</div>}
      {habits.map(h=>{ const done=weekDates.filter(d=>log[d]&&log[d][h.id]).length;
        return <div key={h.id} className="mcard">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontWeight:600,fontSize:15}}>{h.name}</div><div className="tag">{done}/{validDays}</div></div>
          <Strip hid={h.id} clickable={false}/></div>;
      })}
      <PercentCard/>
      <div className="sectlabel">Habits bearbeiten</div>
      <div className="mcard">
        {habits.map(h=>(<div key={h.id} className="exrow"><div className="en">{h.name}</div>
          <button className="delx" onClick={()=>delHabit(h.id)}>×</button></div>))}
        <div className="mini" style={{marginTop:12}}><input value={newH} onChange={(e)=>setNewH(e.target.value)} placeholder="Neue Gewohnheit…"/></div>
        <button className="addbtn" onClick={addHabit}>+ Hinzufügen</button>
      </div>
    </div>;
  }
  return <div className="mbody">
    <WeekCalendar weekDates={weekDates} selDate={selDate} setSelDate={setSelDate} weekOffset={weekOffset} changeWeek={changeWeek} dots={dots} t={t}/>
    {habits.length===0 && <div className="muted">Dein Coach hat noch keine Gewohnheiten angelegt.</div>}
    {habits.map(h=>{ const done=weekDates.filter(d=>log[d]&&log[d][h.id]).length;
      return <div key={h.id} className="mcard" style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div className="hn">{h.name}</div><div className="tag">{done}/{validDays}</div></div>
        <Strip hid={h.id} clickable={true}/>
      </div>;
    })}
    <PercentCard/>
  </div>;
}
