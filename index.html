/* ---------- TRAININGSPLAN ---------- */
function lastSessionFor(workoutLog, dayId){
  const ds=workoutLog.filter(w=>w.dayId===dayId).sort((a,b)=>a.date<b.date?-1:1);
  return ds.length?ds[ds.length-1]:null;
}

function lastSessionForPlan(workoutLog, planId, dayId){
  const ds=workoutLog.filter(w=>w.planId===planId && w.dayId===dayId).slice().sort((a,b)=>a.date<b.date?-1:1);
  return ds.length?ds[ds.length-1]:null;
}
function DayLogger({day,last,onSave,onCancel,mode,initialSets,initialDate,initialNote,isActive,onDelete,saving,image}){
  const buildInit=()=>{
    if(initialSets) return JSON.parse(JSON.stringify(initialSets));
    const o={}; day.exercises.forEach(ex=>{ const n=Math.max(1, parseInt(ex.sets)||1); o[ex.id]=Array.from({length:n}).map(()=>({reps:"",kg:""})); }); return o;
  };
  const [sets,setSets]=useState(buildInit());
  const [date,setDate]=useState(initialDate||today());
  const [note,setNote]=useState(initialNote||"");
  const [tab,setTab]=useState("sets"); // sets | notes
  const upd=(exId,idx,field,val)=>setSets(s=>({...s,[exId]:s[exId].map((row,i)=>i===idx?{...row,[field]:val}:row)}));
  const totalSets=day.exercises.reduce((n,ex)=>n+((sets[ex.id]||[]).length),0);
  const coachNotes=day.exercises.filter(ex=>ex.note&&ex.note.trim());

  // Letzte Leistung je Übung (Top-Satz nach kg) aus letzter Einheit
  const lastPerf=(exId)=>{
    const prev=last && last.sets && last.sets[exId];
    if(!prev||!prev.length) return null;
    let best=prev[0]; let bestKg=parseFloat(String(prev[0].kg).replace(",","."))||-1;
    prev.forEach(r=>{ const k=parseFloat(String(r.kg).replace(",","."))||-1; if(k>bestKg){ bestKg=k; best=r; } });
    if(bestKg>0 && best.reps) return best.kg+" kg × "+best.reps;
    if(best.reps) return best.reps+" Wdh";
    return null;
  };

  return <div className="mbody logview">
    <button className="link" style={{marginBottom:10}} onClick={onCancel}>‹ Alle Pläne</button>
    <div className="logtop">
      <div><div className="logtitle">{day.name}</div>{last && <div className="logsub">zuletzt: {fmtFull(last.date)}</div>}</div>
    </div>

    <div className="loginfo">
      <div className="li-ico">{image ? <img src={image} alt=""/> : <Icon name="chest"/>}</div>
      <div className="li-fields">
        <div className="li-flabel">Datum der Einheit</div>
        <DateField value={date} max={today()} onChange={setDate}/>
        <div className="li-flabel" style={{marginTop:12}}>Anzahl der Sätze</div>
        <div className="li-setcount"><Icon name="plan"/><span>{totalSets} {totalSets===1?"Satz":"Sätze"}</span></div>
      </div>
    </div>

    <div className="logtabs">
      <button className={tab==="sets"?"on":""} onClick={()=>setTab("sets")}>Übungen & Sätze</button>
      <button className={tab==="notes"?"on":""} onClick={()=>setTab("notes")}>Notizen</button>
    </div>

    {tab==="sets" ? <>
      {day.exercises.map(ex=>{ const prev=last && last.sets && last.sets[ex.id]; const perf=lastPerf(ex.id);
        return <div key={ex.id} className="exblock">
          <div className="exb-head"><div className="exb-name">{ex.name}</div><div className="exb-goal">Ziel: {ex.sets}×{ex.reps}</div></div>
          {perf && <div className="exb-last">Letzte Leistung<br/><b>{perf}</b></div>}
          <div className="setgrid sethead"><span>Satz</span><span>Wiederh.</span><span>kg</span><span></span></div>
          {(sets[ex.id]||[]).map((row,i)=>{ const ph=prev&&prev[i];
            return <div key={i} className="setgrid nodel">
              <span className="setno">{i+1}</span>
              <input className="setin" inputMode="numeric" value={row.reps} placeholder={ph&&ph.reps!=null?String(ph.reps):"–"} onChange={(e)=>upd(ex.id,i,"reps",e.target.value)}/>
              <input className="setin" inputMode="decimal" value={row.kg} placeholder={ph&&ph.kg!=null?String(ph.kg):"–"} onChange={(e)=>upd(ex.id,i,"kg",e.target.value)}/>
            </div>;
          })}
        </div>;
      })}
    </> : <>
      {coachNotes.length>0 && <div className="mcard" style={{borderColor:"rgba(225,29,46,0.3)"}}>
        <div className="li-flabel" style={{marginBottom:8}}>Hinweise deines Coaches</div>
        {coachNotes.map(ex=>(<div key={ex.id} style={{marginBottom:8}}><div className="en" style={{fontSize:14}}>{ex.name}</div><div className="enote">{ex.note}</div></div>))}
      </div>}
      <div className="mcard">
        <div className="li-flabel" style={{marginBottom:8}}>Deine Notiz zu dieser Einheit</div>
        <textarea className="ta" value={note} onChange={(e)=>setNote(e.target.value)} placeholder="Wie lief das Training? Schmerzen, Energie, Anmerkungen…"/>
      </div>
    </>}

    <button className="btn" style={{marginTop:8}} disabled={saving} onClick={()=>onSave(sets,date,note)}>{saving?"Speichert…":(mode==="edit"?"Änderungen speichern":"Training speichern")}</button>
    {mode==="edit" && <button className="link" style={{display:"block",margin:"14px auto 0",color:"var(--faint)"}} onClick={onDelete}>Eintrag löschen</button>}
  </div>;
}
function ExerciseAdder({onAdd}){
  const [n,setN]=useState(""),[s,setS]=useState("3"),[r,setR]=useState("8");
  return <div style={{marginTop:10}}>
    <div className="mini" style={{gap:6}}>
      <input value={n} onChange={(e)=>setN(e.target.value)} placeholder="Übung" style={{flex:2,minWidth:0}}/>
      <input value={s} onChange={(e)=>setS(e.target.value)} placeholder="Sätze" inputMode="numeric" style={{width:58,minWidth:0}}/>
      <input value={r} onChange={(e)=>setR(e.target.value)} placeholder="Whd" style={{width:58,minWidth:0}}/>
    </div>
    <button className="addbtn" onClick={()=>{ if(!n.trim())return; onAdd(n.trim(),s||"3",r||"8"); setN(""); }}>+ Übung</button>
  </div>;
}
function SetsStepper({value,onChange}){
  const v=Math.max(1,parseInt(value)||1);
  return <div className="stepper"><button onClick={()=>onChange(String(Math.max(1,v-1)))}>−</button><span>{v} Sätze</span><button onClick={()=>onChange(String(v+1))}>+</button></div>;
}
function ClientPlanView({plan,activeId,clientId,onBack,toast,imgResolve}){
  const [openDayId,setOpenDayId]=useState(null);   // neuer Eintrag für diesen Tag
  const [editWid,setEditWid]=useState(null);        // bestehende Einheit bearbeiten
  const [workouts,setWorkouts]=useState(null);
  const [openWid,setOpenWid]=useState(null);        // ausgeklappte Einheit (Ansicht)
  const [savingDay,setSavingDay]=useState(false);

  const loadWorkouts=async()=>{
    try{
      const { data:ws, error } = await window.supa
        .from("workouts").select("id,plan_id,day_id,date,note").eq("client_id",clientId).eq("plan_id",plan.id)
        .order("date",{ascending:false});
      if(error) throw error;
      const ids=(ws||[]).map(w=>w.id);
      let sets=[];
      if(ids.length){
        const { data:ss } = await window.supa.from("workout_sets")
          .select("workout_id,exercise_id,exercise_name,set_index,reps,kg").in("workout_id",ids).order("set_index",{ascending:true});
        sets=ss||[];
      }
      const assembled=(ws||[]).map(w=>{
        const by={};
        sets.filter(s=>s.workout_id===w.id).forEach(s=>{
          const key=s.exercise_id||s.exercise_name;
          if(!by[key]) by[key]=[];
          by[key].push({reps:s.reps,kg:s.kg,name:s.exercise_name});
        });
        return { id:w.id, planId:w.plan_id, dayId:w.day_id, date:w.date, note:w.note||"", sets:by };
      });
      setWorkouts(assembled);
    }catch(e){ toast("Verlauf konnte nicht geladen werden"); setWorkouts([]); }
  };
  useEffect(()=>{ if(clientId&&plan) loadWorkouts(); },[clientId, plan && plan.id]);

  const lastFor=(dayId)=>{
    if(!workouts) return null;
    const ds=workouts.filter(w=>w.dayId===dayId).slice().sort((a,b)=>a.date<b.date?1:-1);
    return ds.length?ds[0]:null;
  };
  // nächster Tag = nach dem zuletzt trainierten in Plan-Reihenfolge
  const nextDayId=(()=>{
    if(!plan.days.length) return null;
    if(!workouts||!workouts.length) return plan.days[0].id;
    const lastW=workouts.slice().sort((a,b)=>a.date<b.date?1:-1)[0];
    const li=plan.days.findIndex(d=>d.id===lastW.dayId);
    return plan.days[li>=0?((li+1)%plan.days.length):0].id;
  })();

  const writeSets=async(workoutId,day,sets)=>{
    const rows=[];
    day.exercises.forEach(ex=>{ (sets[ex.id]||[]).forEach((r,idx)=>{ if((r.reps==null||r.reps==="")&&(r.kg==null||r.kg==="")) return; rows.push({ workout_id:workoutId, client_id:clientId, exercise_id:ex.id, exercise_name:ex.name, set_index:idx, reps:String(r.reps||""), kg:String(r.kg||"") }); }); });
    if(rows.length){ const { error } = await window.supa.from("workout_sets").insert(rows); if(error) throw error; }
  };
  const saveDay=async(day,sets,date,note)=>{
    setSavingDay(true);
    try{
      const { data:w, error } = await window.supa.from("workouts")
        .insert({ client_id:clientId, plan_id:plan.id, day_id:day.id, date:date||today(), note:(note||"").trim()||null }).select("id").single();
      if(error) throw error;
      await writeSets(w.id,day,sets);
      toast("Training gespeichert");
      setOpenDayId(null);
      await loadWorkouts();
    }catch(e){ toast("Speichern fehlgeschlagen: "+(e.message||"")); }
    finally{ setSavingDay(false); }
  };
  const saveEdit=async(day,sets,date,wid,note)=>{
    setSavingDay(true);
    try{
      const { error:e1 } = await window.supa.from("workouts").update({ date:date||today(), note:(note||"").trim()||null }).eq("id",wid); if(e1) throw e1;
      const { error:e2 } = await window.supa.from("workout_sets").delete().eq("workout_id",wid); if(e2) throw e2;
      await writeSets(wid,day,sets);
      toast("Einheit aktualisiert");
      setEditWid(null);
      await loadWorkouts();
    }catch(e){ toast("Speichern fehlgeschlagen: "+(e.message||"")); }
    finally{ setSavingDay(false); }
  };
  const deleteWorkout=async(wid)=>{
    if(!await askConfirm({title:"Einheit löschen?",message:"Diese Trainingseinheit wird dauerhaft entfernt.",confirmText:"Löschen",danger:true})) return;
    try{ const { error } = await window.supa.from("workouts").delete().eq("id",wid); if(error) throw error; toast("Einheit gelöscht"); setEditWid(null); setOpenWid(null); await loadWorkouts(); }
    catch(e){ toast("Löschen fehlgeschlagen: "+(e.message||"")); }
  };

  const renderSession=(w)=>{
    const keys=Object.keys(w.sets);
    if(!keys.length) return <div className="muted">Keine Sätze erfasst.</div>;
    return keys.map(k=>{
      const rows=w.sets[k]; const nm=(rows[0]&&rows[0].name)|| (plan.days.flatMap(d=>d.exercises).find(e=>e.id===k)||{}).name || "Übung";
      const anyKg=rows.some(r=>r.kg&&r.kg!=="-"&&r.kg!=="");
      return <div key={k} style={{marginBottom:14}}>
        <div className="en" style={{marginBottom:2}}>{nm}</div>
        <table className="settbl"><thead><tr><th>Satz</th><th>Wdh</th>{anyKg&&<th>Gewicht</th>}</tr></thead>
        <tbody>{rows.map((r,i)=>(<tr key={i}><td>{i+1}</td><td>{r.reps||"–"}</td>{anyKg&&<td>{(r.kg&&r.kg!=="-"&&r.kg!=="")?(r.kg+" kg"):"–"}</td>}</tr>))}</tbody></table>
      </div>;
    });
  };

  // --- Fokus-Ansichten (neuer Eintrag / Bearbeiten) ---
  if(openDayId){
    const day=plan.days.find(d=>d.id===openDayId);
    if(day) return <DayLogger day={day} last={lastFor(day.id)} mode="new" isActive={plan.id===activeId} saving={savingDay} image={imgResolve?imgResolve(day.imagePath):""}
      onSave={(sets,date,note)=>saveDay(day,sets,date,note)} onCancel={()=>setOpenDayId(null)}/>;
  }
  if(editWid){
    const w=workouts && workouts.find(x=>x.id===editWid);
    const day=w && plan.days.find(d=>d.id===w.dayId);
    if(w && day){
      const initialSets={}; day.exercises.forEach(ex=>{ const arr=(w.sets[ex.id]||[]).map(r=>({reps:r.reps||"",kg:r.kg||""})); initialSets[ex.id]=arr.length?arr:[{reps:"",kg:""}]; });
      return <DayLogger day={day} last={null} mode="edit" initialSets={initialSets} initialDate={w.date} initialNote={w.note} saving={savingDay} image={imgResolve?imgResolve(day.imagePath):""}
        onSave={(sets,date,note)=>saveEdit(day,sets,date,w.id,note)} onCancel={()=>setEditWid(null)} onDelete={()=>deleteWorkout(w.id)}/>;
    }
  }

  // --- Übersicht ---
  const isActive=plan.id===activeId;
  const targetSets=(dayId)=>{ const d=plan.days.find(x=>x.id===dayId); return d?d.exercises.reduce((n,ex)=>n+(parseInt(ex.sets)||0),0):0; };

  return <div className="mbody">
    <button className="link" style={{marginBottom:12}} onClick={onBack}>‹ Alle Pläne</button>

    <div className="planhero">
      <div className="ph-text">
        <div className="ph-titlerow"><span className="ph-title">{plan.title}</span>{isActive && <span className="ph-badge">AKTUELL</span>}</div>
        <div className="ph-sub">{plan.days.length} {plan.days.length===1?"Trainingstag":"Trainingstage"} · tippe einen Tag an, um deine Sätze einzutragen</div>
      </div>
      <div className="ph-ico"><Icon name="plan"/></div>
    </div>

    <div className="sectlabel">Trainingstage</div>
    {plan.days.length===0 && <div className="muted">Für diesen Plan sind noch keine Tage hinterlegt.</div>}
    {plan.days.map(day=>{ const last=lastFor(day.id); const isNext=day.id===nextDayId;
      return <button key={day.id} className={"dayrow"+(isNext?" next":"")} onClick={()=>{ if(day.exercises.length){ setOpenDayId(day.id); } else { toast("Für diesen Tag sind keine Übungen hinterlegt."); } }}>
        <div className="dr-ico">{day.imagePath && imgResolve && imgResolve(day.imagePath) ? <img src={imgResolve(day.imagePath)} alt=""/> : <Icon name="chest"/>}</div>
        <div className="dr-main"><div className="dr-name">{day.name}</div><div className="dr-sub">{last?("zuletzt: "+fmtFull(last.date)):(day.exercises.length+" Übungen")}</div></div>
        <div className="dr-chev">›</div>
      </button>;
    })}

    <div className="sectlabel" style={{marginTop:20}}>Bereits absolviert</div>
    {workouts===null && <div className="muted">Lädt…</div>}
    {workouts!==null && workouts.length===0 && <div className="muted">Noch keine Einheiten. Tippe oben einen Trainingstag an.</div>}
    {workouts && workouts.length>0 && (()=>{
      const sorted=workouts.slice().sort((a,b)=>a.date<b.date?-1:1);
      const first=new Date(sorted[0].date+"T00:00:00");
      const weekOf=(d)=>Math.floor((new Date(d+"T00:00:00")-first)/(7*24*3600*1000))+1;
      const groups={}; workouts.forEach(w=>{ const wk=weekOf(w.date); (groups[wk]=groups[wk]||[]).push(w); });
      const weekNums=Object.keys(groups).map(Number).sort((a,b)=>b-a);
      return weekNums.map(wk=>{
        const items=groups[wk].slice().sort((a,b)=>a.date<b.date?1:-1);
        const rangeStart=fmtDay(dstr(addDays(first,(wk-1)*7))); const rangeEnd=fmtFull(dstr(addDays(first,(wk-1)*7+6)));
        return <div key={wk} style={{marginBottom:18}}>
          <div className="weekhead"><span className="wh-title">Woche {wk}</span><span className="wh-range">{rangeStart} – {rangeEnd}</span><span className="wh-count">{items.length}/{plan.days.length||items.length}</span></div>
          {items.map(w=>{ const day=plan.days.find(d=>d.id===w.dayId); const total=Object.values(w.sets).reduce((n,a)=>n+a.length,0);
            const tgt=targetSets(w.dayId); const pct=tgt?Math.min(100,Math.round((total/tgt)*100)):100; const open=openWid===w.id;
            return <div key={w.id} className="donecard">
              <button className="done-row" onClick={()=>setOpenWid(open?null:w.id)}>
                <div className="done-check"><Icon name="habits"/></div>
                <div className="done-main"><div className="done-name">{day?day.name:"Training"}</div><div className="done-sub">{fmtFull(w.date)} · {total} {total===1?"Satz":"Sätze"}</div></div>
                <div className="done-pct">{pct}%</div>
                <div className="dr-chev">{open?"▾":"›"}</div>
              </button>
              {open && <div className="done-body">
                {renderSession(w)}
                {w.note && <div className="worknote"><span className="wn-lab">Notiz</span>{w.note}</div>}
                <div className="done-acts">
                  <button className="da-edit" onClick={()=>{ setOpenWid(null); setEditWid(w.id); }}><Icon name="pencil"/>Bearbeiten</button>
                  <button className="da-del" onClick={()=>deleteWorkout(w.id)}><Icon name="trash"/>Löschen</button>
                </div>
              </div>}
            </div>;
          })}
        </div>;
      });
    })()}
  </div>;
}

function LivePlanTab({clientId,role,toast}){
  const [plans,setPlans]=useState(null);   // null=lädt
  const [activeId,setActiveId]=useState(null);
  const [err,setErr]=useState(null);
  const [openPlanId,setOpenPlanId]=useState(null);
  const [draft,setDraft]=useState(null);   // Coach-Entwurf des geöffneten Plans
  const [dirty,setDirty]=useState(false);
  const [saving,setSaving]=useState(false);
  const [openDayId,setOpenDayId]=useState(null);
  const [editing,setEditing]=useState(false);
  const [imgLib,setImgLib]=useState([]);     // [{id,label,path,url}]
  const [pickDayId,setPickDayId]=useState(null); // Tag, für den gerade ein Bild gewählt wird

  // Bild-Bibliothek laden (öffentlicher Bucket workout-images)
  const loadImgLib=async()=>{
    try{
      const { data } = await window.supa.from("workout_images").select("id,label,path,position").order("position",{ascending:true});
      const lib=(data||[]).map(r=>{ const { data:pub } = window.supa.storage.from("workout-images").getPublicUrl(r.path); return { id:r.id, label:r.label, path:r.path, url:(pub&&pub.publicUrl)||"" }; });
      setImgLib(lib);
    }catch(e){ setImgLib([]); }
  };
  useEffect(()=>{ loadImgLib(); },[]);
  const imgUrl=(path)=>{ if(!path) return ""; const hit=imgLib.find(i=>i.path===path); if(hit) return hit.url; const { data:pub } = window.supa.storage.from("workout-images").getPublicUrl(path); return (pub&&pub.publicUrl)||""; };

  // Pläne (mit Tagen + Übungen) laden
  const load=async()=>{
    setErr(null);
    try{
      const { data:pl, error:e1 } = await window.supa
        .from("plans").select("id,title,is_active,created_at").eq("client_id",clientId)
        .order("created_at",{ascending:false});
      if(e1) throw e1;
      const ids=(pl||[]).map(p=>p.id);
      let days=[], exs=[];
      if(ids.length){
        const { data:d } = await window.supa.from("plan_days").select("id,plan_id,name,position,image_path").in("plan_id",ids).order("position",{ascending:true});
        days=d||[];
        const dayIds=days.map(d=>d.id);
        if(dayIds.length){
          const { data:ex } = await window.supa.from("exercises").select("id,day_id,name,sets,reps,note,position").in("day_id",dayIds).order("position",{ascending:true});
          exs=ex||[];
        }
      }
      const assembled=(pl||[]).map(p=>({
        id:p.id, title:p.title, createdAt:p.created_at, is_active:p.is_active,
        days: days.filter(d=>d.plan_id===p.id).map(d=>({
          id:d.id, name:d.name, imagePath:d.image_path||"",
          exercises: exs.filter(e=>e.day_id===d.id).map(e=>({id:e.id,name:e.name,sets:e.sets,reps:e.reps,note:e.note||""})),
        })),
      }));
      setPlans(assembled);
      const act=(pl||[]).find(p=>p.is_active);
      setActiveId(act?act.id:null);
    }catch(e){ setErr(e.message||"Konnte Pläne nicht laden."); setPlans([]); }
  };
  useEffect(()=>{ if(clientId) load(); },[clientId]);

  const openForEdit=(p)=>{
    // tiefe Kopie als Entwurf; Coach landet zuerst in der Übersicht
    setDraft(JSON.parse(JSON.stringify(p))); setOpenPlanId(p.id); setDirty(false); setOpenDayId(null); setEditing(false);
  };
  const newPlan=()=>{ setDraft({id:null,title:"Neuer Plan",days:[]}); setOpenPlanId("__new__"); setDirty(true); setOpenDayId(null); setEditing(true); };

  // ---- Entwurf-Bearbeitung (nur lokal) ----
  const dUpd=(fn)=>{ setDraft(d=>fn(d)); setDirty(true); };
  const addDay=()=>dUpd(d=>({...d,days:[...d.days,{id:"tmp"+nid(),name:"Neuer Tag",imagePath:"",exercises:[]}]}));
  const delDay=(dayId)=>dUpd(d=>({...d,days:d.days.filter(x=>x.id!==dayId)}));
  const renameDay=(dayId,name)=>dUpd(d=>({...d,days:d.days.map(x=>x.id===dayId?{...x,name}:x)}));
  const setDayImage=(dayId,path)=>dUpd(d=>({...d,days:d.days.map(x=>x.id===dayId?{...x,imagePath:path}:x)}));
  const addEx=(dayId,nm,st,rp)=>dUpd(d=>({...d,days:d.days.map(x=>x.id===dayId?{...x,exercises:[...x.exercises,{id:"tmp"+nid(),name:nm,sets:st,reps:rp,note:""}]}:x)}));
  const setEx=(dayId,exId,field,val)=>dUpd(d=>({...d,days:d.days.map(x=>x.id===dayId?{...x,exercises:x.exercises.map(e=>e.id===exId?{...e,[field]:val}:e)}:x)}));
  const delEx=(dayId,exId)=>dUpd(d=>({...d,days:d.days.map(x=>x.id===dayId?{...x,exercises:x.exercises.filter(e=>e.id!==exId)}:x)}));

  // ---- Speichern: Entwurf -> Datenbank ----
  const save=async()=>{
    if(!draft.title.trim()){ toast("Bitte einen Titel vergeben"); return; }
    setSaving(true);
    try{
      let planId=draft.id;
      if(!planId){
        const { data:np, error } = await window.supa.from("plans")
          .insert({ client_id:clientId, title:draft.title.trim() }).select("id").single();
        if(error) throw error;
        planId=np.id;
      } else {
        const { error } = await window.supa.from("plans").update({ title:draft.title.trim() }).eq("id",planId);
        if(error) throw error;
      }
      // Bestehende Tage/Übungen dieses Plans laden, um Differenz zu bilden
      const { data:exDays } = await window.supa.from("plan_days").select("id").eq("plan_id",planId);
      const oldDayIds=(exDays||[]).map(d=>d.id);
      const keptDayIds=[];
      // Tage durchgehen (Reihenfolge = position)
      for(let i=0;i<draft.days.length;i++){
        const day=draft.days[i];
        let dayId=day.id;
        const isNew=String(dayId).indexOf("tmp")===0;
        if(isNew){
          const { data:nd, error } = await window.supa.from("plan_days")
            .insert({ plan_id:planId, client_id:clientId, name:day.name, position:i, image_path:day.imagePath||null }).select("id").single();
          if(error) throw error;
          dayId=nd.id;
        } else {
          await window.supa.from("plan_days").update({ name:day.name, position:i, image_path:day.imagePath||null }).eq("id",dayId);
        }
        keptDayIds.push(dayId);
        // Übungen dieses Tags neu schreiben: einfacher Ansatz – alte löschen, neue einfügen
        if(!isNew) await window.supa.from("exercises").delete().eq("day_id",dayId);
        if(day.exercises.length){
          const rows=day.exercises.map((e,idx)=>({ day_id:dayId, client_id:clientId, name:e.name, sets:parseInt(e.sets)||3, reps:String(e.reps||"8"), note:e.note||"", position:idx }));
          const { error } = await window.supa.from("exercises").insert(rows);
          if(error) throw error;
        }
      }
      // Entfernte Tage löschen
      const toDelete=oldDayIds.filter(id=>keptDayIds.indexOf(id)===-1);
      if(toDelete.length) await window.supa.from("plan_days").delete().in("id",toDelete);

      toast("Plan gespeichert");
      setDirty(false);
      await load();
      // zurück in die Übersicht des gespeicherten Plans (frische Daten holen)
      try{
        const { data:fresh } = await window.supa.from("plans").select("id,title,is_active,created_at").eq("id",planId).maybeSingle();
        const { data:fd } = await window.supa.from("plan_days").select("id,plan_id,name,position,image_path").eq("plan_id",planId).order("position",{ascending:true});
        const dayIds=(fd||[]).map(d=>d.id);
        let fe=[]; if(dayIds.length){ const { data:e } = await window.supa.from("exercises").select("id,day_id,name,sets,reps,note,position").in("day_id",dayIds).order("position",{ascending:true}); fe=e||[]; }
        const rebuilt={ id:planId, title:(fresh&&fresh.title)||draft.title, createdAt:fresh&&fresh.created_at, days:(fd||[]).map(d=>({id:d.id,name:d.name,imagePath:d.image_path||"",exercises:fe.filter(x=>x.day_id===d.id).map(x=>({id:x.id,name:x.name,sets:x.sets,reps:x.reps,note:x.note||""}))})) };
        setDraft(rebuilt); setOpenPlanId(planId); setEditing(false);
      }catch(_e){ setOpenPlanId(null); setDraft(null); }
    }catch(e){ toast("Speichern fehlgeschlagen: "+(e.message||"")); }
    finally{ setSaving(false); }
  };

  const setActive=async(planId)=>{
    try{ const { error } = await window.supa.rpc("set_active_plan",{ p_plan:planId }); if(error) throw error; setActiveId(planId); toast("Als aktuell gesetzt"); }
    catch(e){ toast("Fehler: "+(e.message||"")); }
  };
  const deletePlan=async(planId)=>{
    if(!await askConfirm({title:"Plan löschen?",message:"Erfasste Einheiten bleiben im Verlauf erhalten.",confirmText:"Löschen",danger:true})) return;
    try{ const { error } = await window.supa.from("plans").delete().eq("id",planId); if(error) throw error; toast("Plan gelöscht"); setOpenPlanId(null); setDraft(null); await load(); }
    catch(e){ toast("Löschen fehlgeschlagen: "+(e.message||"")); }
  };

  // ===== RENDER =====
  if(plans===null) return <div className="mbody"><div className="muted">Lädt…</div></div>;

  // Liste
  if(!openPlanId){
    return <div className="mbody">
      <div className="sectlabel">{role==="coach"?"Trainingspläne":"Deine Trainingspläne"}</div>
      {err && <div className="authmsg err" style={{marginBottom:10}}>{err}</div>}
      {plans.length===0 && <div className="muted">Noch kein Plan angelegt.</div>}
      {plans.map(p=>(
        <button key={p.id} className="planrow" onClick={()=>openForEdit(p)}>
          <div className="pi"><div className="pt">{p.title||"Ohne Titel"}</div>
            <div className="ps">{p.days.length} Tage{p.createdAt?" · ab "+fmtFull(p.createdAt):""}</div></div>
          {p.id===activeId && <span className="badge">Aktuell</span>}
          <div className="chev" style={{color:"var(--faint)",fontSize:20}}>›</div>
        </button>
      ))}
      {role==="coach" && <button className="btn btn-ghost" style={{marginTop:8}} onClick={newPlan}>+ Neuer Trainingsplan</button>}
    </div>;
  }

  // ----- Kunden-Ansicht: Plan ansehen, Einheiten eintragen, Historie -----
  if(role!=="coach"){
    return <ClientPlanView plan={draft} activeId={activeId} clientId={clientId} onBack={()=>{ setOpenPlanId(null); setDraft(null); }} toast={toast} imgResolve={imgUrl}/>;
  }

  // ----- Coach: Übersicht (Verlauf oben, Plan darunter, Bearbeiten-Button) -----
  if(role==="coach" && !editing){
    const isActiveO=draft && draft.id===activeId;
    return <div className="mbody">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:12}}>
        <button className="link" onClick={()=>{ setOpenPlanId(null); setDraft(null); }}>‹ Alle Pläne</button>
        <button className="btn" style={{width:"auto",padding:"8px 16px"}} onClick={()=>setEditing(true)}>Bearbeiten</button>
      </div>
      <div className="mcard" style={{padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{fontWeight:800,fontSize:17}}>{draft.title}</div>{isActiveO && <span className="badge">Aktuell</span>}</div>
        <div className="muted" style={{marginTop:3}}>{draft.days.length} Trainingstage</div>
        {!isActiveO && draft.id && <button className="link" style={{marginTop:8}} onClick={()=>setActive(draft.id)}>Als aktuellen Plan setzen</button>}
      </div>
      {draft.id && <CoachWorkoutHistory plan={draft} clientId={clientId} toast={toast}/>}
      <div className="sectlabel" style={{marginTop:20}}>Planinhalt</div>
      {draft.days.length===0 && <div className="muted">Noch keine Trainingstage. Tippe „Bearbeiten“, um den Plan aufzubauen.</div>}
      {draft.days.map(day=>(<div key={day.id} className="mcard">
        <div style={{fontWeight:700,marginBottom:8}}>{day.name}</div>
        {day.exercises.length===0 && <div className="muted" style={{fontSize:13}}>Keine Übungen.</div>}
        {day.exercises.map(ex=>(<div key={ex.id} className="exrow">
          <div><div className="en">{ex.name}</div>{ex.note?<div className="enote">{ex.note}</div>:null}</div>
          <div className="enote" style={{whiteSpace:"nowrap"}}>{ex.sets}×{ex.reps}</div>
        </div>))}
      </div>))}
    </div>;
  }

  // Editor (Coach) – Kunde bearbeitet Pläne nicht, sieht sie nur (kommt in Etappe B)
  const isActive=draft && draft.id===activeId;
  return <div className="mbody">
    <button className="link" style={{marginBottom:12}} onClick={async()=>{ if(dirty && !await askConfirm({title:"Änderungen verwerfen?",message:"Du hast ungespeicherte Änderungen an diesem Plan.",confirmText:"Verwerfen",cancelText:"Weiter bearbeiten",danger:true})) return; if(draft.id){ setEditing(false); setDirty(false); } else { setOpenPlanId(null); setDraft(null); setDirty(false); } }}>‹ {draft.id?"Zurück":"Alle Pläne"}</button>
    <div className="mcard" style={{padding:"6px 14px"}}>
      <input className="titlein" value={draft.title} onChange={(e)=>dUpd(d=>({...d,title:e.target.value}))} placeholder="Plan-Titel"/>
    </div>
    {draft.id && <div style={{display:"flex",alignItems:"center",gap:10,margin:"10px 2px 14px"}}>
      {isActive ? <span className="badge">Aktueller Plan</span> : <button className="link" onClick={()=>setActive(draft.id)}>Als aktuellen Plan setzen</button>}
    </div>}
    {draft.days.map(day=>(<div key={day.id} className="mcard">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:8}}>
        <input className="dayin" value={day.name} onChange={(e)=>renameDay(day.id,e.target.value)}/>
        <button className="delx" onClick={()=>delDay(day.id)}>×</button></div>
      <button className="imgpick" onClick={()=>setPickDayId(day.id)}>
        {day.imagePath ? <img className="imgpick-thumb" src={imgUrl(day.imagePath)} alt=""/> : <span className="imgpick-ph"><Icon name="photo"/></span>}
        <span className="imgpick-lab">{day.imagePath ? (imgLib.find(i=>i.path===day.imagePath)||{}).label || "Bild gewählt" : "Bild wählen"}</span>
        <span className="imgpick-chev">›</span>
      </button>
      {day.exercises.map(ex=>(<div key={ex.id} className="exedit">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <input className="exname" value={ex.name} onChange={(e)=>setEx(day.id,ex.id,"name",e.target.value)} placeholder="Übung"/>
          <button className="delx" onClick={()=>delEx(day.id,ex.id)}>×</button>
        </div>
        <div style={{display:"flex",gap:8,marginTop:7,alignItems:"center"}}>
          <SetsStepper value={ex.sets} onChange={(v)=>setEx(day.id,ex.id,"sets",v)}/>
          <div className="mini" style={{flex:1,gap:6}}><span className="unit">Wdh.</span><input className="setin" style={{flex:1}} value={ex.reps} onChange={(e)=>setEx(day.id,ex.id,"reps",e.target.value)} placeholder="8"/></div>
        </div>
        <input className="notein" value={ex.note} onChange={(e)=>setEx(day.id,ex.id,"note",e.target.value)} placeholder="Hinweis (optional)"/>
      </div>))}
      <ExerciseAdder onAdd={(nm,st,rp)=>addEx(day.id,nm,st,rp)}/>
    </div>))}
    {pickDayId && <ImagePickerSheet lib={imgLib} current={(draft.days.find(d=>d.id===pickDayId)||{}).imagePath||""} onClose={()=>setPickDayId(null)} onPick={(p)=>{ setDayImage(pickDayId,p); setPickDayId(null); }}/>}
    <button className="btn btn-ghost" onClick={addDay}>+ Trainingstag</button>
    <button className="btn" style={{marginTop:12}} disabled={saving||!dirty} onClick={save}>{saving?"Speichert…":(dirty?"Plan speichern":"Gespeichert ✓")}</button>
    {draft.id && <button className="link" style={{display:"block",margin:"16px auto 0",color:"var(--faint)"}} onClick={()=>deletePlan(draft.id)}>Plan löschen</button>}
  </div>;
}

function CoachWorkoutHistory({plan,clientId,toast}){
  const [workouts,setWorkouts]=useState(null);
  const [openWid,setOpenWid]=useState(null);
  const load=async()=>{
    try{
      const { data:ws, error } = await window.supa.from("workouts")
        .select("id,plan_id,day_id,date,note").eq("client_id",clientId).eq("plan_id",plan.id).order("date",{ascending:false});
      if(error) throw error;
      const ids=(ws||[]).map(w=>w.id); let sets=[];
      if(ids.length){ const { data:ss } = await window.supa.from("workout_sets").select("workout_id,exercise_id,exercise_name,set_index,reps,kg").in("workout_id",ids).order("set_index",{ascending:true}); sets=ss||[]; }
      setWorkouts((ws||[]).map(w=>{ const by={}; sets.filter(s=>s.workout_id===w.id).forEach(s=>{ const k=s.exercise_id||s.exercise_name; (by[k]=by[k]||[]).push({reps:s.reps,kg:s.kg,name:s.exercise_name}); }); return {id:w.id,dayId:w.day_id,date:w.date,note:w.note||"",sets:by}; }));
    }catch(e){ setWorkouts([]); }
  };
  useEffect(()=>{ if(clientId&&plan&&plan.id) load(); },[clientId, plan && plan.id]);
  const renderSession=(w)=>{ const keys=Object.keys(w.sets); if(!keys.length) return <div className="muted">Keine Sätze erfasst.</div>;
    return keys.map(k=>{ const rows=w.sets[k]; const nm=(rows[0]&&rows[0].name)||(plan.days.flatMap(d=>d.exercises).find(e=>e.id===k)||{}).name||"Übung";
      const anyKg=rows.some(r=>r.kg&&r.kg!=="-"&&r.kg!=="");
      return <div key={k} style={{marginBottom:14}}><div className="en" style={{marginBottom:2}}>{nm}</div>
        <table className="settbl"><thead><tr><th>Satz</th><th>Wdh</th>{anyKg&&<th>Gewicht</th>}</tr></thead>
        <tbody>{rows.map((r,i)=>(<tr key={i}><td>{i+1}</td><td>{r.reps||"–"}</td>{anyKg&&<td>{(r.kg&&r.kg!=="-"&&r.kg!=="")?(r.kg+" kg"):"–"}</td>}</tr>))}</tbody></table></div>; });
  };
  return <div style={{marginTop:20}}>
    <div className="sectlabel">Absolvierte Einheiten</div>
    {workouts===null && <div className="muted">Lädt…</div>}
    {workouts!==null && workouts.length===0 && <div className="muted">Dein Kunde hat in diesem Plan noch keine Einheit eingetragen.</div>}
    {workouts && workouts.length>0 && (()=>{
      // Woche 1 = Woche der allerersten Einheit dieses Plans
      const sorted=workouts.slice().sort((a,b)=>a.date<b.date?-1:1);
      const first=new Date(sorted[0].date+"T00:00:00");
      const weekOf=(d)=>Math.floor((new Date(d+"T00:00:00")-first)/(7*24*3600*1000))+1;
      const groups={};
      workouts.forEach(w=>{ const wk=weekOf(w.date); (groups[wk]=groups[wk]||[]).push(w); });
      const weekNums=Object.keys(groups).map(Number).sort((a,b)=>b-a); // neueste Woche oben
      return weekNums.map(wk=>{
        const items=groups[wk].slice().sort((a,b)=>a.date<b.date?1:-1); // innerhalb der Woche neueste oben
        return <div key={wk} style={{marginBottom:18}}>
          <div style={{fontWeight:800,fontSize:15,margin:"6px 2px 10px",color:"var(--text)"}}>Woche {wk}</div>
          {items.map(w=>{ const day=plan.days.find(d=>d.id===w.dayId); const total=Object.values(w.sets).reduce((n,a)=>n+a.length,0); const open=openWid===w.id;
            return <div key={w.id} className="exp">
              <div className="head" onClick={()=>setOpenWid(open?null:w.id)}>
                <div><div style={{fontWeight:700}}>{day?day.name:"Training"}</div><div className="enote" style={{marginTop:2}}>{fmtFull(w.date)} · {total} Sätze</div></div>
                <div className="muted">{open?"▾":"▸"}</div>
              </div>
              {open && <div className="body2">{renderSession(w)}{w.note && <div className="worknote"><span className="wn-lab">Notiz vom Kunden</span>{w.note}</div>}</div>}
            </div>;
          })}
        </div>;
      });
    })()}
  </div>;
}

function PlanTab({cdata,upd,role,toast}){
  const plans=cdata.plans||[];
  const [openPlanId,setOpenPlanId]=useState(null);
  const [openDayId,setOpenDayId]=useState(null);
  const openPlan=plans.find(p=>p.id===openPlanId)||null;

  if(!openPlan){
    const sorted=plans.slice().sort((a,b)=>(a.createdAt||"")<(b.createdAt||"")?1:-1);
    return <div className="mbody">
      <div className="sectlabel">{role==="coach"?"Trainingspläne":"Deine Trainingspläne"}</div>
      {sorted.length===0 && <div className="muted">Noch kein Plan angelegt.</div>}
      {sorted.map(p=>{ const isActive=p.id===cdata.activePlanId; const sess=cdata.workoutLog.filter(w=>w.planId===p.id).length;
        return <button key={p.id} className="planrow" onClick={()=>{setOpenPlanId(p.id);setOpenDayId(null);}}>
          <div className="pi"><div className="pt">{p.title||"Ohne Titel"}</div>
            <div className="ps">{p.days.length} Tage · {sess} Einheiten{p.createdAt?" · ab "+fmtFull(p.createdAt):""}</div></div>
          {isActive && <span className="badge">Aktuell</span>}
          <div className="chev" style={{color:"var(--faint)",fontSize:20}}>›</div>
        </button>;
      })}
      {role==="coach" && <button className="btn btn-ghost" style={{marginTop:8}} onClick={()=>{ const id="p"+nid(); upd(c=>({...c,plans:[...c.plans,{id,title:"Neuer Plan",createdAt:today(),days:[]}],activePlanId:id})); setOpenPlanId(id); setOpenDayId(null); toast("Neuer Plan angelegt"); }}>+ Neuer Trainingsplan</button>}
    </div>;
  }

  const updPlan=(fn)=>upd(c=>({...c,plans:c.plans.map(p=>p.id===openPlan.id?fn(p):p)}));
  const isActive=openPlan.id===cdata.activePlanId;

  if(role==="coach"){
    const setEx=(dayId,exId,field,val)=>updPlan(p=>({...p,days:p.days.map(d=>d.id===dayId?{...d,exercises:d.exercises.map(e=>e.id===exId?{...e,[field]:val}:e)}:d)}));
    return <div className="mbody">
      <button className="link" style={{marginBottom:12}} onClick={()=>setOpenPlanId(null)}>‹ Alle Pläne</button>
      <div className="mcard" style={{padding:"6px 14px"}}>
        <input className="titlein" value={openPlan.title} onChange={(e)=>updPlan(p=>({...p,title:e.target.value}))} placeholder="Plan-Titel"/>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"10px 2px 14px"}}>
        {isActive ? <span className="badge">Aktueller Plan</span>
          : <button className="link" onClick={()=>upd(c=>({...c,activePlanId:openPlan.id}))}>Als aktuellen Plan setzen</button>}
      </div>
      {openPlan.days.map(day=>(<div key={day.id} className="mcard">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,gap:8}}>
          <input className="dayin" value={day.name} onChange={(e)=>updPlan(p=>({...p,days:p.days.map(d=>d.id===day.id?{...d,name:e.target.value}:d)}))}/>
          <button className="delx" onClick={()=>updPlan(p=>({...p,days:p.days.filter(d=>d.id!==day.id)}))}>×</button></div>
        {day.exercises.map(ex=>(<div key={ex.id} className="exedit">
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <input className="exname" value={ex.name} onChange={(e)=>setEx(day.id,ex.id,"name",e.target.value)} placeholder="Übung"/>
            <button className="delx" onClick={()=>updPlan(p=>({...p,days:p.days.map(d=>d.id===day.id?{...d,exercises:d.exercises.filter(e=>e.id!==ex.id)}:d)}))}>×</button>
          </div>
          <div style={{display:"flex",gap:8,marginTop:7,alignItems:"center"}}>
            <SetsStepper value={ex.sets} onChange={(v)=>setEx(day.id,ex.id,"sets",v)}/>
            <div className="mini" style={{flex:1,gap:6}}><span className="unit">Wdh.</span><input className="setin" style={{flex:1}} value={ex.reps} onChange={(e)=>setEx(day.id,ex.id,"reps",e.target.value)} placeholder="8"/></div>
          </div>
          <input className="notein" value={ex.note} onChange={(e)=>setEx(day.id,ex.id,"note",e.target.value)} placeholder="Hinweis (optional)"/>
        </div>))}
        <ExerciseAdder onAdd={(nm,st,rp)=>updPlan(p=>({...p,days:p.days.map(d=>d.id===day.id?{...d,exercises:[...d.exercises,{id:"e"+nid(),name:nm,sets:st,reps:rp,note:""}]}:d)}))}/>
      </div>))}
      <button className="btn btn-ghost" onClick={()=>updPlan(p=>({...p,days:[...p.days,{id:"d"+nid(),name:"Neuer Tag",exercises:[]}]}))}>+ Trainingstag</button>
      {plans.length>1 && <button className="link" style={{display:"block",margin:"18px auto 0",color:"var(--faint)"}} onClick={async()=>{ if(await askConfirm({title:"Plan löschen?",message:"Die bisherigen Einheiten bleiben im Verlauf erhalten.",confirmText:"Löschen",danger:true})){ const remaining=cdata.plans.filter(p=>p.id!==openPlan.id); const na=remaining.length?remaining[remaining.length-1].id:null; upd(c=>({...c,plans:remaining,activePlanId:c.activePlanId===openPlan.id?na:c.activePlanId})); setOpenPlanId(null);} }}>Plan löschen</button>}
    </div>;
  }

  const saveDay=(day,sets,date)=>{
    const clean={}; Object.keys(sets).forEach(exId=>{ clean[exId]=sets[exId].map(r=>({reps:r.reps,kg:r.kg})); });
    upd(c=>({...c,workoutLog:[...c.workoutLog,{id:"w"+nid(),planId:openPlan.id,dayId:day.id,date:date||today(),sets:clean}]}));
    toast("Training gespeichert");
  };
  return <div className="mbody">
    <button className="link" style={{marginBottom:12}} onClick={()=>setOpenPlanId(null)}>‹ Alle Pläne</button>
    <div className="mcard" style={{padding:"14px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{fontWeight:700,fontSize:16}}>{openPlan.title}</div>{isActive && <span className="badge">Aktuell</span>}</div>
      <div className="muted" style={{marginTop:3}}>{openPlan.days.length} Trainingstage · tippe einen Tag an, trag deine Sätze ein</div>
    </div>
    {openPlan.days.map(day=>{ const last=lastSessionForPlan(cdata.workoutLog,openPlan.id,day.id); const open=openDayId===day.id;
      return <div key={day.id} className="exp">
        <div className="head" onClick={()=>setOpenDayId(open?null:day.id)}>
          <div><div style={{fontWeight:700}}>{day.name}</div>{last && <div className="enote" style={{marginTop:2}}>zuletzt: {fmtFull(last.date)}</div>}</div>
          <div className="muted">{open?"▾":"▸"}</div></div>
        {open && (day.exercises.length===0
          ? <div className="body2"><div className="muted">Für diesen Tag sind noch keine Übungen hinterlegt.</div></div>
          : <DayLogger day={day} last={last} onSave={(sets,date)=>saveDay(day,sets,date)}/>)}
      </div>;
    })}
    <div className="sectlabel" style={{marginTop:16}}>Einheiten in diesem Plan</div>
    <PlanHistory workoutLog={cdata.workoutLog} plan={openPlan}/>
  </div>;
}

function MacroEditor({cdata,upd}){
  const m=cdata.macros; const set=(k,v)=>upd(c=>({...c,macros:{...c.macros,[k]:+v||0}}));
  const row=(k,label,unit)=>(<div className="mini" style={{marginBottom:10}}><div style={{width:96,color:"var(--dim)",fontSize:13.5}}>{label}</div>
    <input inputMode="numeric" value={m[k]} onChange={(e)=>set(k,e.target.value)}/><span className="unit">{unit}</span></div>);
  return <div className="mcard"><div className="sectlabel" style={{margin:"0 0 10px"}}>Tagesziele</div>
    {row("kcal","Kalorien","kcal")}{row("protein","Protein","g")}{row("carbs","Kohlenhydr.","g")}{row("fat","Fett","g")}</div>;
}
function ChecklistEditor({cdata,upd}){
  const [n,setN]=useState("");
  return <div className="mcard"><div className="sectlabel" style={{margin:"0 0 10px"}}>Ernährungs-Häkchen</div>
    {cdata.nutChecklist.map(i=>(<div key={i.id} className="exrow"><div className="en">{i.name}</div>
      <button className="delx" onClick={()=>upd(c=>({...c,nutChecklist:c.nutChecklist.filter(x=>x.id!==i.id)}))}>×</button></div>))}
    <div className="mini" style={{marginTop:12}}><input value={n} onChange={(e)=>setN(e.target.value)} placeholder="Neuer Punkt…"/></div>
    <button className="addbtn" onClick={()=>{ if(!n.trim())return; upd(c=>({...c,nutChecklist:[...c.nutChecklist,{id:"n"+nid(),name:n.trim()}]})); setN(""); }}>+ Hinzufügen</button>
  </div>;
}
function Toggle({on,onClick}){
  return <button onClick={onClick} aria-pressed={on} className={"tgl"+(on?" on":"")}><span className="knob"/></button>;
}
function MacrosClientBlock({cdata,upd,toast}){
  const m=cdata.macros, t=today();
  const todayEntry=cdata.nutLog.find(e=>e.date===t);
  const [k,setK]=useState(todayEntry&&todayEntry.kcal!=null?String(todayEntry.kcal):"");
  const [p,setP]=useState(todayEntry&&todayEntry.protein!=null?String(todayEntry.protein):"");
  const [cb,setCb]=useState(todayEntry&&todayEntry.carbs!=null?String(todayEntry.carbs):"");
  const [f,setF]=useState(todayEntry&&todayEntry.fat!=null?String(todayEntry.fat):"");
  const save=()=>{ upd(c=>{ const ex=c.nutLog.find(e=>e.date===t)||{date:t}; const merged={...ex,date:t,kcal:+k||0,protein:+p||0,carbs:+cb||0,fat:+f||0}; return {...c,nutLog:[merged,...c.nutLog.filter(e=>e.date!==t)]}; }); toast("Gespeichert"); };
  const bar=(label,val,target,unit)=>{ const pct=Math.min(100,Math.round((val/(target||1))*100));
    return <div className="macro"><div className="top"><span className="nm">{label}</span><span className="vv">{val} / {target} {unit}</span></div><div className="bar"><div style={{width:pct+"%"}}/></div></div>; };
  const has=todayEntry && todayEntry.kcal!=null;
  return <>
    <div className="sectlabel">Makros heute · {fmtFull(t)}</div>
    <div className="mcard">
      {has ? <>{bar("Kalorien",todayEntry.kcal,m.kcal,"kcal")}{bar("Protein",todayEntry.protein,m.protein,"g")}{bar("Kohlenhydrate",todayEntry.carbs,m.carbs,"g")}{bar("Fett",todayEntry.fat,m.fat,"g")}</>
        : <div className="muted">Noch nichts für heute eingetragen. Ziele: {m.kcal} kcal · {m.protein}P / {m.carbs}K / {m.fat}F</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:has?16:14}}>
        <LabeledNum label="Kalorien" unit="kcal" value={k} onChange={setK}/>
        <LabeledNum label="Protein" unit="g" value={p} onChange={setP}/>
        <LabeledNum label="Kohlenhydr." unit="g" value={cb} onChange={setCb}/>
        <LabeledNum label="Fett" unit="g" value={f} onChange={setF}/>
      </div>
      <button className="btn" style={{marginTop:12}} onClick={save}>Makros speichern</button>
    </div>
  </>;
}
function ChecklistClientBlock({cdata,upd}){
  const t=today();
  const entry=cdata.nutLog.find(e=>e.date===t)||{date:t,checked:{}};
  const toggle=(id)=>upd(c=>{ const ex=c.nutLog.find(e=>e.date===t)||{date:t}; const checked={...(ex.checked||{})}; checked[id]=!checked[id]; return {...c,nutLog:[{...ex,date:t,checked},...c.nutLog.filter(e=>e.date!==t)]}; });
  const done=cdata.nutChecklist.filter(i=>entry.checked && entry.checked[i.id]).length;
  return <>
    <div className="sectlabel">Häkchen heute · {done}/{cdata.nutChecklist.length}</div>
    {cdata.nutChecklist.map(i=>{ const on=entry.checked && entry.checked[i.id];
      return <div key={i.id} className="mcard" style={{padding:14}}><div className="habrow" onClick={()=>toggle(i.id)}><div className={"check"+(on?" on":"")}>✓</div><div className="hn">{i.name}</div></div></div>; })}
  </>;
}
function LiveFoodTab({clientId,role,toast}){
  const t=today();
  const [settings,setSettings]=useState(null);
  const [checklist,setChecklist]=useState([]);
  const [weekOffset,setWeekOffset]=useState(0);
  const [selDate,setSelDate]=useState(today());
  const [logs,setLogs]=useState({});      // logs[date]={kcal,protein,carbs,fat}
  const [checks,setChecks]=useState({});   // checks[date][item_id]=true

  const DEF={macros_enabled:false,checks_enabled:false,kcal:2000,protein:160,carbs:180,fat:65};
  const mondayOf=(d)=>{ const x=new Date(d); x.setHours(0,0,0,0); const dow=(x.getDay()+6)%7; x.setDate(x.getDate()-dow); return x; };
  const weekStart=addDays(mondayOf(new Date()), weekOffset*7);
  const weekDates=Array.from({length:7}).map((_,i)=>dstr(addDays(weekStart,i)));
  const validDays=weekDates.filter(d=>d<=t).length || 7;
  const changeWeek=(delta)=>{ const no=weekOffset+delta; if(no>0) return; const ws=addDays(mondayOf(new Date()), no*7); const wd=Array.from({length:7}).map((_,i)=>dstr(addDays(ws,i))); setWeekOffset(no); setSelDate(wd[6]<=t?wd[6]:t); };

  const loadBase=async()=>{
    try{
      const { data:st } = await window.supa.from("nutrition_settings").select("*").eq("client_id",clientId).maybeSingle();
      setSettings(st?{macros_enabled:st.macros_enabled,checks_enabled:st.checks_enabled,kcal:st.kcal,protein:st.protein,carbs:st.carbs,fat:st.fat}:{...DEF});
      const { data:cl } = await window.supa.from("nutrition_checklist").select("id,name,position").eq("client_id",clientId).order("position",{ascending:true}).order("created_at",{ascending:true});
      setChecklist((cl||[]).map(i=>({id:i.id,name:i.name})));
    }catch(e){ toast("Ernährung konnte nicht geladen werden"); setSettings({...DEF}); }
  };
  const loadWeek=async()=>{
    try{
      const { data:ls } = await window.supa.from("nutrition_logs").select("date,kcal,protein,carbs,fat").eq("client_id",clientId).gte("date",weekDates[0]).lte("date",weekDates[6]);
      const lm={}; (ls||[]).forEach(r=>{ lm[r.date]={kcal:r.kcal,protein:r.protein,carbs:r.carbs,fat:r.fat}; }); setLogs(lm);
      const ids=checklist.map(i=>i.id);
      if(ids.length){
        const { data:cs } = await window.supa.from("nutrition_check_logs").select("item_id,date,done").in("item_id",ids).gte("date",weekDates[0]).lte("date",weekDates[6]);
        const cm={}; (cs||[]).forEach(r=>{ if(r.done){ (cm[r.date]=cm[r.date]||{})[r.item_id]=true; } }); setChecks(cm);
      } else setChecks({});
    }catch(e){ /* still */ }
  };
  useEffect(()=>{ if(clientId) loadBase(); },[clientId]);
  useEffect(()=>{ if(clientId && settings) loadWeek(); },[clientId, settings, checklist, weekOffset]);

  const saveSettings=async(patch)=>{
    const next={...settings,...patch}; setSettings(next);
    try{ const { error } = await window.supa.from("nutrition_settings").upsert({ client_id:clientId, ...next },{onConflict:"client_id"}); if(error) throw error; }
    catch(e){ toast("Speichern fehlgeschlagen: "+(e.message||"")); loadBase(); }
  };

  if(settings===null) return <div className="mbody"><div className="muted">Lädt…</div></div>;
  const macrosOn=settings.macros_enabled, checksOn=settings.checks_enabled;

  // Punkte unter Tagen: Tag hat Makro-Eintrag oder gesetztes Häkchen
  const dots={}; weekDates.forEach(d=>{ const hasM=logs[d]&&logs[d].kcal!=null; const hasC=checks[d]&&Object.keys(checks[d]).length; if(hasM||hasC) dots[d]=true; });

  // ---------- COACH: Konfiguration + Wochen-Einsicht ----------
  if(role==="coach"){
    return <div className="mbody">
      <div className="sectlabel">Ernährung für diesen Kunden</div>
      <div className="mcard" style={{padding:"6px 16px"}}>
        <div className="tglrow"><div><div className="en">Makros</div><div className="enote">Kalorien & Makronährstoffe mit Tageszielen</div></div>
          <Toggle on={macrosOn} onClick={()=>saveSettings({macros_enabled:!macrosOn})}/></div>
        <div className="tglrow" style={{borderTop:"1px solid var(--line)"}}><div><div className="en">Häkchen</div><div className="enote">Einfache Ja/Nein-Punkte zum Abhaken</div></div>
          <Toggle on={checksOn} onClick={()=>saveSettings({checks_enabled:!checksOn})}/></div>
      </div>
      {macrosOn && <LiveMacroEditor settings={settings} onSave={(m)=>saveSettings(m)}/>}
      {checksOn && <LiveChecklistEditor clientId={clientId} items={checklist} reload={loadBase} toast={toast}/>}
      {(macrosOn||checksOn) && <>
        <div className="sectlabel" style={{marginTop:18}}>Einträge des Kunden</div>
        <WeekCalendar weekDates={weekDates} selDate={selDate} setSelDate={setSelDate} weekOffset={weekOffset} changeWeek={changeWeek} dots={dots} t={t}/>
        {macrosOn && <div className="mcard">
          <div style={{fontWeight:700,marginBottom:10}}>Makros</div>
          {weekDates.map(d=>{ const e=logs[d]; const future=d>t;
            return <div key={d} className="foodrow"><span className="fd">{weekdayShort(d)} {fmtDay(d)}</span>
              <span className="fv">{e&&e.kcal!=null?(e.kcal+" kcal · "+(e.protein||0)+"P/"+(e.carbs||0)+"K/"+(e.fat||0)+"F"):(future?"–":"—")}</span></div>;
          })}
        </div>}
        {checksOn && checklist.length>0 && <div className="mcard">
          <div style={{fontWeight:700,marginBottom:12}}>Häkchen</div>
          {checklist.map(it=>{ const done=weekDates.filter(d=>checks[d]&&checks[d][it.id]).length;
            return <div key={it.id} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span className="en">{it.name}</span><span className="tag">{done}/{validDays}</span></div>
              <div className="weekstrip">{weekDates.map(d=>{ const on=checks[d]&&checks[d][it.id]; const fut=d>t;
                return <div key={d} className="daycol"><div className="lbl">{weekdayShort(d)}</div>
                  <div className={"dot7"+(on?" done":"")+(d===t?" today":"")+(fut?" fut":"")}>{on?"✓":""}</div>
                  <div className="dnum">{d.split("-")[2]}</div></div>; })}</div>
            </div>;
          })}
        </div>}
      </>}
      {!macrosOn && !checksOn && <div className="mcard muted">Beides aus – der Kunde sieht im Ernährungs-Tab nur einen kurzen Hinweis und konzentriert sich auf Training & Gewohnheiten.</div>}
    </div>;
  }

  // ---------- KUNDE ----------
  if(!macrosOn && !checksOn) return <div className="mbody"><div className="mcard"><h3>Ernährung pausiert</h3><div className="muted" style={{marginTop:4}}>Wir konzentrieren uns gerade auf Training und deine Gewohnheiten. Sobald es passt, schalten wir die Ernährung dazu.</div></div></div>;

  const saveMacros=async(d,vals)=>{
    try{ const { error } = await window.supa.from("nutrition_logs").upsert({ client_id:clientId, date:d, ...vals },{onConflict:"client_id,date"}); if(error) throw error; toast("Makros gespeichert"); await loadWeek(); }
    catch(e){ toast("Speichern fehlgeschlagen: "+(e.message||"")); }
  };
  const toggleCheck=async(id,d)=>{
    if(d>t) return;
    const cur=!!(checks[d]&&checks[d][id]); const next=!cur;
    setChecks(c=>{ const day={...(c[d]||{})}; if(next) day[id]=true; else delete day[id]; return {...c,[d]:day}; });
    try{
      if(next){ const { error } = await window.supa.from("nutrition_check_logs").upsert({ client_id:clientId, item_id:id, date:d, done:true },{onConflict:"item_id,date"}); if(error) throw error; }
      else { const { error } = await window.supa.from("nutrition_check_logs").delete().eq("item_id",id).eq("date",d); if(error) throw error; }
    }catch(e){ toast("Konnte nicht speichern"); loadWeek(); }
  };

  return <div className="mbody">
    <WeekCalendar weekDates={weekDates} selDate={selDate} setSelDate={setSelDate} weekOffset={weekOffset} changeWeek={changeWeek} dots={dots} t={t}/>
    {macrosOn && <MacroWeek settings={settings} weekDates={weekDates} logs={logs} t={t} onSave={saveMacros} openDate={selDate} setOpenDate={setSelDate}/>}
    {checksOn && <>
      <div className="sectlabel" style={{marginTop:macrosOn?16:0}}>Häkchen</div>
      {checklist.length===0 && <div className="muted">Dein Coach hat noch keine Punkte angelegt.</div>}
      {checklist.map(it=>{ const done=weekDates.filter(d=>checks[d]&&checks[d][it.id]).length;
        return <div key={it.id} className="mcard" style={{padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div className="hn">{it.name}</div><div className="tag">{done}/{validDays}</div></div>
          <div className="weekstrip">{weekDates.map(d=>{ const on=checks[d]&&checks[d][it.id]; const fut=d>t;
            return <div key={d} className="daycol"><div className="lbl">{weekdayShort(d)}</div>
              <div className={"dot7"+(on?" done":"")+(d===t?" today":"")+(!fut?" tap":"")+(fut?" fut":"")} onClick={!fut?()=>toggleCheck(it.id,d):undefined}>{on?"✓":""}</div>
              <div className="dnum">{d.split("-")[2]}</div></div>; })}</div>
        </div>;
      })}
    </>}
  </div>;
}

function MacroWeek({settings,weekDates,logs,t,onSave,openDate,setOpenDate}){
  const m=settings;
  const e=logs[openDate]||null;
  const [k,setK]=useState(""),[p,setP]=useState(""),[cb,setCb]=useState(""),[f,setF]=useState("");
  useEffect(()=>{ const x=logs[openDate]||{}; setK(x.kcal!=null?String(x.kcal):""); setP(x.protein!=null?String(x.protein):""); setCb(x.carbs!=null?String(x.carbs):""); setF(x.fat!=null?String(x.fat):""); },[openDate, logs]);
  const bar=(label,val,target,unit)=>{ const pct=Math.min(100,Math.round(((val||0)/(target||1))*100));
    return <div className="macro"><div className="top"><span className="nm">{label}</span><span className="vv">{val||0} / {target} {unit}</span></div><div className="bar"><div style={{width:pct+"%"}}/></div></div>; };
  const editable=openDate<=t;
  return <div>
    <div className="mcard">
      <div style={{fontWeight:700,marginBottom:10}}>{openDate===t?"Heute":fmtFull(openDate)}</div>
      {e&&e.kcal!=null ? <>{bar("Kalorien",e.kcal,m.kcal,"kcal")}{bar("Protein",e.protein,m.protein,"g")}{bar("Kohlenhydrate",e.carbs,m.carbs,"g")}{bar("Fett",e.fat,m.fat,"g")}</>
        : <div className="muted">Noch nichts eingetragen. Ziele: {m.kcal} kcal · {m.protein}P / {m.carbs}K / {m.fat}F</div>}
      {editable && <>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:(e&&e.kcal!=null)?16:14}}>
          <LabeledNum label="Kalorien" unit="kcal" value={k} onChange={setK}/>
          <LabeledNum label="Protein" unit="g" value={p} onChange={setP}/>
          <LabeledNum label="Kohlenhydr." unit="g" value={cb} onChange={setCb}/>
          <LabeledNum label="Fett" unit="g" value={f} onChange={setF}/>
        </div>
        <button className="btn" style={{marginTop:12}} onClick={()=>onSave(openDate,{kcal:+k||0,protein:+p||0,carbs:+cb||0,fat:+f||0})}>Makros speichern</button>
      </>}
    </div>
  </div>;
}
function LiveMacroEditor({settings,onSave}){
  const [k,setK]=useState(String(settings.kcal)),[p,setP]=useState(String(settings.protein)),[cb,setCb]=useState(String(settings.carbs)),[f,setF]=useState(String(settings.fat));
  useEffect(()=>{ setK(String(settings.kcal)); setP(String(settings.protein)); setCb(String(settings.carbs)); setF(String(settings.fat)); },[settings.kcal,settings.protein,settings.carbs,settings.fat]);
  const row=(label,unit,val,set)=>(<div className="mini" style={{marginBottom:10}}><div style={{width:96,color:"var(--dim)",fontSize:13.5}}>{label}</div>
    <input inputMode="numeric" value={val} onChange={(e)=>set(e.target.value)}/><span className="unit">{unit}</span></div>);
  return <div className="mcard"><div className="sectlabel" style={{margin:"0 0 10px"}}>Tagesziele</div>
    {row("Kalorien","kcal",k,setK)}{row("Protein","g",p,setP)}{row("Kohlenhydr.","g",cb,setCb)}{row("Fett","g",f,setF)}
    <button className="btn" style={{marginTop:6}} onClick={()=>onSave({kcal:+k||0,protein:+p||0,carbs:+cb||0,fat:+f||0})}>Ziele speichern</button>
  </div>;
}

  const [n,setN]=useState("");

  const del=async(id)=>{ try{ const { error } = await window.supa.from("nutrition_checklist").delete().eq("id",id); if(error) throw error; await reload(); }catch(e){ toast("Löschen fehlgeschlagen"); } };
  return <div className="mcard"><div className="sectlabel" style={{margin:"0 0 10px"}}>Ernährungs-Häkchen</div>
    {items.map(i=>(<div key={i.id} className="exrow"><div className="en">{i.name}</div><button className="delx" onClick={()=>del(i.id)}>×</button></div>))}
    <div className="mini" style={{marginTop:12}}><input value={n} onChange={(e)=>setN(e.target.value)} placeholder="Neuer Punkt…"/></div>
    <button className="addbtn" onClick={add}>+ Hinzufügen</button>
  </div>;
}

    </div>;
  }
  if(!macrosOn && !checksOn) return <div className="mbody"><div className="mcard"><h3>Ernährung pausiert</h3><div className="muted" style={{marginTop:4}}>Wir konzentrieren uns gerade auf Training und deine Gewohnheiten. Sobald es passt, schalten wir die Ernährung dazu.</div></div></div>;
  return <div className="mbody">

    {cdata.nutLog.map(e=>{ const parts=[]; if(macrosOn && e.kcal!=null) parts.push(e.kcal+" kcal"); if(checksOn && e.checked) parts.push(Object.values(e.checked).filter(Boolean).length+"/"+cdata.nutChecklist.length);

function LiveWeightTab({clientId,role,toast}){
  const [ws,setWs]=useState(null); // null=lädt; [{id,date,kg}]
  const [cals,setCals]=useState([]); // [{date,kcal}]
  const [kg,setKg]=useState(""); const t=today();
  const [date,setDate]=useState(t);
  const [editId,setEditId]=useState(null); const [eKg,setEKg]=useState(""); const [eDate,setEDate]=useState("");
  const [from,setFrom]=useState(""); const [to,setTo]=useState("");
  const load=async()=>{
    try{
      const { data,error } = await window.supa.from("weights").select("id,date,kg").eq("client_id",clientId).order("date",{ascending:true});
      if(error) throw error;
      setWs((data||[]).map(w=>({id:w.id,date:w.date,kg:+w.kg})));
      const { data:nl } = await window.supa.from("nutrition_logs").select("date,kcal").eq("client_id",clientId).order("date",{ascending:true});
      setCals((nl||[]).filter(r=>r.kcal!=null).map(r=>({date:r.date,kcal:r.kcal})));
    }catch(e){ toast("Gewicht konnte nicht geladen werden"); setWs([]); }
  };
  useEffect(()=>{ if(clientId) load(); },[clientId]);
  const save=async()=>{
    const v=parseFloat(String(kg).replace(",",".")); if(!v) return;
    try{
      const { error } = await window.supa.from("weights").upsert({ client_id:clientId, date:date||t, kg:+v.toFixed(1) },{onConflict:"client_id,date"});
      if(error) throw error;
      setKg(""); setDate(t); toast("Gewicht gespeichert"); await load();
    }catch(e){ toast("Speichern fehlgeschlagen: "+(e.message||"")); }
  };
  const startEdit=(w)=>{ setEditId(w.id); setEKg(String(w.kg)); setEDate(w.date); };
  const saveEdit=async()=>{
    const v=parseFloat(String(eKg).replace(",",".")); if(!v){ toast("Bitte ein Gewicht eingeben"); return; }
    try{
      // Datum evtl. geändert -> auf Kollision prüfen (unique client_id+date)
      const clash=ws.find(x=>x.date===eDate && x.id!==editId);
      if(clash){ toast("Für dieses Datum gibt es schon einen Eintrag."); return; }
      const { error } = await window.supa.from("weights").update({ date:eDate, kg:+v.toFixed(1) }).eq("id",editId);
      if(error) throw error;
      setEditId(null); toast("Eintrag aktualisiert"); await load();
    }catch(e){ toast("Aktualisieren fehlgeschlagen: "+(e.message||"")); }
  };
  const del=async(id)=>{
    if(!await askConfirm({title:"Eintrag löschen?",message:"Dieser Gewichtseintrag wird dauerhaft entfernt.",confirmText:"Löschen",danger:true})) return;
    try{ const { error } = await window.supa.from("weights").delete().eq("id",id); if(error) throw error; if(editId===id) setEditId(null); toast("Eintrag gelöscht"); await load(); }
    catch(e){ toast("Löschen fehlgeschlagen: "+(e.message||"")); }
  };
  if(ws===null) return <div className="mbody"><div className="muted">Lädt…</div></div>;
  const dateInputStyle={background:"var(--bg-3)",border:"1px solid var(--line)",color:"var(--text)",fontSize:15,padding:"11px 12px",borderRadius:10,outline:"none"};
  const inRange=(d)=> (!from || d>=from) && (!to || d<=to);
  const chartData=ws.filter(w=>inRange(w.date)).map(w=>({date:w.date,kg:w.kg}));
  const chartCals=cals.filter(c=>inRange(c.date));
  const first=ws[0], last=ws[ws.length-1]; const change=(first&&last)?+(last.kg-first.kg).toFixed(1):0;
  const minDate=ws.length?ws[0].date:undefined;
  return <div className="mbody">
    <div className="sectlabel">Verlauf {ws.length>=2 && <span style={{color:change<=0?"var(--ok)":"var(--accent-2)"}}>· {change>0?"+":""}{change} kg</span>}</div>
    <div className="chartwrap">
      <WeightChart data={chartData} cals={chartCals}/>
      <div className="chartlegend"><span><i className="lg lg-w"/>Gewicht</span>{chartCals.length>=2 && <span><i className="lg lg-c"/>Kalorien</span>}</div>
    </div>
    <div className="rangebar">
      <div className="rb-f"><label>von</label><DateField value={from} min={minDate} max={t} onChange={setFrom} placeholder="Start"/></div>
      <div className="rb-f"><label>bis</label><DateField value={to} min={from||minDate} max={t} onChange={setTo} placeholder="Ende"/></div>
      {(from||to) && <button className="rb-clear" onClick={()=>{ setFrom(""); setTo(""); }}>× Zeitraum zurücksetzen</button>}
    </div>
    {role!=="coach" && <>
      <div className="sectlabel">Neuer Eintrag</div>
      <div className="mcard">
        <div className="field" style={{marginBottom:12}}><label>Datum</label>
          <DateField value={date} max={t} onChange={setDate}/></div>
        <div className="mini"><input inputMode="decimal" value={kg} onChange={(e)=>setKg(e.target.value)} placeholder={last?String(last.kg):"z. B. 90,2"}/><span className="unit">kg</span>
          <button className="btn" style={{width:"auto",padding:"12px 18px"}} onClick={save}>Speichern</button></div>
      </div>
    </>}
    <div className="sectlabel">Einträge</div>
    {ws.length===0 && <div className="muted">Noch keine Einträge.</div>}
    {[...ws].reverse().map((w,i,arr)=>{ const prev=arr[i+1]; const d=prev?+(w.kg-prev.kg).toFixed(1):null;
      if(editId===w.id){
        return <div key={w.id} className="mcard" style={{padding:"12px 14px"}}>
          <div className="field" style={{marginBottom:10}}><label>Datum</label>
            <DateField value={eDate} max={t} onChange={setEDate}/></div>
          <div className="mini" style={{marginBottom:10}}><input inputMode="decimal" value={eKg} onChange={(e)=>setEKg(e.target.value)}/><span className="unit">kg</span></div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn" style={{flex:1}} onClick={saveEdit}>Speichern</button>
            <button className="btn btn-ghost" style={{width:"auto",padding:"12px 16px"}} onClick={()=>setEditId(null)}>Abbrechen</button>
          </div>
        </div>;
      }
      return <div key={w.id} className="entry">
        <span className="ed">{fmtFull(w.date)}</span>
        <span style={{display:"flex",alignItems:"center",gap:10}}>
          <span className="ev">{w.kg} kg</span>
          {d!=null && <span className="muted" style={{color:d<=0?"var(--ok)":"var(--accent-2)"}}>{d>0?"+":""}{d}</span>}
          {role!=="coach" && <button className="iconbtn" title="Bearbeiten" onClick={()=>startEdit(w)}>✎</button>}
          {role!=="coach" && <button className="iconbtn" title="Löschen" onClick={()=>del(w.id)}>×</button>}
        </span>
      </div>;
    })}
  </div>;
}

/* ---------- file helpers ---------- */
function fileKind(mime){ return (mime && mime.indexOf("image/")===0) ? "image" : "file"; }
function readToData(file, cb){ const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); }

/* ---------- Eigener Datums-Picker (Bottom-Sheet, statt nativem type=date) ---------- */
const MONTHS_DE=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
function DateField({value,onChange,min,max,placeholder}){
  const [open,setOpen]=useState(false);
  const label = value ? fmtFull(value) : (placeholder||"Datum wählen");
  return <>
    <button type="button" className="datefield" onClick={()=>setOpen(true)}>
      <Icon name="checkin"/><span className={"df-val"+(value?"":" ph")}>{label}</span>
    </button>
    {open && <DateSheet value={value} min={min} max={max} onClose={()=>setOpen(false)} onPick={(d)=>{ onChange(d); setOpen(false); }}/>}
  </>;
}
function DateSheet({value,min,max,onClose,onPick}){
  const base = value || max || today();
  const bp = base.split("-");
  const [ym,setYm]=useState({y:+bp[0], m:+bp[1]-1}); // m: 0-11
  const minD = min||null, maxD = max||null;
  const firstDow = (()=>{ const d=new Date(ym.y,ym.m,1); return (d.getDay()+6)%7; })(); // Mo=0
  const daysIn = new Date(ym.y,ym.m+1,0).getDate();
  const cells=[]; for(let i=0;i<firstDow;i++) cells.push(null);
  for(let d=1;d<=daysIn;d++) cells.push(d);
  const mkStr=(d)=>`${ym.y}-${pad(ym.m+1)}-${pad(d)}`;
  const disabled=(ds)=> (minD&&ds<minD) || (maxD&&ds>maxD);
  const prevMonth=()=>setYm(s=>{ const m=s.m-1; return m<0?{y:s.y-1,m:11}:{y:s.y,m}; });
  const nextMonth=()=>setYm(s=>{ const m=s.m+1; return m>11?{y:s.y+1,m:0}:{y:s.y,m}; });
  // Monats-Navigation an Grenzen sperren
  const monthStart=`${ym.y}-${pad(ym.m+1)}-01`;
  const monthEnd=`${ym.y}-${pad(ym.m+1)}-${pad(daysIn)}`;
  const prevDisabled = minD && monthStart<=minD;
  const nextDisabled = maxD && monthEnd>=maxD;
  return <>
    <div className="scrim" onClick={onClose}/>
    <div className="sheet datesheet" role="dialog" aria-modal="true">
      <div className="sheet-grab"/>
      <div className="ds-head">
        <button className="ds-nav" disabled={prevDisabled} onClick={prevMonth} aria-label="Vorheriger Monat">‹</button>
        <div className="ds-title">{MONTHS_DE[ym.m]} {ym.y}</div>
        <button className="ds-nav" disabled={nextDisabled} onClick={nextMonth} aria-label="Nächster Monat">›</button>
      </div>
      <div className="ds-wd">{["MO","DI","MI","DO","FR","SA","SO"].map(w=><div key={w}>{w}</div>)}</div>
      <div className="ds-grid">{cells.map((d,i)=>{ if(d===null) return <div key={"e"+i}/>; const ds=mkStr(d); const dis=disabled(ds); const sel=ds===value; const isToday=ds===today();
        return <button key={ds} type="button" disabled={dis} className={"ds-cell"+(sel?" sel":"")+(isToday&&!sel?" today":"")} onClick={()=>onPick(ds)}>{d}</button>;
      })}</div>
      <div className="ds-foot">
        {!(maxD&&today()>maxD) && !(minD&&today()<minD) && <button className="ds-today" onClick={()=>onPick(today())}>Heute</button>}
        <button className="ds-cancel" onClick={onClose}>Abbrechen</button>
      </div>
    </div>
  </>;
}

/* ---------- Eigene Bestätigungs-Dialoge (statt window.confirm) ---------- */
let _openConfirm=null; // wird von ConfirmHost gesetzt
function askConfirm(opts){
  // opts: {title, message, confirmText, cancelText, danger}
  return new Promise((resolve)=>{
    if(_openConfirm) _openConfirm({ ...opts, _resolve:resolve });
    else resolve(window.confirm(opts&&opts.message||"Fortfahren?")); // Fallback
  });
}
function ConfirmHost(){
  const [st,setSt]=useState(null); // {title,message,confirmText,cancelText,danger,_resolve}
  useEffect(()=>{ _openConfirm=(o)=>setSt(o); return ()=>{ _openConfirm=null; }; },[]);
  if(!st) return null;
  const close=(val)=>{ const r=st._resolve; setSt(null); if(r) r(val); };
  return <>
    <div className="scrim" onClick={()=>close(false)}/>
    <div className="cdlg" role="dialog" aria-modal="true">
      {st.title && <div className="cdlg-t">{st.title}</div>}
      <div className="cdlg-m">{st.message}</div>
      <div className="cdlg-a">
        <button className="cdlg-cancel" onClick={()=>close(false)}>{st.cancelText||"Abbrechen"}</button>
        <button className={"cdlg-ok"+(st.danger?" danger":"")} onClick={()=>close(true)}>{st.confirmText||"OK"}</button>
      </div>
    </div>
  </>;
}
function FilePicker({label,accept,multiple,onPick}){
  return <label className="uploadbtn"><Icon name="photo"/>{label}
    <input type="file" accept={accept||""} multiple={multiple?true:false}
      onChange={(e)=>{ const fs=e.target.files; if(fs&&fs.length){ Array.from(fs).forEach(f=>readToData(f,(u)=>onPick(f,u))); } e.target.value=""; }}/></label>;
}
function FileList({files,canDelete,onDelete}){
  const imgs=files.filter(f=>f.kind==="image"); const docs=files.filter(f=>f.kind!=="image");
  return <>
    {imgs.length>0 && <div className="filegrid">{imgs.map(f=>(

        <div className="cap">{f.by==="coach"?"Coach · ":""}{fmtFull(f.date)}</div>
        {canDelete && <span className="del" onClick={(e)=>{e.preventDefault();e.stopPropagation();onDelete(f.id);}}>×</span>}
