<style>
  :root{
    --bg:#EEF0F3; --bg-2:#FFFFFF; --bg-3:#E7EAEE;
    --line:rgba(13,15,20,0.13); --line-2:rgba(13,15,20,0.24);
    --text:#0B0C0F; --dim:#545A63; --faint:#868D96;
    --accent:#0B0C0F; --accent-2:#000000; --on-accent:#ffffff; --ok:#15814a; --r:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:var(--vh,100dvh);margin:0;overflow:hidden;overscroll-behavior:none;}
  body{overflow:hidden;overscroll-behavior:none;}
  body{font-family:"Hanken Grotesk",-apple-system,system-ui,sans-serif;color:var(--text);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overscroll-behavior-y:none;}
  #root{height:var(--vh,100dvh);}
  .app{height:var(--vh,100dvh);display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;overflow:hidden;}
  h1,h2,h3{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;letter-spacing:-0.02em;margin:0;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:var(--on-accent);
    font-weight:700;font-size:16px;padding:14px 18px;border-radius:14px;width:100%;transition:transform .06s ease,opacity .2s;}
  .btn:active{transform:scale(.985);} .btn:disabled{opacity:.5;}
  .btn-ghost{background:var(--bg-3);color:var(--text);font-weight:600;}
  .link{color:var(--accent-2);font-weight:600;padding:0;font-size:15px;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;color:var(--dim);margin:0 0 6px 2px;font-weight:600;}
  .field input{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:16px;
    padding:13px 14px;border-radius:12px;outline:none;transition:border-color .15s,background .15s;}
  .field input::placeholder{color:var(--faint);}
  .field input:focus{border-color:var(--accent);background:var(--bg-2);}

  .card{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--r);padding:20px;}

  .center{height:var(--vh,100dvh);display:flex;flex-direction:column;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-padding-bottom:90px;padding:28px 22px;max-width:560px;margin:0 auto;width:100%;box-sizing:border-box;}
  .tagline{color:var(--dim);font-size:15px;margin-top:10px;text-align:center;}
  .logo-auth{display:block;height:60px;margin:0 auto;object-fit:contain;}

  .topbar{display:flex;align-items:center;gap:10px;padding:calc(12px + env(safe-area-inset-top)) 14px 12px;border-bottom:1px solid var(--line);}
  .lead{flex:1;min-width:0;display:flex;align-items:center;}
  .logo-sm{height:24px;object-fit:contain;}
  .ttl{font-family:"Bricolage Grotesque";font-weight:800;font-size:19px;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iconbtn{width:36px;height:36px;border-radius:10px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--dim);flex:none;}
  .iconbtn[aria-label="Menü"]{background:transparent;color:var(--text);}
  .iconbtn[aria-label="Videoanruf"]{background:transparent;}
  .back{font-size:24px;color:var(--text);padding:2px 6px;margin-left:-4px;}
  .seg{display:inline-flex;background:var(--bg-3);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex:none;}
  .seg button{font-size:12.5px;font-weight:700;padding:6px 11px;border-radius:8px;color:var(--dim);}
  .seg button.on{background:var(--accent);color:var(--on-accent);}
  .seg3{display:flex;width:100%;}
  .seg3 button{flex:1;text-align:center;}
  .adm-av{width:42px;height:42px;border-radius:50%;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--accent);flex:none;overflow:hidden;}
  .adm-av img{width:100%;height:100%;object-fit:cover;}
  .adm-select{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:13px 12px;font-size:15px;color:var(--text);-webkit-appearance:none;appearance:none;font-weight:600;}

  /* Check-in */
  .ci-seg{display:flex;gap:6px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px;}
  .ci-seg button{flex:1;padding:9px 0;border:none;background:none;color:var(--dim);font-size:14px;font-weight:700;border-radius:9px;cursor:pointer;}
  .ci-seg button.on{background:var(--accent);color:#fff;}
  .ci-dayhint{font-size:13.5px;color:var(--dim);margin:0 2px 14px;}
  .ci-dayhint b{color:var(--text);}
  .ci-due{color:var(--accent);font-weight:700;}
  .wdrow{display:flex;gap:6px;}
  .wdbtn{flex:1;padding:11px 0;border-radius:11px;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;}
  .wdbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .ci-qrow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .ci-qmain{min-width:0;}
  .ci-qlabel{font-weight:600;font-size:14.5px;}
  .ci-qtype{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
  .ci-qacts{display:flex;gap:6px;flex:none;}
  .ci-qacts .iconbtn{width:34px;height:34px;border-radius:9px;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .ci-qacts .iconbtn:disabled{opacity:.35;cursor:default;}
  .typewrap{display:flex;flex-wrap:wrap;gap:7px;}
  .typebtn{padding:9px 13px;border-radius:10px;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;}
  .typebtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .ci-flabel{font-weight:700;font-size:15px;margin-bottom:11px;}
  .scalewrap{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
  .scaleb{padding:11px 0;border-radius:10px;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;}
  .scaleb.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .ynwrap{display:flex;gap:8px;}
  .ynb{flex:1;padding:13px 0;border-radius:11px;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:15px;font-weight:700;cursor:pointer;}
  .ynb.on{background:var(--ok);border-color:var(--ok);color:#fff;}
  .ynb.on.no{background:var(--accent);border-color:var(--accent);}
  .photopick{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px;border-radius:12px;background:var(--bg-3);border:1px dashed var(--line);color:var(--dim);font-size:14px;font-weight:600;cursor:pointer;}
  .ci-hdate{font-weight:800;font-size:14px;color:var(--accent);margin-bottom:10px;}
  .ci-ha{border-top:1px solid var(--line);padding:10px 0;}
  .ci-ha:first-of-type{border-top:none;padding-top:0;}
  .ci-haq{font-size:12.5px;color:var(--faint);margin-bottom:4px;}
  .ci-haa{font-size:14.5px;color:var(--text);white-space:pre-wrap;}
  .ci-haimg{width:100%;max-width:240px;border-radius:12px;margin-top:4px;display:block;}
  /* Cloud / Dateien */
  .filerow{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:10px 12px;margin-bottom:9px;}
  .filerow .fr-main{flex:1;min-width:0;display:flex;align-items:center;gap:12px;background:none;border:none;text-align:left;cursor:pointer;padding:0;}
  .filerow .fr-ico{width:46px;height:46px;border-radius:10px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;}
  .filerow .fr-ico svg{width:22px;height:22px;color:var(--accent);}
  .filerow .fr-ico img{width:100%;height:100%;object-fit:cover;}
  .filerow .fr-info{min-width:0;flex:1;}
  .filerow .fr-name{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .filerow .fr-meta{font-size:12px;color:var(--faint);margin-top:2px;font-family:"IBM Plex Mono";}
  .filerow .fr-meta .uploader{font-weight:700;}
  .filerow .fr-meta .u-coach{color:var(--accent);}
  .filerow .fr-meta .u-client{color:#5BA8FF;}
  .filerow .fr-del{width:38px;height:38px;border-radius:10px;background:none;border:none;color:var(--faint);display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;}
  .filerow .fr-del svg{width:18px;height:18px;}
  /* Cloud: Ordner */
  .folderrow{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:10px;}
  .folderrow .fo-tap{flex:1;min-width:0;display:flex;align-items:center;gap:13px;background:none;border:none;text-align:left;cursor:pointer;padding:0;}
  .folderrow .fo-ico{width:46px;height:46px;border-radius:11px;background:rgba(20,21,26,0.14);display:flex;align-items:center;justify-content:center;flex:none;}
  .folderrow .fo-ico svg{width:24px;height:24px;color:var(--accent);}
  .folderrow .fo-main{flex:1;min-width:0;}
  .folderrow .fo-name{font-weight:700;font-size:15.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .folderrow .fo-meta{font-size:12.5px;color:var(--faint);margin-top:2px;}
  .folderrow .fo-del{width:38px;height:38px;border-radius:10px;background:none;border:none;color:var(--faint);display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;}
  .folderrow .fo-del svg{width:18px;height:18px;}
  .crumbs{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:14px;}
  .crumbs .crumb{background:none;border:none;color:var(--dim);font-size:14px;font-weight:600;cursor:pointer;padding:2px 0;}
  .crumbs .crumb:last-child{color:var(--text);}
  .crumbs .crsep{color:var(--faint);font-size:14px;}
  .foodrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--line);font-size:14px;}
  .foodrow:first-of-type{border-top:none;}
  .foodrow .fd{color:var(--dim);font-family:"IBM Plex Mono";font-size:12.5px;}
  .foodrow .fv{font-weight:600;}
  .daypills{display:flex;gap:6px;margin-bottom:12px;}
  .daypills .pill{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line);color:var(--dim);cursor:pointer;}
  .daypills .pill .pw{font-size:10px;font-family:"IBM Plex Mono";}
  .daypills .pill .pn{font-size:14px;font-weight:700;}
  .daypills .pill.sel{border-color:var(--accent);color:var(--text);}
  .daypills .pill.has{background:rgba(20,21,26,0.08);}
  .daypills .pill.has .pn{color:var(--accent);}
  .daypills .pill.fut{opacity:0.35;}

  .habrow{display:flex;align-items:center;gap:12px;cursor:pointer;}
  .check{width:26px;height:26px;border-radius:8px;border:1.6px solid var(--line-2);flex:none;display:flex;align-items:center;justify-content:center;color:transparent;font-size:15px;}
  .check.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .hn{flex:1;font-size:15px;font-weight:600;}

  .segwide{display:flex;background:var(--bg-3);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;margin-bottom:14px;}
  .segwide button{flex:1;font-size:13px;font-weight:700;padding:9px;border-radius:8px;color:var(--dim);}
  .segwide button.on{background:var(--accent);color:#fff;}

  .tglrow{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 0;}
  .tgl{width:48px;height:28px;border-radius:99px;background:var(--bg-3);border:1px solid var(--line-2);position:relative;flex:none;transition:background .18s;}
  .tgl .knob{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#8a807a;transition:transform .18s,background .18s;}
  .tgl.on{background:var(--accent);border-color:var(--accent);}
  .tgl.on .knob{transform:translateX(20px);background:#fff;}

  .macro{margin-bottom:12px;}
  .macro .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
  .macro .top .nm{color:var(--text);font-weight:600;}
  .macro .top .vv{color:var(--dim);font-family:"IBM Plex Mono";font-size:12px;}
  .bar{height:8px;border-radius:99px;background:var(--bg-3);overflow:hidden;}
  .bar > div{height:100%;border-radius:99px;background:var(--accent);}

  .exrow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);}
  .exrow:last-child{border-bottom:none;}
  .exf-row{display:flex;align-items:center;gap:8px;}
  .exf-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0 4px;}
  .exf{display:flex;flex-direction:column;gap:6px;min-width:0;}
  .exf-full{grid-column:1 / -1;}
  .exf-l{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.05em;}
  .exin{background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:15px;padding:12px 13px;border-radius:11px;outline:none;width:100%;box-sizing:border-box;}
  .exin:focus{border-color:var(--accent);}
  select.exin{appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--faint) 50%),linear-gradient(135deg,var(--faint) 50%,transparent 50%);background-position:calc(100% - 16px) 17px,calc(100% - 11px) 17px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:30px;}

  /* per-set logging */
  .setgrid{display:grid;grid-template-columns:36px 1fr 1fr 30px;gap:8px;align-items:center;margin-bottom:7px;}
  .setgrid.nodel{grid-template-columns:36px 1fr 1fr;}
  .sethead{margin-bottom:9px;}
  .sethead span{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
  .setno{font-family:"IBM Plex Mono";font-size:14px;color:var(--accent-2);text-align:center;font-weight:600;}
  .setin{background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:16px;padding:9px 10px;border-radius:9px;outline:none;width:100%;text-align:center;}
  .setin:focus{border-color:var(--accent);}
  .setin::placeholder{color:var(--faint);}
  .setdel{width:30px;height:30px;border:none;background:none;color:var(--faint);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .addset{background:none;border:none;color:var(--accent);font-weight:700;font-size:13.5px;padding:8px 2px 0;cursor:pointer;}

  /* ---- Training: Plan-Übersicht ---- */
  .planhero{position:relative;display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(20,21,26,0.22),var(--bg-2) 70%);border:1px solid var(--line);border-radius:18px;padding:18px 16px;margin-bottom:18px;overflow:hidden;}
  .planhero .ph-text{flex:1;min-width:0;z-index:1;}
  .planhero .ph-titlerow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .planhero .ph-title{font-weight:800;font-size:24px;letter-spacing:-0.01em;}
  .planhero .ph-badge{font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.07em;background:var(--accent);color:#fff;border-radius:99px;padding:4px 10px;}
  .planhero .ph-sub{color:var(--dim);font-size:13.5px;margin-top:6px;line-height:1.45;}
  .planhero .ph-ico{position:absolute;right:-6px;bottom:-10px;opacity:.16;}
  .planhero .ph-ico svg{width:120px;height:120px;color:var(--accent);}
  .dayrow{display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:var(--bg-2);border:1px solid var(--line);border-radius:15px;padding:15px;margin-bottom:11px;cursor:pointer;position:relative;transition:border-color .15s,transform .06s;}
  .dayrow:active{transform:scale(.99);}
  .dayrow.next{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent);}
  .dayrow .dr-ico{width:48px;height:48px;border-radius:50%;background:var(--bg-3);display:flex;align-items:center;justify-content:center;flex:none;}
  .dayrow.next .dr-ico{background:rgba(20,21,26,0.16);}
  .dayrow .dr-ico svg{width:24px;height:24px;color:var(--accent);}
  .dayrow .dr-main{flex:1;min-width:0;}
  .dayrow .dr-name{font-weight:700;font-size:17px;}
  .dayrow .dr-sub{display:flex;align-items:center;gap:5px;color:var(--faint);font-size:13px;margin-top:3px;}
  .dayrow .dr-chev{color:var(--faint);font-size:22px;flex:none;}
  .dayrow.next .dr-chev{color:var(--accent);}
  /* absolviert */
  .weekhead{display:flex;align-items:center;gap:8px;margin:6px 2px 10px;}
  .weekhead .wh-title{font-weight:800;font-size:16px;}
  .weekhead .wh-range{color:var(--faint);font-size:12.5px;font-family:"IBM Plex Mono";flex:1;}
  .weekhead .wh-count{color:#22C55E;font-size:12.5px;font-weight:700;background:rgba(34,197,94,0.12);border-radius:99px;padding:2px 9px;}
  .donecard{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;}
  .done-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:none;border:none;padding:14px 15px;cursor:pointer;}
  .done-check{width:34px;height:34px;border-radius:50%;border:1.6px solid #22C55E;display:flex;align-items:center;justify-content:center;flex:none;}
  .done-check svg{width:18px;height:18px;color:#22C55E;}
  .done-main{flex:1;min-width:0;}
  .done-name{font-weight:700;font-size:15.5px;}
  .done-sub{color:var(--faint);font-size:12.5px;margin-top:2px;font-family:"IBM Plex Mono";}
  .done-pct{color:#22C55E;font-weight:800;font-size:14px;flex:none;}
  .done-body{padding:0 15px 14px;}
  .setinput{width:100%;box-sizing:border-box;background:var(--bg-3);border:1px solid var(--line);border-radius:11px;padding:12px 13px;color:var(--text);font-size:15px;font-family:inherit;}
  .setinput:focus{outline:none;border-color:var(--accent);}
  .chathead{display:flex;align-items:center;gap:10px;min-width:0;}
  .chathead .chav{width:34px;height:34px;border-radius:50%;overflow:hidden;flex:none;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--accent);}
  .chathead .chav img{width:100%;height:100%;object-fit:cover;}
  .chathead .ttl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .logobtn{background:none;border:none;padding:0;cursor:pointer;display:flex;align-items:center;}
  .anq{margin-bottom:18px;}
  .anq-label{font-size:14.5px;font-weight:600;margin-bottom:9px;color:var(--text);line-height:1.35;}
  .anwiz{height:var(--vh,100dvh);display:flex;flex-direction:column;max-width:560px;margin:0 auto;width:100%;box-sizing:border-box;}
  .anwiz-head{padding:calc(env(safe-area-inset-top) + 16px) 22px 6px;display:flex;justify-content:center;flex:none;}
  .anwiz-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scroll-padding-bottom:90px;padding:6px 22px 14px;}
  .anwiz-foot{flex:none;padding:14px 22px calc(env(safe-area-inset-bottom) + 16px);border-top:1px solid var(--line);background:var(--bg-2);}
  .anwiz-prog{height:7px;border-radius:99px;background:var(--bg-3);overflow:hidden;}
  .anwiz-prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .25s ease;}
  .anwiz-prog-label{font-size:12.5px;color:var(--dim);text-align:center;margin:8px 0 12px;}
  .anwiz-btns{display:flex;gap:10px;}
  .anwiz-btns .btn{flex:1 1 0;width:auto;min-width:0;}
  .pagepick{display:inline-flex;align-items:center;gap:8px;background:var(--bg-3);border:1px solid var(--line);border-radius:10px;padding:5px 8px;}
  .pagepick button{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg-2);color:var(--text);font-size:18px;line-height:1;cursor:pointer;}
  .pagepick button:disabled{opacity:.4;}
  .pagehdr{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin:14px 2px 8px;}
  .worknote{background:var(--bg-3);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:4px 0 10px;font-size:14px;color:var(--text);line-height:1.5;white-space:pre-wrap;}
  .worknote .wn-lab{display:block;font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
  .done-acts{display:flex;gap:10px;margin-top:6px;}
  .done-acts button{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 0;border-radius:11px;font-size:13.5px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:var(--bg-3);}
  .done-acts button svg{width:16px;height:16px;}
  .done-acts .da-edit{color:var(--text);}
  .done-acts .da-del{color:var(--accent);}

  /* ---- Training: Logger (Fokus-Ansicht) ---- */
  .logview{}
  .logtop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px;}
  .logtop .logtitle{font-weight:800;font-size:30px;letter-spacing:-0.02em;line-height:1;}
  .logtop .logsub{color:var(--faint);font-size:13px;margin-top:6px;}
  .logtop .logcollapse{width:42px;height:42px;border-radius:12px;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:18px;flex:none;cursor:pointer;}
  .loginfo{display:flex;gap:14px;background:linear-gradient(135deg,rgba(20,21,26,0.16),var(--bg-2) 75%);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;}
  .loginfo .li-ico{width:96px;flex:none;border-radius:12px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;}
  .loginfo .li-ico svg{width:52px;height:52px;color:var(--accent);}
  .loginfo .li-fields{flex:1;min-width:0;}
  .loginfo .li-flabel{font-size:13px;color:var(--dim);margin-bottom:6px;}
  .loginfo .li-setcount{display:flex;align-items:center;gap:9px;background:var(--bg-3);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--accent);font-weight:700;font-size:15px;}
  .loginfo .li-setcount svg{width:18px;height:18px;}
  .logtabs{display:flex;gap:8px;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:4px;margin-bottom:16px;}
  .logtabs button{flex:1;padding:11px 0;border:none;background:none;color:var(--dim);font-size:14.5px;font-weight:700;border-radius:9px;cursor:pointer;}
  .logtabs button.on{background:var(--accent);color:#fff;}
  .exblock{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;}
  .exblock .exb-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;}
  .exblock .exb-name{font-weight:800;font-size:18px;}
  .exblock .exb-goal{font-size:12.5px;color:var(--dim);background:var(--bg-3);border-radius:8px;padding:4px 9px;flex:none;}
  .exblock .exb-last{color:var(--faint);font-size:12.5px;margin:8px 0 14px;line-height:1.5;}
  .exblock .exb-last b{color:var(--text);font-size:15px;}
  /* Bild in Icon-Slots */
  .dayrow .dr-ico img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .loginfo .li-ico{overflow:hidden;}
  .loginfo .li-ico img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
  /* Bild-Auswahl im Editor */
  .imgpick{display:flex;align-items:center;gap:11px;width:100%;background:var(--bg-3);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px;cursor:pointer;text-align:left;}
  .imgpick-thumb{width:42px;height:42px;border-radius:9px;object-fit:cover;flex:none;}
  .imgpick-ph{width:42px;height:42px;border-radius:9px;background:var(--bg-2);display:flex;align-items:center;justify-content:center;flex:none;}
  .imgpick-ph svg{width:20px;height:20px;color:var(--faint);}
  .imgpick-lab{flex:1;font-size:14.5px;font-weight:600;color:var(--text);}
  .imgpick-chev{color:var(--faint);font-size:20px;}
  /* Bild-Auswahl-Sheet */
  .imgsheet{padding-top:10px;}
  .imggrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  .imgcell{position:relative;background:var(--bg-3);border:1px solid var(--line);border-radius:13px;padding:0;overflow:hidden;cursor:pointer;aspect-ratio:0.82;display:flex;flex-direction:column;}
  .imgcell.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset;}
  .imgcell img{width:100%;flex:1;object-fit:cover;}
  .imgcell-ph{flex:1;display:flex;align-items:center;justify-content:center;}
  .imgcell-ph svg{width:30px;height:30px;color:var(--faint);}

  .chartlegend .lg-c{background:#F2C200;}
  .rangebar{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}

  .rangebar .rb-f input{flex:1;min-width:0;box-sizing:border-box;background:var(--bg-3);border:1px solid var(--line);color:var(--text);border-radius:11px;font-size:15px;padding:11px 12px;outline:none;}
  .rangebar .rb-clear{align-self:flex-start;background:none;border:none;color:var(--faint);font-size:13px;padding:2px 0;cursor:pointer;}

  .exp{background:var(--bg-2);border:1px solid var(--line);border-radius:13px;margin-bottom:9px;overflow:hidden;}

  .addbtn{font-size:14px;font-weight:700;color:var(--accent-2);padding:10px 0 2px;}

  .tag{display:inline-block;font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.06em;color:var(--faint);border:1px solid var(--line);border-radius:99px;padding:3px 8px;}

  .toast{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom));transform:translateX(-50%);
    background:var(--text);color:var(--bg);font-weight:700;font-size:14px;padding:10px 16px;border-radius:999px;z-index:50;box-shadow:0 10px 30px rgba(20,21,26,.18);}
  /* ===== v4 additions ===== */
  [data-theme="light"]{
    --bg:#EEF0F3; --bg-2:#FFFFFF; --bg-3:#E7EAEE;
    --line:rgba(13,15,20,0.13); --line-2:rgba(13,15,20,0.24);
    --text:#0B0C0F; --dim:#545A63; --faint:#868D96;
    --accent:#0B0C0F; --accent-2:#000000; --on-accent:#ffffff; --ok:#15814a;
  }
  [data-theme="light"] body{background:var(--bg);}
  [data-theme="light"] .composer{background:rgba(255,255,255,0.85);}
  [data-theme="light"] .tgl .knob{background:#b8aea7;}

  .iconbtn svg{width:20px;height:20px;}
  .avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:60;animation:fade .18s ease;}

  .drawer{position:fixed;top:0;right:0;height:100%;width:min(84%,330px);background:var(--bg-2);border-left:1px solid var(--line);border-radius:22px 0 0 22px;overflow:hidden;z-index:61;display:flex;flex-direction:column;transform:translateX(100%);animation:slidein .24s cubic-bezier(.2,.8,.2,1) forwards;box-shadow:-24px 0 60px rgba(0,0,0,.45);}
  @keyframes slidein{to{transform:translateX(0);}}
  .drawer .dhead{display:flex;align-items:center;gap:13px;padding:calc(18px + env(safe-area-inset-top)) 18px 17px;border-bottom:1px solid var(--line);background:linear-gradient(160deg,rgba(20,21,26,.07),transparent 62%);}
  .drawer .dav{width:46px;height:46px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line);box-shadow:0 1px 2px rgba(20,21,26,.06);display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque";font-weight:800;font-size:20px;color:var(--text);flex:none;overflow:hidden;}

  .drawer .dname{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .dnav svg{width:21px;height:21px;flex:none;}
  .dfoot{border-top:1px solid var(--line);padding:10px 12px calc(12px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:2px;}
  .dfoot .drow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:12px 8px;color:var(--dim);font-size:14.5px;font-weight:600;border-radius:10px;}

  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--bg-2);border-top:1px solid var(--line-2);border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-width:560px;margin:0 auto;transform:translateY(100%);animation:sheetup .26s cubic-bezier(.2,.8,.2,1) forwards;box-shadow:0 -20px 50px rgba(0,0,0,.4);max-height:calc(100vh - env(safe-area-inset-top) - 24px);overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .sheet.sheet-full{top:0;height:100vh;max-height:100vh;border-radius:0;border-top:none;padding-top:calc(env(safe-area-inset-top) + 26px);}
  @keyframes sheetup{to{transform:translateY(0);}}
  /* Bestätigungs-Dialog */
  .cdlg{position:fixed;left:20px;right:20px;top:50%;z-index:80;max-width:380px;margin:0 auto;transform:translateY(-50%) scale(.94);opacity:0;background:var(--bg-2);border:1px solid var(--line-2);border-radius:20px;padding:22px 20px 16px;box-shadow:0 24px 70px rgba(0,0,0,.55);animation:cdlgIn .2s cubic-bezier(.2,.8,.2,1) forwards;}

  .cdlg-t{font-size:18px;font-weight:800;margin-bottom:7px;}

  /* Datums-Picker */
  .datefield{display:flex;align-items:center;gap:10px;width:100%;box-sizing:border-box;background:var(--bg-3);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:13px 14px;font-size:16px;cursor:pointer;text-align:left;}
  .datefield svg{width:18px;height:18px;color:var(--accent);flex:none;}
  .datefield .df-val{flex:1;}
  .datefield .df-val.ph{color:var(--faint);}
  .datesheet{padding-top:10px;}
  .sheet-grab{width:38px;height:4px;border-radius:2px;background:var(--line-2);margin:2px auto 14px;}
  .ds-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .ds-title{font-size:17px;font-weight:800;}
  .ds-nav{width:40px;height:40px;border-radius:11px;background:var(--bg-3);border:1px solid var(--line);color:var(--accent);font-size:22px;font-weight:700;line-height:1;cursor:pointer;}

  .ds-foot{display:flex;gap:10px;margin-top:16px;}
  .ds-foot button{flex:1;padding:13px 0;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--line);}
  .ds-today{background:var(--accent);border-color:var(--accent);color:#fff;}
  .ds-cancel{background:var(--bg-3);color:var(--text);}
  .sheet h3{font-size:19px;margin-bottom:4px;}

  .planrow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:10px;transition:border-color .15s,transform .06s;}

  .badge{font-family:"IBM Plex Mono";font-size:9.5px;letter-spacing:.07em;text-transform:uppercase;background:var(--accent);color:#fff;border-radius:99px;padding:3px 8px;flex:none;}

  .filegrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
  .photo{position:relative;display:block;border-radius:13px;overflow:hidden;border:1px solid var(--line);background:var(--bg-3);aspect-ratio:1/1;}

  .photo .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.72));color:#fff;font-size:10px;padding:16px 8px 6px;font-family:"IBM Plex Mono";white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .photo .del{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .filechip{display:flex;align-items:center;gap:11px;padding:12px 13px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;}
  .filechip .fi{width:34px;height:34px;border-radius:9px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--accent-2);flex:none;}

  .setavatar .big{width:96px;height:96px;border-radius:50%;overflow:hidden;background:linear-gradient(140deg,#3a2422,#272220);display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque";font-weight:800;font-size:36px;color:var(--accent);}
  .setavatar .big img{width:100%;height:100%;object-fit:cover;}

  .scaleSel{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-size:16px;padding:12px 14px;border-radius:11px;outline:none;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235B6168' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:38px;}

  .mic svg{width:22px;height:22px;}
  .mic.rec{background:var(--accent);border-color:var(--accent);color:#fff;}

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .recbar{flex:1;display:flex;align-items:center;gap:9px;background:var(--bg-3);border:1px solid var(--accent);color:var(--text);font-size:15px;font-weight:600;padding:12px 14px;border-radius:16px;}
  .recbar .recdot{background:var(--accent);}
  .reccancel{width:46px;height:46px;border-radius:50%;background:var(--bg-3);border:1px solid var(--line);color:var(--dim);font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;flex:none;cursor:pointer;}
  .settbl{width:100%;border-collapse:collapse;margin-top:4px;}

  .settbl td{font-size:14px;color:var(--text);padding:3px 8px 3px 0;border-top:1px solid var(--line);}

  /* ===== kraftkonzept v100 — crafted high-contrast skin ===== */
  h1,h2,h3{letter-spacing:-0.032em;}
  .ttl{letter-spacing:-0.03em;font-size:20px;}

  /* crisp white fields that read on card AND canvas */
  .field input,.ta,.setinput,.mini input,.rangebar .rb-f input,.scaleSel,.adm-select{
    background:var(--bg-2);border-color:var(--line-2);}
  .field input:focus,.ta:focus,.setinput:focus,.scaleSel:focus{border-color:var(--accent);}

  /* primary action: confident black with defined lift */
  .btn{box-shadow:0 8px 20px rgba(11,12,15,0.22);}
  .btn:active{box-shadow:0 4px 12px rgba(11,12,15,0.20);}
  .btn-ghost{background:var(--bg-2);border:1px solid var(--line-2);box-shadow:none;}

  /* cards = real objects: crisp border (palette) + clean defined shadow */
  .card,.mcard,.foodcard,.clientrow,.dayrow,.planrow,.pctcard,.exblock,.entry,.chartwrap,.exp,.donecard,.filechip,.invite,.msg-banner,.loginfo{
    box-shadow:0 1px 2px rgba(11,12,15,0.05), 0 6px 16px rgba(11,12,15,0.07);}

  .planhero .ph-sub{color:rgba(255,255,255,0.66);}
  .planhero .ph-badge{background:#fff;color:#0B0C0F;}
  .planhero .ph-ico{opacity:.12;}
  .planhero .ph-ico svg{color:#fff;}
  .loginfo{background:var(--bg-2);}
  .loginfo .li-ico{background:#0B0C0F;}
  .loginfo .li-ico svg{color:#fff;}
  .dayrow.next .dr-ico{background:#0B0C0F;}
  .dayrow.next .dr-ico svg{color:#fff;}

  /* nav: clear active state + crisp top indicator */
  .tabbar button.on{color:var(--accent);box-shadow:inset 0 2px 0 #0B0C0F;}

  /* inverted drawer header = premium punch */
  .drawer .dhead{background:#0B0C0F;border-bottom-color:rgba(255,255,255,0.08);}
  .drawer .dhead .dname{color:#fff;}
  .drawer .dhead .drole{color:rgba(255,255,255,0.6);}
  .drawer .dhead .dav{background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.20);color:#fff;box-shadow:none;}
  .drawer{box-shadow:-14px 0 44px rgba(11,12,15,0.18);}
  .sheet,.cdlg{box-shadow:0 -10px 44px rgba(11,12,15,0.20);}

  .ktarget-lab{color:var(--text);}
  .incall-btn.reject{background:#EF4444;border-color:#EF4444;}
  .logo-sm{height:25px;}
  .logo-auth{height:44px;}
  .splash .lg{width:148px;opacity:1;}

  /* ===== Check-in Wizard ===== */
  .wiz-header{padding:10px 16px 0;flex-shrink:0;}
  .wiz-footer{flex-shrink:0;padding:10px 16px calc(env(safe-area-inset-bottom) + 10px);border-top:1px solid var(--line);background:var(--bg);}
  .wiz-prog{height:3px;background:var(--bg-3);border-radius:2px;margin-bottom:6px;}
  .wiz-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease;}
  .wiz-counter{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.09em;color:var(--faint);}
  .wiz-q{font-family:"Bricolage Grotesque";font-weight:800;font-size:22px;letter-spacing:-0.025em;line-height:1.3;margin-bottom:8px;}
  .wiz-hint{font-size:13px;color:var(--faint);margin-bottom:18px;display:flex;align-items:center;gap:5px;}
  .wiz-hint-val{font-weight:700;color:var(--dim);}
  .wiz-scale{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:6px;}
  .wiz-sc{height:54px;border-radius:13px;border:1.5px solid var(--line-2);background:var(--bg-2);font-weight:700;font-size:17px;color:var(--text);transition:background .1s,border-color .1s,color .1s;box-shadow:0 1px 2px rgba(11,12,15,.04);}
  .wiz-sc.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(11,12,15,.18);}
  .wiz-yn{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
  .wiz-yn-btn{height:80px;border-radius:18px;border:1.5px solid var(--line-2);background:var(--bg-2);font-weight:800;font-size:22px;color:var(--text);transition:background .1s,border-color .1s,color .1s;box-shadow:0 1px 2px rgba(11,12,15,.04);}
  .wiz-yn-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(11,12,15,.18);}
  .wiz-number{display:flex;align-items:center;gap:12px;margin-top:6px;}
  .wiz-stepper{width:54px;height:54px;border-radius:50%;border:1.5px solid var(--line-2);background:var(--bg-2);font-size:26px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;box-shadow:0 1px 2px rgba(11,12,15,.04);}
  .wiz-num-input{flex:1;text-align:center;font-size:34px;font-weight:800;letter-spacing:-0.02em;background:var(--bg-2);border:1.5px solid var(--line-2);border-radius:14px;padding:12px;color:var(--text);outline:none;}
  .wiz-photo-lbl{display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px 20px;border:2px dashed var(--line-2);border-radius:18px;background:var(--bg-2);color:var(--text);font-weight:600;cursor:pointer;margin-top:6px;}
  .wiz-ta{font-size:16px;min-height:130px;margin-top:6px;}
  .wiz-nav{display:flex;gap:10px;}
  .wiz-back{flex:none;width:auto;min-width:52px;padding-left:14px;padding-right:14px;}
  .wiz-fwd{flex:1;}
  .wiz-sum-title{font-family:"Bricolage Grotesque";font-weight:800;font-size:20px;letter-spacing:-0.025em;margin-bottom:16px;}
  .wiz-sum-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .wiz-sum-q{color:var(--dim);font-size:13px;flex:1;line-height:1.35;}
  .wiz-sum-a{font-weight:700;font-size:14px;text-align:right;max-width:55%;word-break:break-word;}

  /* ===== Coach Check-in Review ===== */
  .cir-card{border:1px solid var(--line);border-radius:var(--r);background:var(--bg-2);margin-bottom:10px;overflow:hidden;box-shadow:0 1px 2px rgba(11,12,15,.05),0 4px 12px rgba(11,12,15,.06);}
  .cir-head{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;}
  .cir-date{font-weight:700;font-size:14.5px;}
  .cir-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
  .cir-chip{font-family:"IBM Plex Mono";font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px;border:1px solid var(--line);}
  .cir-chip.sl{background:rgba(220,38,38,.10);color:#B91C1C;border-color:rgba(220,38,38,.22);}
  .cir-chip.sm{background:rgba(202,138,4,.12);color:#92400E;border-color:rgba(202,138,4,.28);}
  .cir-chip.sh{background:rgba(21,128,74,.11);color:#15803D;border-color:rgba(21,128,74,.25);}
  .cir-chip.sn{background:var(--bg-3);color:var(--dim);}
  .cir-toggle{color:var(--faint);font-size:11px;flex:none;}
  .cir-body{border-top:1px solid var(--line);padding:12px 16px 14px;}
  .cir-ans-row{display:flex;gap:10px;margin-bottom:10px;}
  .cir-ans-q{flex:1;font-size:13px;color:var(--dim);line-height:1.35;}
  .cir-ans-a{font-weight:700;font-size:14px;text-align:right;max-width:52%;}
  .cir-ans-a.sl{color:#B91C1C;}
  .cir-ans-a.sm{color:#92400E;}
  .cir-ans-a.sh{color:#15803D;}
  .cir-note-sec{border-top:1px solid var(--line);padding-top:12px;margin-top:4px;}
  .cir-note-saved{background:var(--bg-3);border-radius:10px;padding:10px 12px;font-size:13.5px;margin-bottom:8px;line-height:1.4;}
  .cir-new-badge{font-family:"IBM Plex Mono";font-size:9px;letter-spacing:.08em;background:var(--accent);color:#fff;border-radius:99px;padding:2px 7px;vertical-align:middle;margin-left:6px;}


  /* ===== PWA Install Gate ===== */
  .gate{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;}
  .gate-logo{height:44px;margin-bottom:28px;opacity:.9;}
  .gate-hl{font-family:"Bricolage Grotesque";font-weight:800;font-size:24px;letter-spacing:-0.03em;color:var(--text);margin-bottom:10px;max-width:280px;}
  .gate-sub{font-size:15px;color:var(--dim);line-height:1.5;max-width:290px;margin-bottom:28px;}
  .gate-steps{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;text-align:left;}
  .gate-step{display:flex;align-items:flex-start;gap:13px;background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:0 1px 2px rgba(11,12,15,.04),0 4px 12px rgba(11,12,15,.06);}
  .gate-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .gate-step-txt{font-size:14px;line-height:1.45;color:var(--text);}
  .gate-step-txt b{font-weight:700;}
  .gate-arrow{display:inline-flex;align-items:center;gap:4px;vertical-align:middle;background:var(--bg-3);border:1px solid var(--line);border-radius:7px;padding:1px 7px;font-size:13px;}
  .gate-desktop-icon{font-size:48px;margin-bottom:18px;opacity:.4;}

  /* ===== Dark Mode ===== */
  [data-theme="dark"]{
    --bg:#0F0F11; --bg-2:#1C1C1F; --bg-3:#2C2C2F;
    --line:rgba(255,255,255,0.09); --line-2:rgba(255,255,255,0.17);
    --text:#F2F2F7; --dim:#8E8E93; --faint:#48484A;
    --accent:#F2F2F7; --accent-2:#FFFFFF; --on-accent:#0F0F11; --ok:#30D158; --r:16px;
  }
  [data-theme="dark"] body{background:var(--bg);}
  [data-theme="dark"] .composer{background:rgba(28,28,31,0.94);backdrop-filter:blur(12px);}
  [data-theme="dark"] .tabbar{background:rgba(15,15,17,0.97);backdrop-filter:blur(12px);}
  [data-theme="dark"] .topbar{background:rgba(15,15,17,0.96);backdrop-filter:blur(10px);border-bottom-color:rgba(255,255,255,0.07);}
  [data-theme="dark"] .tgl.on{background:#32D74B;border-color:#32D74B;}
  [data-theme="dark"] .tgl.on .knob{background:#fff;}
  [data-theme="dark"] .planhero{background:linear-gradient(140deg,#2A2A2E,#1C1C1F);border-color:#3A3A3E;color:var(--text);}
  [data-theme="dark"] .planhero .ph-badge{background:rgba(242,242,247,0.12);color:var(--text);}
  [data-theme="dark"] .planhero .ph-sub{color:var(--dim);}
  [data-theme="dark"] .drawer .dhead{background:#1C1C1F;border-bottom-color:rgba(255,255,255,0.08);}
  [data-theme="dark"] .drawer .dhead .dname{color:#fff;}
  [data-theme="dark"] .drawer .dhead .drole{color:rgba(255,255,255,0.5);}
  [data-theme="dark"] .drawer .dhead .dav{background:rgba(255,255,255,0.10);border-color:rgba(255,255,255,0.16);color:#fff;}
  [data-theme="dark"] .drawer{box-shadow:-16px 0 48px rgba(0,0,0,0.55);}
  [data-theme="dark"] .sheet,.cdlg{background:var(--bg-2);box-shadow:0 -12px 48px rgba(0,0,0,0.55);}
  [data-theme="dark"] .card,.mcard,.loginfo,.cir-card{box-shadow:0 1px 0 rgba(255,255,255,0.04),0 4px 18px rgba(0,0,0,0.36);}
  [data-theme="dark"] .btn{box-shadow:0 6px 18px rgba(0,0,0,0.40);}
  [data-theme="dark"] select{background:var(--bg-2);color:var(--text);}
  [data-theme="dark"] .logo-sm,[data-theme="dark"] .logo-auth,[data-theme="dark"] .splash .lg{filter:invert(1);}
  [data-theme="dark"] .gate-logo{filter:invert(1);}
  [data-theme="dark"] .ds-cell.sel,[data-theme="dark"] .calcol .cdate.sel{color:var(--bg);}

  /* Autofill: prevent iOS dark-background override (concrete colors – var() unreliable here) */
  input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,input:-webkit-autofill:active{
    -webkit-box-shadow:0 0 0 1000px #FFFFFF inset !important;
    box-shadow:0 0 0 1000px #FFFFFF inset !important;
    -webkit-text-fill-color:#0B0C0F !important;
    caret-color:#0B0C0F;
    transition:background-color 5000s ease-in-out 0s;
  }
  [data-theme="dark"] input:-webkit-autofill,[data-theme="dark"] input:-webkit-autofill:hover,[data-theme="dark"] input:-webkit-autofill:focus,[data-theme="dark"] input:-webkit-autofill:active{
    -webkit-box-shadow:0 0 0 1000px #1C1C1F inset !important;
    box-shadow:0 0 0 1000px #1C1C1F inset !important;
    -webkit-text-fill-color:#F2F2F7 !important;
    caret-color:#F2F2F7;
  }

  /* ===== Journey (v3 design) ===== */
  :root{--jny-lime:#84CC16;--jny-lime-d:#5e990f;}
  [data-theme="dark"]{--jny-lime:#A3E635;--jny-lime-d:#A3E635;}
  /* header */
  .jny-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:20px;}
  .jny-hdr-l{min-width:0;}
  .jny-hdr-title{font-family:"Bricolage Grotesque";font-weight:800;font-size:26px;letter-spacing:-0.03em;text-transform:uppercase;line-height:1.05;}
  .jny-hdr-sub{font-size:14px;color:var(--dim);margin-top:5px;}
  .jny-goalbtn{flex-shrink:0;display:inline-flex;align-items:center;gap:7px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:13px;padding:9px 14px;font-family:"IBM Plex Mono";font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text);box-shadow:0 1px 2px rgba(11,12,15,.04);cursor:pointer;}
  .jny-goalbtn svg{width:15px;height:15px;}
  /* timeline */
  .jny-tl{padding-bottom:24px;}
  .jny-row{display:flex;gap:0;}
  .jny-lc{display:flex;flex-direction:column;align-items:center;width:60px;flex-shrink:0;}
  .jny-circ{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;transition:all .25s;margin-top:18px;}
  .jny-circ.done{background:var(--text);color:var(--bg);}
  .jny-circ.active{background:var(--bg-2);border:3px solid var(--text);}
  .jny-circ.active .jny-inner-dot{width:14px;height:14px;border-radius:50%;background:var(--text);}
  .jny-circ.locked{background:var(--bg-3);border:1.5px solid var(--line-2);color:var(--faint);}
  .jny-circ.goal{background:var(--text);color:var(--bg);font-size:20px;}
  .jny-vline{width:2.5px;flex:1;min-height:16px;margin:6px 0;border-radius:2px;background:var(--text);}
  .jny-vline.dashed{background:repeating-linear-gradient(to bottom,var(--line-2) 0 5px,transparent 5px 11px);}
  /* card */
  .jny-rc{flex:1;min-width:0;padding:0 0 14px 12px;}
  .jny-card{background:var(--bg-2);border:1px solid var(--line);border-radius:18px;box-shadow:0 1px 2px rgba(11,12,15,.04),0 6px 16px rgba(11,12,15,.05);overflow:hidden;transition:box-shadow .18s;}
  .jny-card.locked{background:var(--bg-2);opacity:.92;}
  .jny-chead{display:flex;gap:13px;align-items:flex-start;padding:18px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .jny-chead.nopt{cursor:default;}
  .jny-chl{flex:1;min-width:0;}
  .jny-statusrow{display:flex;align-items:center;gap:11px;margin-bottom:9px;}
  .jny-num{font-family:"Bricolage Grotesque";font-weight:800;font-size:19px;color:var(--faint);line-height:1;}
  .jny-status{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);}
  .jny-titlerow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .jny-title{font-family:"Bricolage Grotesque";font-weight:800;font-size:21px;letter-spacing:-0.02em;line-height:1.1;}
  .jny-card.done .jny-title{color:var(--text);}
  .jny-badge{font-family:"IBM Plex Mono";font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;background:rgba(99,102,241,.13);color:#4f46e5;border-radius:99px;padding:3px 9px;}
  [data-theme="dark"] .jny-badge{background:rgba(129,140,248,.2);color:#a5b4fc;}
  .jny-desc{font-size:14px;color:var(--dim);line-height:1.5;margin-top:8px;}
  .jny-icocirc{width:58px;height:58px;border-radius:50%;background:var(--bg-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text);}
  .jny-icocirc svg{width:26px;height:26px;}
  .jny-icocirc.lock{color:var(--faint);}
  .jny-chevr{align-self:center;flex-shrink:0;color:var(--faint);}
  .jny-chevr svg{width:18px;height:18px;}
  /* expandable body */
  .jny-body-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.4,0,.2,1);}
  .jny-body-wrap.open{grid-template-rows:1fr;}
  .jny-body-inner{overflow:hidden;}
  .jny-body{padding:0 18px 18px;}
  /* progress */
  .jny-psec{margin-top:4px;}
  .jny-plbl{font-family:"IBM Plex Mono";font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin-bottom:9px;}
  .jny-prow{display:flex;align-items:center;gap:13px;}
  .jny-pbar{flex:1;height:9px;background:var(--bg-3);border-radius:99px;overflow:hidden;}
  .jny-pfill{height:100%;background:var(--jny-lime);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
  .jny-ppct{font-family:"Bricolage Grotesque";font-weight:800;font-size:17px;flex-shrink:0;letter-spacing:-0.02em;}
  /* habits */
  .jny-hsec{margin-top:18px;}
  .jny-hrow{display:flex;align-items:center;gap:13px;background:var(--bg-3);border-radius:14px;padding:12px 15px;margin-top:9px;}
  .jny-hic{width:38px;height:38px;border-radius:50%;background:rgba(132,204,22,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--jny-lime-d);}
  [data-theme="dark"] .jny-hic{background:rgba(163,230,53,.16);color:var(--jny-lime);}
  .jny-hic svg{width:19px;height:19px;}
  .jny-hname{flex:1;min-width:0;font-weight:600;font-size:15px;}
  .jny-hstreak{text-align:right;flex-shrink:0;}
  .jny-hsnum{font-family:"Bricolage Grotesque";font-weight:800;font-size:22px;line-height:1;letter-spacing:-0.02em;}
  .jny-hslbl{font-family:"IBM Plex Mono";font-size:8.5px;letter-spacing:.07em;color:var(--faint);margin-top:2px;}
  .jny-hflame{flex-shrink:0;color:var(--jny-lime);display:flex;align-items:center;}
  .jny-hflame svg{width:21px;height:21px;}
  .jny-hflame.cold{color:var(--faint);opacity:.5;}
  /* substeps */
  .jny-ssec{margin-top:18px;}
  .jny-sitem{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-top:1px solid var(--line);}
  .jny-sitem:first-of-type{border-top:none;padding-top:2px;}
  .jny-scheck{width:21px;height:21px;border-radius:50%;border:2px solid var(--line-2);background:var(--bg);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;cursor:pointer;transition:all .15s;}
  .jny-scheck.on{background:var(--jny-lime-d);border-color:var(--jny-lime-d);}
  [data-theme="dark"] .jny-scheck.on{background:var(--jny-lime);border-color:var(--jny-lime);color:#0F0F11;}
  .jny-stxt{font-size:14px;line-height:1.4;color:var(--text);flex:1;}
  .jny-stxt.done{text-decoration:line-through;color:var(--faint);}
  .jny-cdate{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--jny-lime-d);margin-top:14px;font-weight:700;background:rgba(132,204,22,.13);padding:5px 11px;border-radius:99px;}
  [data-theme="dark"] .jny-cdate{color:var(--jny-lime);background:rgba(163,230,53,.13);}
  /* coach editor */
  .jny-ecard{margin-bottom:10px;}
  .jny-ehead{display:flex;gap:11px;align-items:flex-start;}
  .jny-echeck{width:26px;height:26px;border-radius:50%;border:2px solid var(--line-2);background:var(--bg-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;margin-top:2px;transition:all .12s;}
  .jny-echeck.on{background:var(--jny-lime-d);border-color:var(--jny-lime-d);}
  [data-theme="dark"] .jny-echeck.on{background:var(--jny-lime);border-color:var(--jny-lime);color:#0F0F11;}
  .jny-etitle{font-weight:700;font-size:15px;}
  .jny-etitle.done{text-decoration:line-through;color:var(--faint);}
  .jny-edesc{font-size:13px;color:var(--dim);margin-top:3px;line-height:1.35;}
  .jny-emeta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--faint);margin-top:7px;flex-wrap:wrap;}
  .jny-emeta .chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg-3);border-radius:99px;padding:3px 9px;}
  .jny-emeta svg{width:12px;height:12px;}
  .jny-icobtn{width:32px;height:32px;border-radius:9px;background:var(--bg-3);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;cursor:pointer;}
  .jny-icobtn svg{width:15px;height:15px;}
  .jny-move{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
  .jny-move button{width:26px;height:18px;border:none;background:none;color:var(--faint);font-size:13px;cursor:pointer;padding:0;line-height:1;}
  .jny-move button:disabled{opacity:.22;}
  .jny-sub-edit{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
  .jny-sub-edit input{flex:1;}
  .jny-sub-del{background:none;border:none;color:var(--faint);font-size:17px;cursor:pointer;padding:2px 6px;flex-shrink:0;}
  .jny-addsub{font-size:13px;font-weight:600;color:var(--accent);background:none;border:none;padding:4px 0;cursor:pointer;}
  .jny-hpick{display:flex;gap:8px;align-items:center;margin-bottom:7px;}
  .jny-hpick select{flex:1;}
  .jny-hpick input{width:60px;}
  .jny-iconpick{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .jny-iconopt{width:40px;height:40px;border-radius:11px;background:var(--bg-3);border:2px solid transparent;display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;}
  .jny-iconopt.sel{border-color:var(--accent);}
  .jny-iconopt svg{width:19px;height:19px;}
  /* dashboard mini */
  .jny-mini-stage{font-size:13.5px;font-weight:600;margin-bottom:8px;}
  .jny-mini-bar{height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;}
  .jny-mini-fill{height:100%;background:var(--jny-lime);border-radius:2px;transition:width .4s ease;}
  .jny-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .jny-dot.s{background:var(--faint);}
  .jny-dot.g{background:var(--jny-lime);}
  .dctrl{width:30px;height:30px;border:1px solid var(--line-2);background:var(--bg-3);border-radius:8px;color:var(--dim);font-size:12px;flex-shrink:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;}
  .dctrl:disabled{opacity:.28;}
  .daydup{width:32px;height:32px;border:1px solid var(--line-2);background:var(--bg-3);border-radius:8px;color:var(--text);flex-shrink:0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;}
  .daydup svg{width:15px;height:15px;}
</style>
</head>

function urlB64ToUint8(base64){ const pad="=".repeat((4-base64.length%4)%4); const b=(base64+pad).replace(/-/g,"+").replace(/_/g,"/"); const raw=atob(b); const arr=new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr; }
async function enablePush(toast){
  const say=(m)=>{ try{ if(typeof toast==="function") toast(m); }catch(_){} };
  try{
    if(!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)){ say("Push wird auf diesem Gerät nicht unterstützt"); return; }
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ say("Mitteilungen wurden nicht erlaubt"); return; }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC) }); }
    const j=sub.toJSON();
    const { data:{ user } }=await window.supa.auth.getUser();
    if(!user){ say("Bitte zuerst einloggen"); return; }
    const { error }=await window.supa.from("push_subscriptions").upsert({ user_id:user.id, endpoint:j.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth }, { onConflict:"endpoint" });
    if(error) throw error;
    say("Mitteilungen aktiviert ✓");
  }catch(e){ say("Konnte Mitteilungen nicht aktivieren: "+(e.message||"")); }
}
async function disablePush(toast){
  const say=(m)=>{ try{ if(typeof toast==="function") toast(m); }catch(_){} };
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){
      await sub.unsubscribe();
      const {data:{user}}=await window.supa.auth.getUser();
      if(user) await window.supa.from("push_subscriptions").delete().eq("user_id",user.id);
    }
    say("Mitteilungen deaktiviert");
  }catch(e){ say("Konnte Mitteilungen nicht deaktivieren"); }
}

// iOS-tauglich kopieren: erst Clipboard-API, dann Fallback über verstecktes Textarea
async function copyText(t){
  try{ if(navigator.clipboard && window.isSecureContext){ await navigator.clipboard.writeText(t); return true; } }catch(e){}
  try{
    const ta=document.createElement("textarea");
    ta.value=t; ta.setAttribute("readonly",""); ta.style.position="absolute"; ta.style.left="-9999px"; ta.style.fontSize="16px";
    document.body.appendChild(ta);
    const sel=document.getSelection(); const saved=sel&&sel.rangeCount>0?sel.getRangeAt(0):null;
    ta.select(); ta.setSelectionRange(0, ta.value.length);
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    if(saved && sel){ sel.removeAllRanges(); sel.addRange(saved); }
    return ok;
  }catch(e){ return false; }
}

/* ---------- weight chart ---------- */
function WeightChart({data,cals}){
  if(!data || data.length<2) return <div className="muted" style={{padding:"6px 2px 10px"}}>Noch zu wenig Daten für einen Verlauf – ab dem zweiten Eintrag erscheint die Kurve.</div>;
  const W=320,H=140,pl=10,pr=10,pt=12,pb=22;
  const ys=data.map(d=>d.kg); const minY=Math.min(...ys), maxY=Math.max(...ys); const span=(maxY-minY)||1;
  const X=(i)=>pl+(i/(data.length-1))*(W-pl-pr);
  const Y=(v)=>pt+(1-(v-minY)/span)*(H-pt-pb);
  const pts=data.map((d,i)=>`${X(i).toFixed(1)},${Y(d.kg).toFixed(1)}`).join(" ");
  const area=`${X(0).toFixed(1)},${H-pb} ${pts} ${X(data.length-1).toFixed(1)},${H-pb}`;
  // Kalorien (optional): nach Datum den Gewichtspunkten zuordnen
  let calPts=null, calMin=0, calMax=0;
  if(cals){
    const cmap={}; cals.forEach(c=>{ cmap[c.date]=c.kcal; });
    const vals=data.map(d=>cmap[d.date]).filter(v=>v!=null && v>0);
    if(vals.length>=2){
      calMin=Math.min(...vals); calMax=Math.max(...vals); const cspan=(calMax-calMin)||1;
      const CY=(v)=>pt+(1-(v-calMin)/cspan)*(H-pt-pb);
      // Linie nur über Punkte mit Wert (Lücken überspringen)
      const segs=[]; let cur=[];
      data.forEach((d,i)=>{ const v=cmap[d.date]; if(v!=null&&v>0){ cur.push(`${X(i).toFixed(1)},${CY(v).toFixed(1)}`); } else { if(cur.length) segs.push(cur); cur=[]; } });
      if(cur.length) segs.push(cur);
      calPts=segs;
    }
  }
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%">
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor="#16181D" stopOpacity="0.30"/><stop offset="1" stopColor="#16181D" stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={area} fill="url(#wg)"/>
      {calPts && calPts.map((seg,si)=>(<polyline key={si} points={seg.join(" ")} fill="none" stroke="#F2C200" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round" strokeDasharray="0"/>))}
      <polyline points={pts} fill="none" stroke="#16181D" strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=>(<circle key={i} cx={X(i)} cy={Y(d.kg)} r={i===data.length-1?3.6:2.4} fill="#16181D"/>))}
      <text x={X(0)} y={H-5} fontSize="9" fill="#868D96" fontFamily="IBM Plex Mono">{fmtDay(data[0].date)}</text>
      <text x={X(data.length-1)} y={H-5} fontSize="9" fill="#868D96" fontFamily="IBM Plex Mono" textAnchor="end">{fmtDay(data[data.length-1].date)}</text>
      <text x={X(data.length-1)} y={Y(data[data.length-1].kg)-8} fontSize="11" fill="#ECE7E2" fontFamily="IBM Plex Mono" textAnchor="end">{data[data.length-1].kg} kg</text>
      {calPts && <text x={X(0)} y={pt-2} fontSize="9" fill="#F2C200" fontFamily="IBM Plex Mono">kcal</text>}
    </svg>
  );
}

/* ---------- CHAT ---------- */
function fmtDur(s){ s=Math.round(s||0); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function MsgBubble({m,mine}){
  const isMedia=m.kind && m.kind!=="text";
  let inner;
  if(m.kind==="image") inner=<a href={m.url} target="_blank" rel="noopener"><img className="bimg" src={m.url} alt=""/></a>;
  else if(m.kind==="video") inner=<video className="bvid" src={m.url} controls playsInline/>;
  else if(m.kind==="audio") inner=<div className="baud"><audio src={m.url} controls/>{m.dur?<span className="adur">{fmtDur(m.dur)}</span>:null}</div>;
  else inner=m.body;
  return <div className={"bubble "+(mine?"mine":"theirs")+(isMedia?" media":"")}>{inner}<span className="t">{fmtTime(m.ts)}</span></div>;
}
function ChatTab({cdata,upd,role}){
  const [text,setText]=useState(""); const endRef=useRef(null), taRef=useRef(null);
  const [recording,setRecording]=useState(false); const [recSecs,setRecSecs]=useState(0);
  const mrRef=useRef(null), chunksRef=useRef([]), timerRef=useRef(null), streamRef=useRef(null), secsRef=useRef(0);
  const msgs=cdata.messages;
  useEffect(()=>{ endRef.current && endRef.current.scrollIntoView({behavior:"smooth"}); },[msgs.length]);
  useEffect(()=>()=>{ if(timerRef.current) clearInterval(timerRef.current); if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop()); },[]);
  const pushMsg=(extra)=>upd(c=>({...c,messages:[...c.messages,{id:nid(),from:role,ts:Date.now(),...extra}]}));
  const send=()=>{ const b=text.trim(); if(!b) return; pushMsg({kind:"text",body:b}); setText(""); if(taRef.current){taRef.current.style.height="auto";taRef.current.focus();} };
  const onPickMedia=(e)=>{ const f=e.target.files[0]; if(f){ const kind=(f.type.indexOf("video")===0)?"video":"image"; readToData(f,(u)=>pushMsg({kind,url:u})); } e.target.value=""; };
  const startRec=async()=>{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ alert("Sprachaufnahme wird auf diesem Gerät/Browser nicht unterstützt."); return; }
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true}); streamRef.current=stream;
      const mr=new MediaRecorder(stream); mrRef.current=mr; chunksRef.current=[];
      mr.ondataavailable=(e)=>{ if(e.data && e.data.size) chunksRef.current.push(e.data); };
      mr.onstop=()=>{
        const blob=new Blob(chunksRef.current,{type:(mrRef.current && mrRef.current.mimeType)||"audio/mp4"});
        const secs=secsRef.current;
        const r=new FileReader(); r.onload=()=>pushMsg({kind:"audio",url:r.result,dur:secs}); r.readAsDataURL(blob);
        if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current=null; }
        if(timerRef.current){ clearInterval(timerRef.current); timerRef.current=null; }
      };
      mr.start(); secsRef.current=0; setRecSecs(0); setRecording(true);
      timerRef.current=setInterval(()=>{ secsRef.current+=1; setRecSecs(secsRef.current); },1000);
    }catch(err){ alert("Kein Mikrofon-Zugriff. Bitte in den Einstellungen erlauben."); }
  };
  const stopRec=()=>{ if(mrRef.current && mrRef.current.state!=="inactive") mrRef.current.stop(); setRecording(false); };
  const isCoach=role==="coach";
  return <>
    <div className="msgs">
      {msgs.length===0 && <div className="empty">Schreib die erste Nachricht.</div>}
      {msgs.map(m=>(<MsgBubble key={m.id} m={m} mine={m.from===role}/>))}
      <div ref={endRef}/>
    </div>
    <div className="composer">
      {isCoach && <label className="attach" title="Foto oder Video"><Icon name="photo"/><input type="file" accept="image/*,video/*" onChange={onPickMedia}/></label>}
      {recording
        ? <div className="recbar"><span className="recdot"/>Aufnahme… {fmtDur(recSecs)}</div>
        : <textarea ref={taRef} rows="1" value={text} placeholder="Nachricht…" onChange={(e)=>{setText(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,120)+"px";}}/>}
      {(isCoach && !text.trim())
        ? <button className={"mic"+(recording?" rec":"")} onClick={recording?stopRec:startRec} aria-label="Sprachnachricht">{recording?<span className="recdot"/>:<Icon name="mic"/>}</button>
        : <button className="send" onClick={send} disabled={!text.trim()}>↑</button>}
    </div>
  </>;
}

function WeekCalendar({weekDates,selDate,setSelDate,weekOffset,changeWeek,dots,t}){
  const monthLabel=new Date(weekDates[0]+"T00:00:00").toLocaleDateString("de-DE",{month:"long",year:"numeric"});

    </div>
    <div className="calstrip">{weekDates.map(d=>{ const isSel=d===selDate; const isToday=d===t; const dot=dots&&dots[d]; const future=d>t;
      return <button key={d} className={"calcol"+(future?" fut":"")} disabled={future} onClick={()=>setSelDate(d)}>
        <div className="cwd">{["MO","DI","MI","DO","FR","SA","SO"][(new Date(d+"T00:00:00").getDay()+6)%7]}</div>
